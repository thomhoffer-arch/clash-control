name: Daily memory sync

on:
  schedule:
    # Runs at 06:00 UTC every day
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Re-run even if already updated today'
        required: false
        default: 'false'
        type: boolean

jobs:
  update-memory:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so git log --since works
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run memory updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            python3 scripts/update-memory.py --force
          else
            python3 scripts/update-memory.py
          fi

      - name: Commit and push if MEMORY.md changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add MEMORY.md
          if ! git diff --staged --quiet; then
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "chore: daily memory sync ${DATE}"
            git push
            echo "MEMORY.md updated and pushed."
          else
            echo "No changes to MEMORY.md — nothing to commit."
          fi
