});

});

// Service worker registration (PWA offline support)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(function(e) {
    console.warn('[ClashControl] SW registration failed:', e);
  });
}

window.onload = function() {
  try { startApp(); }
  catch(e) {
    document.getElementById('boot-msg').textContent = 'Error: ' + e.message;
    document.getElementById('boot-msg').style.color = '#f87171';
    console.error(e);
  }
};

      };
      req.onsuccess = function(e) { resolve(e.target.result); };
      req.onerror = function(e) { reject(e.target.error); };
    });

    }).catch(function(e) { console.warn('Failed to read IndexedDB:', e); return []; });

  function idbDeleteProjectFiles(projectId) {

      return _openIDB().then(function(db){
        return new Promise(function(resolve, reject){
          var tx = db.transaction(IDB_STORE, 'readwrite');
          var store = tx.objectStore(IDB_STORE);
          files.forEach(function(f){ store.delete(f.id); });
          tx.oncomplete = function(){ resolve(); };
          tx.onerror = function(e){ reject(e.target.error); };
        });
      });
    });
  }

  var _ifcAPI = null;

  // IFC type constants (from web-ifc schema)
  var IFC = {

  function safeStr(v) {
    if (v == null) return '';
    if (typeof v === 'object' && v.value != null) return String(v.value);
    return String(v);
  }

  function extractProperties(api, modelID, expressID) {
    var props = {expressId:expressID, ifcType:'', name:'', description:'', objectType:'', storey:'', storeyId:null, material:'', quantities:{}, psets:{}};
    try {
      var line = api.GetLine(modelID, expressID);
      if (line) {
        props.ifcType = String(line.__proto__.constructor.name || line.type || '');
        // Try to get a readable type name from the IFC type number
        if (line.constructor && line.constructor.name) props.ifcType = line.constructor.name;
        props.name = safeStr(line.Name);
        props.description = safeStr(line.Description);
        props.objectType = safeStr(line.ObjectType);
        // Store the raw type ID for lookups
        if (line.type != null) props.typeId = line.type;
      }
    } catch(e) {}
    return props;
  }

  function extractStoreys(api, modelID) {
    // Build map: elementExpressID -> storeyName, plus storeyData with elevations
    var storeyMap = {};
    var storeyData = []; // [{name, elevation}]
    try {
      var storeyIds = api.GetLineIDsWithType(modelID, IFC.IFCBUILDINGSTOREY);
      var storeys = {};
      for (var i = 0; i < storeyIds.size(); i++) {
        var sid = storeyIds.get(i);
        try {
          var sl = api.GetLine(modelID, sid);
          var name = safeStr(sl.Name) || ('Storey #'+sid);
          storeys[sid] = name;
          // Extract elevation from IfcBuildingStorey
          var elev = 0;
          if (sl.Elevation != null) {
            elev = typeof sl.Elevation === 'object' ? (sl.Elevation.value||0) : sl.Elevation;
          }
          storeyData.push({name:name, elevation:Number(elev)||0, id:sid});
        } catch(e) { storeys[sid] = 'Storey #'+sid; }
      }
      // IfcRelContainedInSpatialStructure links elements to storeys
      var relIds = api.GetLineIDsWithType(modelID, IFC.IFCRELCONTAINEDINSPATIALSTRUCTURE);
      for (var i = 0; i < relIds.size(); i++) {
        try {
          var rel = api.GetLine(modelID, relIds.get(i));
          var structId = rel.RelatingStructure ? (rel.RelatingStructure.value||rel.RelatingStructure) : null;
          var storeyName = storeys[structId] || '';
          if (storeyName && rel.RelatedElements) {
            var els = rel.RelatedElements;
            for (var j = 0; j < els.length; j++) {
              var eid = els[j].value != null ? els[j].value : els[j];
              storeyMap[eid] = storeyName;
            }
          }
        } catch(e) {}
      }
    } catch(e) { console.warn('Storey extraction failed:', e.message||e); }
    // Sort storeyData by elevation
    storeyData.sort(function(a,b){return a.elevation-b.elevation;});
    return {map:storeyMap, data:storeyData};
  }

  // Pre-build material map: expressID -> material name (scans relations once, not per element)
  // Resolve material name from any IFC material entity
  function resolveMaterialName(api, modelID, mat) {
    if (!mat) return '';
    // Direct material with Name
    if (mat.Name) return safeStr(mat.Name);
    // IfcMaterialLayerSetUsage → ForLayerSet → MaterialLayers
    if (mat.ForLayerSet || mat.MaterialLayers) {
      var layerSet = mat.ForLayerSet ? api.GetLine(modelID, mat.ForLayerSet.value != null ? mat.ForLayerSet.value : mat.ForLayerSet) : mat;
      if (layerSet) {
        if (layerSet.Name) return safeStr(layerSet.Name);
        if (layerSet.MaterialLayers) {
          var names = [];
          for (var k = 0; k < layerSet.MaterialLayers.length; k++) {
            try {
              var lid = layerSet.MaterialLayers[k].value != null ? layerSet.MaterialLayers[k].value : layerSet.MaterialLayers[k];
              var layer = api.GetLine(modelID, lid);
              if (layer && layer.Material) {
                var mid = layer.Material.value != null ? layer.Material.value : layer.Material;
                var m2 = api.GetLine(modelID, mid);
                if (m2 && m2.Name) names.push(safeStr(m2.Name));
              }
            } catch(e) {}
          }
          if (names.length) return names.join(', ');
        }
      }
    }
    // IfcMaterialConstituentSet → MaterialConstituents
    if (mat.MaterialConstituents) {
      var cNames = [];
      for (var c = 0; c < mat.MaterialConstituents.length; c++) {
        try {
          var cid = mat.MaterialConstituents[c].value != null ? mat.MaterialConstituents[c].value : mat.MaterialConstituents[c];
          var constituent = api.GetLine(modelID, cid);
          if (constituent && constituent.Material) {
            var cmid = constituent.Material.value != null ? constituent.Material.value : constituent.Material;
            var cm = api.GetLine(modelID, cmid);
            if (cm && cm.Name) cNames.push(safeStr(cm.Name));
          }
        } catch(e) {}
      }
      if (cNames.length) return cNames.join(', ');
    }
    // IfcMaterialProfileSetUsage → ForProfileSet → MaterialProfiles
    if (mat.ForProfileSet || mat.MaterialProfiles) {
      var profSet = mat.ForProfileSet ? api.GetLine(modelID, mat.ForProfileSet.value != null ? mat.ForProfileSet.value : mat.ForProfileSet) : mat;
      if (profSet) {
        if (profSet.Name) return safeStr(profSet.Name);
        if (profSet.MaterialProfiles) {
          var pNames = [];
          for (var p = 0; p < profSet.MaterialProfiles.length; p++) {
            try {
              var pid = profSet.MaterialProfiles[p].value != null ? profSet.MaterialProfiles[p].value : profSet.MaterialProfiles[p];
              var profile = api.GetLine(modelID, pid);
              if (profile && profile.Material) {
                var pmid = profile.Material.value != null ? profile.Material.value : profile.Material;
                var pm = api.GetLine(modelID, pmid);
                if (pm && pm.Name) pNames.push(safeStr(pm.Name));
              }
            } catch(e) {}
          }
          if (pNames.length) return pNames.join(', ');
        }
      }
    }
    // IfcMaterialList → Materials
    if (mat.Materials) {
      var lNames = [];
      for (var l = 0; l < mat.Materials.length; l++) {
        try {
          var mlid = mat.Materials[l].value != null ? mat.Materials[l].value : mat.Materials[l];
          var ml = api.GetLine(modelID, mlid);
          if (ml && ml.Name) lNames.push(safeStr(ml.Name));
        } catch(e) {}
      }
      if (lNames.length) return lNames.join(', ');
    }
    return '';
  }

  function buildMaterialMap(api, modelID) {
    var matMap = {};
    try {
      var relIds = api.GetLineIDsWithType(modelID, IFC.IFCRELASSOCIATESMATERIAL);
      for (var i = 0; i < relIds.size(); i++) {
        try {
          var rel = api.GetLine(modelID, relIds.get(i));
          var matRef = rel.RelatingMaterial ? (rel.RelatingMaterial.value||rel.RelatingMaterial) : null;
          if (!matRef) continue;
          var mat = api.GetLine(modelID, matRef);
          var matName = resolveMaterialName(api, modelID, mat);
          if (!matName) continue;
          var objs = rel.RelatedObjects || [];
          for (var j = 0; j < objs.length; j++) {
            var oid = objs[j].value != null ? objs[j].value : objs[j];
            matMap[oid] = matName;
          }
        } catch(e) {}
      }
    } catch(e) {}
    return matMap;
  }

  // Pre-build property/quantity map: expressID -> {quantities, psets} (scans relations once)
  function buildPropertyMap(api, modelID) {
    var propMap = {}; // expressID -> {quantities:{}, psets:{}}
    try {
      var relIds = api.GetLineIDsWithType(modelID, IFC.IFCRELDEFINESBYPROPERTIES);
      for (var i = 0; i < relIds.size(); i++) {
        try {
          var rel = api.GetLine(modelID, relIds.get(i));
          var defId = rel.RelatingPropertyDefinition ? (rel.RelatingPropertyDefinition.value||rel.RelatingPropertyDefinition) : null;
          if (!defId) continue;
          var def = api.GetLine(modelID, defId);
          if (!def) continue;
          var setName = safeStr(def.Name) || 'Unknown';
          // Parse definition once
          var quantities = null, pset = null;
          if (def.Quantities) {
            quantities = {};
            for (var q = 0; q < def.Quantities.length; q++) {
              try {
                var qid = def.Quantities[q].value != null ? def.Quantities[q].value : def.Quantities[q];
                var ql = api.GetLine(modelID, qid);
                var qn = safeStr(ql.Name);
                var qv = ql.LengthValue||ql.AreaValue||ql.VolumeValue||ql.WeightValue||ql.CountValue;
                if (qn && qv != null) quantities[qn] = typeof qv === 'object' ? qv.value : qv;
              } catch(e) {}
            }
          }
          if (def.HasProperties) {
            pset = {};
            for (var p = 0; p < def.HasProperties.length; p++) {
              try {
                var pid = def.HasProperties[p].value != null ? def.HasProperties[p].value : def.HasProperties[p];
                var pl = api.GetLine(modelID, pid);
                var pn = safeStr(pl.Name);
                var pv = pl.NominalValue;
                if (pn && pv != null) pset[pn] = typeof pv === 'object' ? (pv.value != null ? pv.value : String(pv)) : pv;
              } catch(e) {}
            }
            if (!Object.keys(pset).length) pset = null;
          }
          // Assign to all related objects
          var objs = rel.RelatedObjects || [];
          for (var j = 0; j < objs.length; j++) {
            var oid = objs[j].value != null ? objs[j].value : objs[j];
            if (!propMap[oid]) propMap[oid] = {quantities:{}, psets:{}};
            if (quantities) Object.assign(propMap[oid].quantities, quantities);
            if (pset) propMap[oid].psets[setName] = pset;
          }
        } catch(e) {}
      }
    } catch(e) { console.warn('Property map build failed:', e.message||e); }
    return propMap;
  }

  // IFC type ID to human-readable name map
  var IFC_TYPE_NAMES = {};
  IFC_TYPE_NAMES[839292159] = 'IfcWall'; IFC_TYPE_NAMES[3512223829] = 'IfcWall';
  IFC_TYPE_NAMES[1529196076] = 'IfcSlab'; IFC_TYPE_NAMES[753842376] = 'IfcBeam';
  IFC_TYPE_NAMES[843113511] = 'IfcColumn'; IFC_TYPE_NAMES[395920057] = 'IfcDoor';
  IFC_TYPE_NAMES[3304561284] = 'IfcWindow'; IFC_TYPE_NAMES[2016517767] = 'IfcRoof';
  IFC_TYPE_NAMES[331165859] = 'IfcStair'; IFC_TYPE_NAMES[2262370178] = 'IfcRailing';
  IFC_TYPE_NAMES[263784265] = 'IfcFurnishingElement';
  IFC_TYPE_NAMES[987401354] = 'IfcFlowSegment'; IFC_TYPE_NAMES[2058353004] = 'IfcFlowTerminal';
  IFC_TYPE_NAMES[4278956645] = 'IfcFlowFitting'; IFC_TYPE_NAMES[3040386961] = 'IfcDistributionFlowElement';
  IFC_TYPE_NAMES[3612865200] = 'IfcPipeSegment'; IFC_TYPE_NAMES[3518393246] = 'IfcDuctSegment';
  IFC_TYPE_NAMES[1073191201] = 'IfcMember'; IFC_TYPE_NAMES[3171933400] = 'IfcPlate';
  IFC_TYPE_NAMES[900683007] = 'IfcFooting'; IFC_TYPE_NAMES[1687234759] = 'IfcPile';
  IFC_TYPE_NAMES[1973544240] = 'IfcCovering'; IFC_TYPE_NAMES[3856911033] = 'IfcSpace';

  function loadIFC(buffer, fallbackColor, onProgress) {
    var loadStart = performance.now();
    return getIfcAPI().then(function(api) {
      var modelID = api.OpenModel(new Uint8Array(buffer));

      if(onProgress) onProgress('Building property maps…');

      // Pre-build all lookup maps ONCE (O(relations) instead of O(elements*relations))
      var storeyResult = extractStoreys(api, modelID);
      var storeyMap = storeyResult.map;
      var storeyData = storeyResult.data;
      var matMap = buildMaterialMap(api, modelID);
      var propMap = buildPropertyMap(api, modelID);
      var allStoreys = {};
      Object.keys(storeyMap).forEach(function(k){ allStoreys[storeyMap[k]] = true; });

      if(onProgress) onProgress('Streaming geometry…');

      // Collect raw mesh data first (StreamAllMeshes is synchronous, can't chunk it)
      var rawElements = [];
      var meshes = [];
      api.StreamAllMeshes(modelID, function(ifcMesh) {
        var expressID = ifcMesh.expressID;
        var elMeshes = [], elBox = new THREE.Box3();
        for (var i = 0; i < ifcMesh.geometries.size(); i++) {
          var placed = ifcMesh.geometries.get(i);
          try {
            var gd = api.GetGeometry(modelID, placed.geometryExpressID);
            var verts = api.GetVertexArray(gd.GetVertexData(), gd.GetVertexDataSize());
            var indices = api.GetIndexArray(gd.GetIndexData(), gd.GetIndexDataSize());
            var pos = new Float32Array(verts.length/2), nrm = new Float32Array(verts.length/2);
            for (var j = 0; j < verts.length; j += 6) {
              var k = j/2;
              pos[k]=verts[j]; pos[k+1]=verts[j+1]; pos[k+2]=verts[j+2];
              nrm[k]=verts[j+3]; nrm[k+1]=verts[j+4]; nrm[k+2]=verts[j+5];
            }
            var geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('normal',   new THREE.BufferAttribute(nrm, 3));
            geo.setIndex(new THREE.BufferAttribute(indices, 1));
            var c = placed.color;
            var col = c ? new THREE.Color(c.x, c.y, c.z) : new THREE.Color(fallbackColor);
            var mat = new THREE.MeshPhongMaterial({ color:col, opacity:c?c.w:1, transparent:c?c.w<0.99:false, side:THREE.DoubleSide });
            var mesh = new THREE.Mesh(geo, mat);
            mesh.applyMatrix4(new THREE.Matrix4().fromArray(placed.flatTransformation));
            mesh.userData.expressID = expressID;
            elBox.expandByObject(mesh);
            elMeshes.push(mesh); meshes.push(mesh);
            gd.delete();
          } catch(e) { console.warn('Skipped element geometry #'+expressID+': '+(e.message||e)); }
        }
        if (elMeshes.length > 0) {
          rawElements.push({expressId:expressID, meshes:elMeshes, box:elBox.clone()});
        }
      });

      // Now enrich with properties using pre-built maps (fast lookups, no re-scanning)
      if(onProgress) onProgress('Enriching ' + rawElements.length + ' elements…');

      // Process properties in chunks to keep the UI responsive
      var elements = [];
      var CHUNK = 200;
      return new Promise(function(resolve) {
        function processChunk(startIdx) {
          var end = Math.min(startIdx + CHUNK, rawElements.length);
          for (var idx = startIdx; idx < end; idx++) {
            var raw = rawElements[idx];
            var props = extractProperties(api, modelID, raw.expressId);
            props.storey = storeyMap[raw.expressId] || '';
            props.material = matMap[raw.expressId] || '';
            if (props.typeId && IFC_TYPE_NAMES[props.typeId]) props.ifcType = IFC_TYPE_NAMES[props.typeId];
            // Use pre-built property map instead of scanning all relations
            var pm = propMap[raw.expressId];
            if (pm) {
              props.quantities = pm.quantities;
              props.psets = pm.psets;
            }
            elements.push({expressId:raw.expressId, meshes:raw.meshes, box:raw.box, props:props});
          }
          if (end < rawElements.length) {
            if(onProgress) onProgress('Processing elements ' + end + '/' + rawElements.length + '…');
            setTimeout(function(){ processChunk(end); }, 0);
          } else {
            api.CloseModel(modelID);
            var loadTime = Math.round(performance.now() - loadStart);
            resolve({ meshes:meshes, elements:elements, storeys:Object.keys(allStoreys).sort(), storeyData:storeyData, stats:{loadTime:loadTime, fileSize:buffer.byteLength, elementCount:elements.length, meshCount:meshes.length} });
          }
        }
        processChunk(0);
      });
    });
  }

  // ── Clash Detection ────────────────────────────────────────────

  // Store element hashes for change-aware re-detection
  var _prevElementHashes = {};

  function _hashElement(el) {
    var b = el.box;
    return [el.expressId, b.min.x.toFixed(3), b.min.y.toFixed(3), b.min.z.toFixed(3),
            b.max.x.toFixed(3), b.max.y.toFixed(3), b.max.z.toFixed(3)].join('|');
  }

  function detectClashes(models, rules) {
    var pick = function(id) { return id === 'all' ? models : models.filter(function(m){return m.id===id}); };
    var grpA = pick(rules.modelA), grpB = pick(rules.modelB);
    var clashes = [], seen = {};
    var hardTol = (rules.hardTolerance||0)/1000; // mm to m

    // Change-aware: track which elements changed since last run
    var newHashes = {};
    var changedElements = {};
    if (rules.changeAware) {
      models.forEach(function(m) {
        (m.elements||[]).forEach(function(el) {
          var h = _hashElement(el);
          var key = m.id + ':' + el.expressId;
          newHashes[key] = h;
          if (_prevElementHashes[key] !== h) changedElements[key] = true;
        });
      });
    }

    grpA.forEach(function(mA) { grpB.forEach(function(mB) {
      var sameModel = mA.id === mB.id;
      var key = [mA.id, mB.id].sort().join('|');
      if (seen[key]) return; seen[key] = true;
      (mA.elements||[]).forEach(function(eA, iA) { (mB.elements||[]).forEach(function(eB, iB) {
        if (sameModel && iB <= iA) return;
        // Change-aware: skip pairs where neither element changed
        if (rules.changeAware && !changedElements[mA.id+':'+eA.expressId] && !changedElements[mB.id+':'+eB.expressId]) return;

        var bA = eA.box.clone(), bB = eB.box.clone();

        // Duplicate detection: identical bounding boxes at same location
        if (rules.duplicates) {
          var sizeA = bA.getSize(new THREE.Vector3());
          var sizeB = bB.getSize(new THREE.Vector3());
          var ctrA = bA.getCenter(new THREE.Vector3());
          var ctrB = bB.getCenter(new THREE.Vector3());
          var sizeDiff = Math.abs(sizeA.x-sizeB.x) + Math.abs(sizeA.y-sizeB.y) + Math.abs(sizeA.z-sizeB.z);
          var posDiff = ctrA.distanceTo(ctrB);
          if (sizeDiff < 0.01 && posDiff < 0.01) {
            var pA=eA.props||{}, pB=eB.props||{};
            var tA=pA.ifcType||'Element', tB=pB.ifcType||'Element';
            var nA=pA.name||('#'+eA.expressId), nB=pB.name||('#'+eB.expressId);
            clashes.push({
              id:uid(), source:'auto', type:'duplicate', status:'open',
              title:'Duplicate: '+tA,
              description:nA+' ≡ '+nB+' (same location & size)',
              modelAId:mA.id, modelBId:mB.id, elemA:eA.expressId, elemB:eB.expressId,
              point:[ctrA.x,ctrA.y,ctrA.z], createdAt:new Date().toISOString(),
              distance:0, elevation:Math.round(ctrA.y*1000)/1000,
              disciplines:[mA.discipline,mB.discipline], selfClash:sameModel,
              elemAType:tA, elemBType:tB, elemAName:nA, elemBName:nB,

            description:tA+': '+nA+' ('+mA.name+') vs '+tB+': '+nB+' ('+mB.name+')',
            modelAId:mA.id, modelBId:mB.id, elemA:eA.expressId, elemB:eB.expressId,
            point:[ctr.x,ctr.y,ctr.z], createdAt:new Date().toISOString(),

  function deriveFloors(clashes) {
    if (!clashes.length) return [];
    var ys = clashes.map(function(c){return c.elevation||0}).sort(function(a,b){return a-b});
    var tol = 0.5; // 500mm tolerance
    var floors = [], cur = {yMin:ys[0],yMax:ys[0],sum:ys[0],count:1};
    for (var i=1;i<ys.length;i++) {
      if (ys[i]-cur.yMax > tol) {
        cur.yMax = cur.sum/cur.count + tol/2;
        cur.yMin = cur.sum/cur.count - tol/2;
        floors.push(cur);
        cur = {yMin:ys[i],yMax:ys[i],sum:ys[i],count:1};
      } else {
        cur.yMax = ys[i]; cur.sum += ys[i]; cur.count++;
      }
    }
    floors.push(cur);
    return floors.map(function(f,idx){
      var avg = f.sum/f.count;
      return {id:'L'+idx, label:'Level '+(idx+1)+' ('+avg.toFixed(1)+'m)', yMin:f.yMin-0.25, yMax:f.yMax+0.25};
    });
  }

  function classifyModels(models) {
    var byType = {}, byStorey = {}, byDiscipline = {}, byMaterial = {};
    models.forEach(function(model) {
      // By discipline
      var disc = model.discipline || 'other';
      if (!byDiscipline[disc]) byDiscipline[disc] = {label:disc, items:[], count:0};
      byDiscipline[disc].count += (model.elements||[]).length;
      (model.elements||[]).forEach(function(el) {
        var p = el.props || {};
        byDiscipline[disc].items.push({expressId:el.expressId, modelId:model.id});
        // By IFC type
        var t = p.ifcType || 'Unknown';
        if (!byType[t]) byType[t] = {label:t, items:[], count:0};
        byType[t].items.push({expressId:el.expressId, modelId:model.id});
        byType[t].count++;
        // By storey
        var st = p.storey || '(No storey)';
        if (!byStorey[st]) byStorey[st] = {label:st, items:[], count:0};
        byStorey[st].items.push({expressId:el.expressId, modelId:model.id});
        byStorey[st].count++;
        // By material
        var mt = p.material || '(No material)';
        if (!byMaterial[mt]) byMaterial[mt] = {label:mt, items:[], count:0};
        byMaterial[mt].items.push({expressId:el.expressId, modelId:model.id});
        byMaterial[mt].count++;
      });
    });
    return {byType:byType, byStorey:byStorey, byDiscipline:byDiscipline, byMaterial:byMaterial};
  }

  // ── BCF Import ──────────────────────────────────────────────

  function importBCF(d) {
    var inp = document.createElement('input');
    inp.type = 'file'; inp.accept = '.bcf,.bcfzip';
    inp.onchange = function(e) {
      var f = e.target.files[0]; if (!f) return;
      f.arrayBuffer().then(function(buf) {
        return JSZip.loadAsync(buf);
      }).then(function(zip) {
        var promises = [];
        zip.forEach(function(path, entry) {
          if (path.match(/markup\.bcf$/i)) {
            promises.push(entry.async('text').then(function(xml) {
              return {folder: path.split('/')[0], xml: xml};
            }));
          }
        });
        return Promise.all(promises);
      }).then(function(markups) {
        var imported = 0;
        markups.forEach(function(m) {
          try {
            var parser = new DOMParser();
            var doc = parser.parseFromString(m.xml, 'text/xml');
            var topic = doc.querySelector('Topic');
            if (!topic) return;
            var title = (topic.querySelector('Title')||{}).textContent || 'Imported topic';
            var desc = (topic.querySelector('Description')||{}).textContent || '';
            var priority = (topic.querySelector('Priority')||{}).textContent || 'normal';
            var status = (topic.getAttribute('TopicStatus')||'').toLowerCase();
            var topicType = (topic.getAttribute('TopicType')||'').toLowerCase();
            var creationDate = (topic.querySelector('CreationDate')||{}).textContent || new Date().toISOString();
            // Map BCF status to our status
            var mappedStatus = 'open';
            if (status === 'closed' || status === 'resolved') mappedStatus = 'resolved';
            else if (status === 'in progress' || status === 'in_progress') mappedStatus = 'in_progress';
            // Map type
            var mappedType = 'manual';
            if (topicType === 'issue' || topicType === 'error') mappedType = 'hard';
            else if (topicType === 'warning') mappedType = 'soft';
            d({t:'ADD_ISSUE', v:{
              id:uid(), source:'bcf_import', type:mappedType, status:mappedStatus,
              title:title, description:desc, priority:priority.toLowerCase(),
              category:'coordination', assignee:'', dueDate:'',
              createdAt:creationDate, bcfGuid:topic.getAttribute('Guid')||''
            }});
            imported++;
          } catch(e) { console.warn('BCF parse error:', e); }
        });
        if (imported > 0) {
          d({t:'TAB', v:'issues'});
          alert('Imported ' + imported + ' topic' + (imported>1?'s':'') + ' from BCF.');
        } else {
          alert('No valid topics found in BCF file.');
        }
      }).catch(function(err) {
        alert('BCF import failed: ' + err.message);
      });
    };
    inp.click();
  }

      zip.file('extensions.xml', '<?xml version="1.0" encoding="UTF-8"?>\n<Extensions xmlns="http://www.buildingsmart-tech.org/bcf/extensions/3.0"><TopicTypes><TopicType>Issue</TopicType><TopicType>Warning</TopicType><TopicType>Request</TopicType></TopicTypes><TopicStatuses><TopicStatus>Open</TopicStatus><TopicStatus>In Progress</TopicStatus><TopicStatus>Closed</TopicStatus></TopicStatuses><Priorities><Priority>Critical</Priority><Priority>High</Priority><Priority>Normal</Priority><Priority>Low</Priority></Priorities></Extensions>');
      zip.file('project.bcfp','<?xml version="1.0" encoding="UTF-8"?>\n<ProjectInfo xmlns="http://www.buildingsmart-tech.org/bcf/project/3.0"><Project ProjectId="'+guid()+'"><Name>ClashControl</Name></Project></ProjectInfo>');
    } else {

    }

    items.forEach(function(it) {
      var g = it.bcfGuid || guid(), f = zip.folder(g);
      var type = it.type==='hard'?'Issue':it.type==='soft'?'Warning':'Request';
      var st = it.status==='resolved'||it.status==='closed'?'Closed':it.status==='in_progress'?'In Progress':'Open';
      var priority = it.priority || (it.type==='hard'?'Critical':'Normal');

      // Find matching viewpoint for this item

        vp = viewpoints.find(function(v){ return v.linkedId === it.id; });
      }
      var vpGuid = vp ? guid() : null;

      var markupXmlns = v3 ? 'http://www.buildingsmart-tech.org/bcf/markup/3.0' : 'http://www.buildingsmart-tech.org/bcf/markup/2.1';
      var markup = '<?xml version="1.0" encoding="UTF-8"?>\n<Markup xmlns="'+markupXmlns+'">\n';
      // Header section (required by Solibri)
      markup += '  <Header>\n    <File IfcProject="" IfcSpatialStructureElement="" isExternal="true">\n      <Filename>ClashControl</Filename>\n      <Date>'+(it.createdAt||new Date().toISOString())+'</Date>\n    </File>\n  </Header>\n';
      markup += '  <Topic Guid="'+g+'" TopicType="'+type+'" TopicStatus="'+st+'">\n';
      markup += '    <Title>'+esc(it.title)+'</Title>\n';
      markup += '    <CreationDate>'+(it.createdAt||new Date().toISOString())+'</CreationDate>\n';
      markup += '    <CreationAuthor>ClashControl</CreationAuthor>\n';
      markup += '    <ModifiedDate>'+new Date().toISOString()+'</ModifiedDate>\n';
      markup += '    <ModifiedAuthor>ClashControl</ModifiedAuthor>\n';
      markup += '    <Description>'+esc(it.description||'')+'</Description>\n';
      markup += '    <Priority>'+priority+'</Priority>\n';
      if (it.assignee) markup += '    <AssignedTo>'+esc(it.assignee)+'</AssignedTo>\n';
      if (it.dueDate) markup += '    <DueDate>'+esc(it.dueDate)+'</DueDate>\n';
      markup += '  </Topic>\n';

      // Add viewpoint reference if available
      if (vp && vpGuid) {
        markup += '  <Viewpoints Guid="'+vpGuid+'">\n';
        markup += '    <Viewpoint>'+vpGuid+'.bcfv</Viewpoint>\n';
        if (vp.snapshot) markup += '    <Snapshot>'+vpGuid+'.png</Snapshot>\n';
        markup += '  </Viewpoints>\n';

        // Write viewpoint file with proper xmlns
        var visXmlns = v3 ? 'http://www.buildingsmart-tech.org/bcf/visualizationinfo/3.0' : 'http://www.buildingsmart-tech.org/bcf/visualizationinfo/2.1';
        var vpXml = '<?xml version="1.0" encoding="UTF-8"?>\n<VisualizationInfo Guid="'+vpGuid+'" xmlns="'+visXmlns+'">\n';
        vpXml += '  <PerspectiveCamera>\n';
        vpXml += '    <CameraViewPoint><X>'+vp.camera.px.toFixed(6)+'</X><Y>'+vp.camera.py.toFixed(6)+'</Y><Z>'+vp.camera.pz.toFixed(6)+'</Z></CameraViewPoint>\n';
        vpXml += '    <CameraDirection><X>'+vp.camera.dx.toFixed(6)+'</X><Y>'+vp.camera.dy.toFixed(6)+'</Y><Z>'+vp.camera.dz.toFixed(6)+'</Z></CameraDirection>\n';
        vpXml += '    <CameraUpVector><X>'+vp.camera.ux.toFixed(6)+'</X><Y>'+vp.camera.uy.toFixed(6)+'</Y><Z>'+vp.camera.uz.toFixed(6)+'</Z></CameraUpVector>\n';
        vpXml += '    <FieldOfView>60</FieldOfView>\n';
        vpXml += '  </PerspectiveCamera>\n';
        vpXml += '</VisualizationInfo>';
        f.file(vpGuid+'.bcfv', vpXml);

        // Write snapshot if available
        if (vp.snapshot) {
          var snapData = vp.snapshot.replace(/^data:image\/png;base64,/, '');
          f.file(vpGuid+'.png', snapData, {base64:true});
        }
      }

      markup += '</Markup>';
      f.file('markup.bcf', markup);
    });

    zip.generateAsync({type:'blob'}).then(function(blob) {
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'clashcontrol-'+versionId+'-'+new Date().toISOString().slice(0,10)+'.bcf';
      a.click();
    });
  }

  // Global flag: set true when dragging section box handles to suppress orbit

  function makeOrbit(camera, el) {

        target.x + sph.r*Math.sin(sph.phi)*Math.sin(sph.theta),
        target.y + sph.r*Math.cos(sph.phi),
        target.z + sph.r*Math.sin(sph.phi)*Math.cos(sph.theta));

    orbit.apply = function() {

        target.x + sph.r*Math.sin(sph.phi)*Math.sin(sph.theta),
        target.y + sph.r*Math.cos(sph.phi),
        target.z + sph.r*Math.sin(sph.phi)*Math.cos(sph.theta));

    };
    return orbit;
  }

        {w:hx*2,h:hz*2,pos:axY.clone().multiplyScalar(-hy),lookDir:'-y'}, // -Y (bottom)

      {label:'FRONT',  normal:[0,0,1],   up:[0,1,0]},
      {label:'BACK',   normal:[0,0,-1],  up:[0,1,0]},
      {label:'RIGHT',  normal:[1,0,0],   up:[0,1,0]},
      {label:'LEFT',   normal:[-1,0,0],  up:[0,1,0]},
      {label:'TOP',    normal:[0,1,0],   up:[0,0,-1]},
      {label:'BOTTOM', normal:[0,-1,0],  up:[0,0,1]}
    ];
    // Edge definitions: midpoints between two face normals
    var EDGES = [
      {dir:[0,1,1],   up:[0,1,0]},   // front-top
      {dir:[0,-1,1],  up:[0,-1,0]},  // front-bottom
      {dir:[1,0,1],   up:[0,1,0]},   // front-right
      {dir:[-1,0,1],  up:[0,1,0]},   // front-left
      {dir:[0,1,-1],  up:[0,1,0]},   // back-top
      {dir:[0,-1,-1], up:[0,-1,0]},  // back-bottom
      {dir:[1,0,-1],  up:[0,1,0]},   // back-right
      {dir:[-1,0,-1], up:[0,1,0]},   // back-left
      {dir:[1,1,0],   up:[0,1,0]},   // top-right
      {dir:[-1,1,0],  up:[0,1,0]},   // top-left
      {dir:[1,-1,0],  up:[0,-1,0]},  // bottom-right
      {dir:[-1,-1,0], up:[0,-1,0]}   // bottom-left
    ];
    // Corner definitions: all 8 corners
    var CORNERS = [
      {dir:[1,1,1]},  {dir:[-1,1,1]},  {dir:[1,-1,1]},  {dir:[-1,-1,1]},
      {dir:[1,1,-1]}, {dir:[-1,1,-1]}, {dir:[1,-1,-1]}, {dir:[-1,-1,-1]}
    ];

    function flyToDir(dir) {
      var S=state3d.current; if(!S||!S.orbit||!S.mg) return;
      var modelBox=S.mg.children.length>0?new THREE.Box3().setFromObject(S.mg):new THREE.Box3(new THREE.Vector3(-5,-5,-5),new THREE.Vector3(5,5,5));
      var ctr=modelBox.getCenter(new THREE.Vector3());
      var sz=modelBox.getSize(new THREE.Vector3());
      var dist=Math.max(sz.x,sz.y,sz.z)*1.5;
      var viewDir=new THREE.Vector3(dir[0],dir[1],dir[2]).normalize();
      var endPos=ctr.clone().addScaledVector(viewDir,dist);
      if(window._ccFlyToView) window._ccFlyToView(ctr,endPos);
    }

    // Create face texture with label
    function makeFaceTexture(label, isHovered) {
      var c = document.createElement('canvas');
      c.width=128; c.height=128;
      var ctx=c.getContext('2d');
      // Background
      ctx.fillStyle = isHovered ? '#3b82f6' : 'rgba(51,65,85,0.85)';
      ctx.fillRect(0,0,128,128);
      // Border
      ctx.strokeStyle = 'rgba(148,163,184,0.4)';
      ctx.lineWidth = 2;
      ctx.strokeRect(1,1,126,126);
      // Label
      ctx.fillStyle = isHovered ? '#ffffff' : '#cbd5e1';
      ctx.font = 'bold 18px system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, 64, 64);
      var tex = new THREE.CanvasTexture(c);
      tex.minFilter = THREE.LinearFilter;
      return tex;
    }

    useEffect(function() {
      var canvas = canvasRef.current;
      if(!canvas || vcState.current) return;

      var size = 120;
      var renderer = new THREE.WebGLRenderer({canvas:canvas, alpha:true, antialias:true});
      renderer.setSize(size, size);
      renderer.setPixelRatio(window.devicePixelRatio);

      var scene = new THREE.Scene();
      var camera = new THREE.OrthographicCamera(-1.8,1.8,1.8,-1.8,0.1,10);
      camera.position.set(2,2,2);
      camera.lookAt(0,0,0);

      // Ambient + directional light
      scene.add(new THREE.AmbientLight(0xffffff, 0.6));
      var dLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dLight.position.set(2,3,2);
      scene.add(dLight);

      // Build cube from 6 face planes
      var cubeGroup = new THREE.Group();
      var faceMeshes = [];
      FACES.forEach(function(f, i) {
        var geo = new THREE.PlaneGeometry(0.98, 0.98);
        var tex = makeFaceTexture(f.label, false);
        var mat = new THREE.MeshBasicMaterial({map:tex, side:THREE.FrontSide, transparent:true});
        var mesh = new THREE.Mesh(geo, mat);
        // Position and orient face
        var n = new THREE.Vector3(f.normal[0],f.normal[1],f.normal[2]);
        mesh.position.copy(n.clone().multiplyScalar(0.5));
        mesh.lookAt(n.clone().multiplyScalar(1.5));
        mesh.userData = {faceIndex:i, label:f.label, normal:f.normal};
        faceMeshes.push(mesh);
        cubeGroup.add(mesh);
      });

      // Wireframe edges for the cube
      var edgeGeo = new THREE.BoxGeometry(1,1,1);
      var edgeMat = new THREE.LineBasicMaterial({color:0x94a3b8, transparent:true, opacity:0.6});
      var edges = new THREE.LineSegments(new THREE.EdgesGeometry(edgeGeo), edgeMat);
      cubeGroup.add(edges);

      scene.add(cubeGroup);

      // Compass ring
      var compassGroup = new THREE.Group();
      var ringGeo = new THREE.RingGeometry(1.25, 1.38, 64);
      var ringMat = new THREE.MeshBasicMaterial({color:0x475569, side:THREE.DoubleSide, transparent:true, opacity:0.5});
      var ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = -Math.PI/2;
      ring.position.y = -0.01;
      compassGroup.add(ring);

      // Compass labels N/S/E/W
      var compassLabels = [{l:'N',angle:0},{l:'E',angle:Math.PI/2},{l:'S',angle:Math.PI},{l:'W',angle:-Math.PI/2}];
      compassLabels.forEach(function(cl){
        var lc = document.createElement('canvas');
        lc.width=32; lc.height=32;
        var lctx=lc.getContext('2d');
        lctx.fillStyle = cl.l==='N' ? '#ef4444' : '#94a3b8';
        lctx.font = 'bold 22px system-ui';
        lctx.textAlign='center'; lctx.textBaseline='middle';
        lctx.fillText(cl.l, 16, 16);
        var lt = new THREE.CanvasTexture(lc);
        lt.minFilter = THREE.LinearFilter;
        var lm = new THREE.MeshBasicMaterial({map:lt, transparent:true, side:THREE.DoubleSide, depthTest:false});
        var ls = new THREE.Mesh(new THREE.PlaneGeometry(0.22,0.22), lm);
        ls.position.set(Math.sin(cl.angle)*1.52, 0, -Math.cos(cl.angle)*1.52);
        ls.rotation.x = -Math.PI/2;
        compassGroup.add(ls);
      });
      scene.add(compassGroup);

      // Raycaster for picking
      var raycaster = new THREE.Raycaster();
      var mouse = new THREE.Vector2();

      vcState.current = {renderer:renderer, scene:scene, camera:camera, cubeGroup:cubeGroup,
        faceMeshes:faceMeshes, compassGroup:compassGroup, raycaster:raycaster, mouse:mouse, needsRender:true};

      // Animation loop synced to main camera
      var animId;
      function animate() {
        animId = requestAnimationFrame(animate);
        var S = state3d.current;
        var vc = vcState.current;
        if(!S || !S.camera || !vc) return;
        // Mirror main camera orientation onto cube
        vc.cubeGroup.quaternion.copy(S.camera.quaternion).invert();
        // Compass stays world-aligned (only Y rotation from camera)
        vc.compassGroup.quaternion.copy(S.camera.quaternion).invert();
        // Keep compass labels facing camera
        vc.compassGroup.children.forEach(function(child){
          if(child.material && child.material.map) {
            child.quaternion.copy(vc.compassGroup.quaternion).invert();
            child.quaternion.premultiply(vc.cubeGroup.quaternion);
          }
        });
        vc.renderer.render(vc.scene, vc.camera);
      }
      animate();

      // Mouse interaction
      function getMousePos(e) {
        var rect = canvas.getBoundingClientRect();
        vc.mouse.x = ((e.clientX-rect.left)/rect.width)*2-1;
        vc.mouse.y = -((e.clientY-rect.top)/rect.height)*2+1;
      }
      function onMove(e) {
        var vc=vcState.current; if(!vc) return;
        getMousePos(e);
        vc.raycaster.setFromCamera(vc.mouse, vc.camera);
        var hits = vc.raycaster.intersectObjects(vc.faceMeshes);
        var newHover = hits.length>0 ? hits[0].object.userData.faceIndex : null;
        if(newHover !== hovered) {
          // Reset old hover
          vc.faceMeshes.forEach(function(m,i){
            m.material.map = makeFaceTexture(m.userData.label, i===newHover);
            m.material.needsUpdate = true;
          });
          setHovered(newHover);
        }
      }
      function onClick(e) {
        var vc=vcState.current; if(!vc) return;
        getMousePos(e);
        vc.raycaster.setFromCamera(vc.mouse, vc.camera);
        // Check faces first
        var faceHits = vc.raycaster.intersectObjects(vc.faceMeshes);
        if(faceHits.length>0) {
          var f = FACES[faceHits[0].object.userData.faceIndex];
          flyToDir(f.normal);
          return;
        }
      }
      // Drag-to-orbit: dragging on the cube orbits the main camera
      var isDragging = false, dragStart = {x:0, y:0}, didDrag = false;
      function onDown(e) {
        isDragging = true;
        didDrag = false;
        dragStart.x = e.clientX;
        dragStart.y = e.clientY;
        canvas.style.cursor = 'grabbing';
      }
      function onDrag(e) {
        if (!isDragging) { onMove(e); return; }
        var dx = e.clientX - dragStart.x;
        var dy = e.clientY - dragStart.y;
        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) didDrag = true;
        if (!didDrag) return;
        dragStart.x = e.clientX;
        dragStart.y = e.clientY;
        // Rotate the main camera orbit (same as dragging the 3D view)
        var S = state3d.current;
        if (S && S.orbit) {
          S.orbit.sph.theta -= dx * 0.007;
          S.orbit.sph.phi -= dy * 0.007;
          S.orbit.apply();
          invalidate();
        }
      }
      function onUp(e) {
        if (isDragging && !didDrag) onClick(e); // click if no drag
        isDragging = false;
        canvas.style.cursor = 'pointer';
      }
      canvas.addEventListener('mousedown', onDown);
      canvas.addEventListener('mousemove', onDrag);
      canvas.addEventListener('mouseup', onUp);
      canvas.addEventListener('mouseleave', function(){
        isDragging = false;
        canvas.style.cursor = 'pointer';
        var vc=vcState.current; if(!vc) return;
        vc.faceMeshes.forEach(function(m){
          m.material.map = makeFaceTexture(m.userData.label, false);
          m.material.needsUpdate = true;
        });
        setHovered(null);
      });

      return function() {
        cancelAnimationFrame(animId);
        renderer.dispose();
      };
    }, []);

    return html`<div style=${{position:'absolute',top:'.5rem',right:'.5rem',pointerEvents:'auto',width:120,height:120}}>
      <canvas ref=${canvasRef} width="120" height="120" style=${{cursor:'pointer',width:'100%',height:'100%'}} />
    </div>`;
  }

        if(box) d({t:'SECTION_BOX',v:{enabled:true,min:[box.min.x,box.min.y,box.min.z],max:[box.max.x,box.max.y,box.max.z]}});

          <span style=${{display:'inline-flex',alignItems:'center',gap:'.15rem'}}><span style=${{width:6,height:6,borderRadius:'50%',background:'#22c55e',display:'inline-block'}}></span>Y</span>
          <span style=${{display:'inline-flex',alignItems:'center',gap:'.15rem'}}><span style=${{width:6,height:6,borderRadius:'50%',background:'#3b82f6',display:'inline-block'}}></span>Z</span>

        </div>
        ${sb.rotation ? html`<button onClick=${resetRotation} style=${{...S_BTN,marginTop:'.2rem',padding:'.1rem .3rem',background:'var(--bg-secondary)',color:'#f59e0b',fontSize:'.55rem',border:'1px solid var(--border)'}}>Reset Rotation (${Math.round((sb.rotation||0)*180/Math.PI)}°)</button>` : null}

  var S_PANELR  = {background:'var(--bg-primary)',borderLeft:'1px solid var(--border-subtle)',display:'flex',flexDirection:'column',flexShrink:0};

  function _saveCurrentProjectData(s) {
    var pid = s.activeProject||'default';
    var data = {
      clashes:s.clashes, issues:s.issues, rules:s.rules, floors:s.floors,
      viewpoints:(s.viewpoints||[]).map(function(v){return Object.assign({},v,{snapshot:undefined})}),
      measurements:s.measurements||[], filters:s.filters,
      modelMeta:s.models.map(function(m){return {id:m.id,name:m.name,discipline:m.discipline,color:m.color,visible:m.visible};})
    };
    return idbSaveProjectData(pid, data);
  }

  function _switchProject(newProjId, s, d) {
    // Save current project first
    _saveCurrentProjectData(s).then(function(){
      // Clear current scene
      if(window._ccClearScene) window._ccClearScene();
      // Reset state to fresh
      d({t:'LOAD_PROJECT_STATE', data:{
        models:[], clashes:[], issues:[], activeId:null, detecting:false,
        sectionAxis:null, sectionPos:0.5, sectionCustom:null, sectionBox:null,
        filters:Object.assign({},INIT_FILTERS), floors:[],
        measurements:[], measureMode:null, viewpoints:[],
        classifications:{}, hiddenClasses:{}, colorByClass:null,
        floorPlan:null, _highlightedStorey:null
      }});
      d({t:'SET_PROJECT', id:newProjId});
      setActiveProjectId(newProjId);
      // Trigger reload of stored files for new project (ModelSidebar will handle via effect)
      window._ccProjectSwitch = newProjId;
      window.dispatchEvent(new Event('cc-project-switch'));

          style=${{...S_BTN,background:'var(--bg-secondary)',color:'var(--text-secondary)',border:'1px solid var(--border)',fontSize:'.8rem',padding:'.3rem .5rem'}}

  // ── Model Sidebar ──────────────────────────────────────────────

  // Auto-detect discipline from IFC types
  function detectDiscipline(elements) {
    var mepTypes = {'IfcFlowSegment':1,'IfcFlowTerminal':1,'IfcFlowFitting':1,'IfcDistributionFlowElement':1,'IfcPipeSegment':1,'IfcDuctSegment':1};
    var structTypes = {'IfcBeam':1,'IfcColumn':1,'IfcFooting':1,'IfcPile':1,'IfcMember':1,'IfcPlate':1};
    var mepCount=0, structCount=0, archCount=0;
    (elements||[]).forEach(function(el){
      var t=(el.props&&el.props.ifcType)||'';
      if(mepTypes[t]) mepCount++; else if(structTypes[t]) structCount++; else archCount++;
    });
    if(mepCount>structCount&&mepCount>archCount) return 'mep';
    if(structCount>archCount) return 'structural';
    return 'architectural';
  }

  // (UnderlayImport removed — unified into the main import button in ModelSidebar)

  function ModelSidebar(props) {
    var s=props.s, d=props.d;
    var fileRef = useRef(null);
    var ld = useState(false), loading=ld[0], setLoading=ld[1];
    var lm = useState(''), loadMsg=lm[0], setLoadMsg=lm[1];
    var er = useState(''), err=er[0], setErr=er[1];
    var dg = useState(false), dragging=dg[0], setDragging=dg[1];
    var dragCounter = useRef(0);

    // Auto-load stored IFC files from IndexedDB for the active project
    function _restoreProjectFiles(projectId) {
      idbGetProjectFiles(projectId||'default').then(function(stored){
        if(!stored.length) return;
        var chain = Promise.resolve();
        stored.forEach(function(entry){
          chain = chain.then(function(){
            setLoading(true);
            setLoadMsg('Restoring ' + entry.name + '…');
            var buf = entry.buffer;
            var disc='structural', col=DISC[0].c;
            return loadIFC(buf, col, function(msg){ setLoadMsg(entry.name + ': ' + msg); }).then(function(result){
              disc = detectDiscipline(result.elements);
              var dObj = DISC.find(function(x){return x.id===disc;});
              col = dObj ? dObj.c : col;
              var fSize = result.stats ? result.stats.fileSize : buf.byteLength;
              d({t:'ADD_MODEL', v:{id:entry.id, name:entry.name.replace(/\.ifc$/i,''), discipline:disc, color:col, visible:true, meshes:result.meshes, elements:result.elements, storeys:result.storeys||[], storeyData:result.storeyData||[], stats:result.stats||{fileSize:fSize}}});
            }).catch(function(e){ console.warn('Failed to restore '+entry.name+':', e); })
              .then(function(){ setLoading(false); setLoadMsg(''); });
          });
        });
      });
    }

    var didRestore = useRef(false);
    useEffect(function(){
      if(didRestore.current) return;
      didRestore.current = true;
      _restoreProjectFiles(s.activeProject);
      // Also restore saved project session data (clashes, issues, etc.)
      idbGetProjectData(s.activeProject).then(function(data){
        if(data) d({t:'LOAD_PROJECT_STATE', data:Object.assign({}, data, {models:s.models})});
      });
    },[]);

    // Listen for project switch events
    useEffect(function(){
      function onSwitch() {
        var newProjId = window._ccProjectSwitch||'default';
        _restoreProjectFiles(newProjId);
        // Also load saved project session data (clashes, issues, etc.)
        idbGetProjectData(newProjId).then(function(data){
          if(data) d({t:'LOAD_PROJECT_STATE', data:Object.assign({}, data, {models:s.models})});
        });
      }
      window.addEventListener('cc-project-switch', onSwitch);
      return function(){ window.removeEventListener('cc-project-switch', onSwitch); };
    },[]);

    function processFiles(files) {
      setErr('');
      var errors = [];
      var chain = Promise.resolve();
      var totalIfc = 0, doneIfc = 0;
      files.forEach(function(f) {
        var ext = f.name.split('.').pop().toLowerCase();
        if (ext === 'ifc') totalIfc++;
      });
      files.forEach(function(f) {
        var ext = f.name.split('.').pop().toLowerCase();
        if (ext === 'dwg') {
          errors.push(f.name + ': DWG cannot be parsed in-browser. Convert to DXF first.');
          return;
        }
        if (ext === 'dxf') {
          chain = chain.then(function() {
            setLoadMsg('Loading ' + f.name + '…');
            return f.text().then(function(text) {
              var dxfData = parseDXF(text);
              if (dxfData.entities.length === 0) { errors.push(f.name + ': No entities found in DXF file.'); return; }
              var result = renderDXFToCanvas(dxfData, 2048, 2048);
              d({ t: 'ADD_UNDERLAY', v: { id: uid(), name: f.name, type: 'dxf', canvasData: result.canvas.toDataURL('image/png'),
                offsetX: 0, offsetY: 0, scale: 1, rotation: 0, opacity: 0.7, visible: true,
                extentW: result.extentW, extentH: result.extentH, storeyName: null }});
              d({ t: 'UNDERLAY_MODE', v: 'view2d' });
            }).catch(function(e) { errors.push(f.name + ': ' + (e.message || 'DXF parse failed')); });
          });
          return;
        }
        if (ext === 'pdf') {
          chain = chain.then(function() {
            setLoadMsg('Loading ' + f.name + '…');
            return f.arrayBuffer().then(function(buf) { return loadPDFPage(buf, 1); }).then(function(result) {
              d({ t: 'ADD_UNDERLAY', v: { id: uid(), name: f.name, type: 'pdf', canvasData: result.canvas.toDataURL('image/png'),
                offsetX: 0, offsetY: 0, scale: 1, rotation: 0, opacity: 0.7, visible: true,
                extentW: result.extentW, extentH: result.extentH, storeyName: null, numPages: result.numPages, page: 1 }});
              d({ t: 'UNDERLAY_MODE', v: 'view2d' });
            }).catch(function(e) { errors.push(f.name + ': ' + (e.message || 'PDF load failed')); });
          });
          return;
        }
        if (ext !== 'ifc') return;
        chain = chain.then(function() {
          setLoading(true);
          setLoadMsg(totalIfc > 1 ? f.name + ' (' + (doneIfc + 1) + '/' + totalIfc + ')…' : 'Loading ' + f.name + '…');

              var fSize = result.stats ? result.stats.fileSize : buf.byteLength;

              d({t:'ADD_MODEL', v:{id:modelId, name:f.name.replace(/\.ifc$/i,''), discipline:disc, color:col, visible:true, meshes:result.meshes, elements:result.elements, storeys:result.storeys||[], storeyData:result.storeyData||[], stats:result.stats||{fileSize:fSize}}});
              idbSaveFile(modelId, f.name, buf, s.activeProject||'default');
            });
          }).catch(function(er) {
            console.error(er);
            errors.push(f.name + ': ' + (er.message || 'Load failed'));
          }).then(function(){ doneIfc++; });
        });
      });
      // After all files processed, update loading state once and show accumulated errors
      chain.then(function() {
        setLoading(false);
        setLoadMsg('');
        if (errors.length) setErr(errors.join('\n'));
      });

                s.models.forEach(function(m){

  function IssuePanel(props) {
    var s=props.s, d=props.d, f=s.filters;
    var fo=useState(false), filtersOpen=fo[0], setFiltersOpen=fo[1];
    var isClashTab = s.tab==='clashes';
    var isExplorerTab = s.tab==='explorer';
    var rawItems = isClashTab ? s.clashes : s.issues;

    // Collect unique values for dynamic filter dropdowns (memoized)
    var filterLists = useMemo(function(){
      var uTypes={}, uStoreys={}, uMats={};
      var uPriorities={}, uCategories={}, uAssignees={}, uIssueTypes={}, uIssueStoreys={};
      if(isClashTab){
        s.clashes.forEach(function(c){
          if(c.elemAType) uTypes[c.elemAType]=true;
          if(c.elemBType) uTypes[c.elemBType]=true;
          if(c.elemAStorey) uStoreys[c.elemAStorey]=true;
          if(c.elemBStorey) uStoreys[c.elemBStorey]=true;
          if(c.elemAMaterial) uMats[c.elemAMaterial]=true;
          if(c.elemBMaterial) uMats[c.elemBMaterial]=true;
        });
      } else {
        s.issues.forEach(function(i){
          if(i.priority) uPriorities[i.priority]=true;
          if(i.category) uCategories[i.category]=true;
          if(i.assignee) uAssignees[i.assignee]=true;
          if(i.elementType) uIssueTypes[i.elementType]=true;
          if(i.storey) uIssueStoreys[i.storey]=true;
        });
      }
      return {types:Object.keys(uTypes).sort(), storeys:Object.keys(uStoreys).sort(), materials:Object.keys(uMats).sort(),
        priorities:Object.keys(uPriorities).sort(), categories:Object.keys(uCategories).sort(), assignees:Object.keys(uAssignees).sort(),
        issueTypes:Object.keys(uIssueTypes).sort(), issueStoreys:Object.keys(uIssueStoreys).sort()};
    }, [s.clashes, s.issues, isClashTab]);
    var typeList = filterLists.types;
    var storeyList = filterLists.storeys;
    var materialList = filterLists.materials;

    // Count active filters
    var activeCount = 0;
    if(f.status!=='all') activeCount++;
    if(f.type!=='all') activeCount++;
    if(f.discipline!=='all') activeCount++;
    if(f.floor!=='all') activeCount++;
    if(f.selfClash!=='all') activeCount++;
    if(f.elementId) activeCount++;
    if(f.distMin>0||f.distMax<9999) activeCount++;
    if(f.ifcType!=='all') activeCount++;
    if(f.storey!=='all') activeCount++;
    if(f.material!=='all') activeCount++;
    if(f.priority!=='all') activeCount++;
    if(f.category!=='all') activeCount++;
    if(f.assignee!=='all') activeCount++;
    if(f.issueElementType!=='all') activeCount++;
    if(f.issueStorey!=='all') activeCount++;

    // Apply all filters
    var items = useMemo(function(){
      return rawItems.filter(function(it){
        if(f.status!=='all' && it.status!==f.status) return false;
        if(f.search){var q=f.search.toLowerCase();if((it.title||'').toLowerCase().indexOf(q)===-1&&(it.description||'').toLowerCase().indexOf(q)===-1)return false;}
        if(isClashTab) {
          if(f.type!=='all' && it.type!==f.type) return false;
          if(f.discipline!=='all' && it.disciplines && it.disciplines.indexOf(f.discipline)===-1) return false;
          if(f.floor!=='all') {
            var fl = s.floors.find(function(x){return x.id===f.floor});
            if(fl && (it.elevation<fl.yMin||it.elevation>fl.yMax)) return false;
          }
          if(f.distMin>0 && (it.distance||0)<f.distMin) return false;
          if(f.distMax<9999 && (it.distance||0)>f.distMax) return false;
          if(f.elementId) {
            var eid=f.elementId;
            if(String(it.elemA).indexOf(eid)===-1 && String(it.elemB).indexOf(eid)===-1) return false;
          }
          if(f.selfClash==='self' && !it.selfClash) return false;
          if(f.selfClash==='cross' && it.selfClash) return false;
          if(f.ifcType!=='all' && it.elemAType!==f.ifcType && it.elemBType!==f.ifcType) return false;
          if(f.storey!=='all' && it.elemAStorey!==f.storey && it.elemBStorey!==f.storey) return false;
          if(f.material!=='all' && it.elemAMaterial!==f.material && it.elemBMaterial!==f.material) return false;
        } else {
          // Issue-specific filters
          if(f.priority!=='all' && it.priority!==f.priority) return false;
          if(f.category!=='all' && it.category!==f.category) return false;
          if(f.assignee!=='all' && (it.assignee||'')!==f.assignee) return false;
          if(f.issueElementType!=='all' && (it.elementType||'')!==f.issueElementType) return false;
          if(f.issueStorey!=='all' && (it.storey||'')!==f.issueStorey) return false;
        }
        return true;
      });
    }, [rawItems, f, isClashTab, s.floors]);

    var counts = useMemo(function(){
      return {
        oC: s.clashes.filter(function(c){return c.status==='open'}).length,
        oI: s.issues.filter(function(i){return i.status==='open'}).length
      };
    }, [s.clashes, s.issues]);
    var oC=counts.oC, oI=counts.oI;
    var FL={fontSize:'.6rem',color:'var(--text-muted)',marginBottom:'.15rem',display:'block'};
    var PILL=function(active){return Object.assign({},S_BTN,{fontSize:'.6rem',padding:'.15rem .35rem',background:active?'#2563eb':'var(--bg-secondary)',color:active?'#fff':'var(--text-faint)'});};
    var SELSTYLE={fontSize:'.65rem',padding:'.2rem .3rem',borderRadius:4,background:'var(--bg-secondary)',color:'var(--text-secondary)',border:'1px solid var(--border)',width:'100%'};

    return html`<aside style=${{...S_PANELR,width:280}}>
      <div style=${{display:'flex',borderBottom:'1px solid var(--border-subtle)',flexShrink:0}} role="tablist">
        ${[{id:'clashes',label:'Clashes',n:oC,bg:'#ef4444'},{id:'issues',label:'Issues',n:oI,bg:'#f59e0b'},{id:'explorer',label:'Explorer',n:0,bg:'#34d399'}].map(function(t){return html`
          <button key=${t.id} onClick=${function(){d({t:'TAB',v:t.id})}} role="tab" aria-selected=${s.tab===t.id}
            style=${{...S_BTN,flex:1,background:'none',borderRadius:0,padding:'.6rem',color:s.tab===t.id?'var(--text-primary)':'var(--text-faint)',borderBottom:s.tab===t.id?'2px solid #3b82f6':'2px solid transparent'}}>
            ${t.label}${t.n>0?html`<span style=${{marginLeft:'.3rem',background:t.bg,color:'#fff',fontSize:'.6rem',padding:'.05rem .35rem',borderRadius:99}}>${t.n}</span>`:''}
          </button>`})}
      </div>
      ${s.tab==='explorer' && html`<${ExplorerPanel} s=${s} d=${d} />`}
      ${s.tab!=='explorer' && html`<div style=${{padding:'.4rem',borderBottom:'1px solid var(--border-subtle)',flexShrink:0,display:'flex',gap:'.3rem'}}>
        <input type="text" placeholder="Search…" value=${f.search} onInput=${function(e){d({t:'UPD_FILTERS',u:{search:e.target.value}})}}

  function PropBlock(props) {
    var p=props.p, label=props.label;
    if (!p) return null;

    var psetKeys = p.psets ? Object.keys(p.psets) : [];

      <div style=${{fontSize:'.6rem',fontWeight:600,color:'#93c5fd',marginBottom:'.2rem'}}>${label}</div>

      ${p.objectType && html`<div style=${ROW}><span style=${LS}>Object Type</span><span style=${VS}>${p.objectType}</span></div>`}
      ${p.storey && html`<div style=${ROW}><span style=${LS}>Storey</span><span style=${VS}>${p.storey}</span></div>`}
      ${p.material && html`<div style=${ROW}><span style=${LS}>Material</span><span style=${VS}>${p.material}</span></div>`}
      <div style=${ROW}><span style=${LS}>Express ID</span><span style=${VS}>#${p.expressId}</span></div>
      ${qKeys.length>0 && html`<div style=${{marginTop:'.2rem',borderTop:'1px solid var(--border-subtle)',paddingTop:'.2rem'}}>

        ${qKeys.map(function(k){return html`<div key=${k} style=${ROW}><span style=${LS}>${k}</span><span style=${VS}>${typeof p.quantities[k]==='number'?p.quantities[k].toFixed(3):p.quantities[k]}</span></div>`})}
      </div>`}
      ${psetKeys.map(function(setName){
        var ps=p.psets[setName]; var keys=Object.keys(ps);
        return html`<div key=${setName} style=${{marginTop:'.2rem',borderTop:'1px solid var(--border-subtle)',paddingTop:'.2rem'}}>

  function ClashProps(props) {
    var it=props.item;

        <button onClick=${function(){if(_fitToElement&&it.elemB)_fitToElement(it.elemB);if(_highlightById&&it.elemB)_highlightById(it.elemB);}}

  // Group clashes by a field
  function groupClashes(items, groupBy) {
    if (!groupBy || groupBy === 'none') return null;
    var groups = {};
    items.forEach(function(it) {
      var key;
      switch(groupBy) {
        case 'storey': key = it.elemAStorey || it.elemBStorey || 'Unknown'; break;
        case 'discipline': key = (it.disciplines||[]).sort().join(' ↔ ') || 'Unknown'; break;
        case 'status': key = it.status || 'open'; break;
        case 'type': key = it.type || 'hard'; break;
        default: key = 'All';
      }
      if (!groups[key]) groups[key] = [];
      groups[key].push(it);
    });
    return Object.keys(groups).sort().map(function(k) {
      return { label: k, items: groups[k] };
    });
  }

  // Virtualized list: only render visible rows for large lists
  var ROW_HEIGHT = 65; // approx height of IssueRow in px
  function VirtualList(props) {
    var items=props.items, activeId=props.activeId, d=props.d, isClash=props.isClash, prefs=props.prefs;
    var groupBy = props.groupBy || 'none';
    var scrollRef = useRef(null);
    var _st = useState(0), scrollTop=_st[0], setScrollTop=_st[1];
    var coll = useState({}), collapsed=coll[0], setCollapsed=coll[1];
    if(items.length===0) return html`<div style=${{flex:1,overflowY:'auto'}}>
      <div style=${{textAlign:'center',color:'var(--text-faint)',fontSize:'.75rem',padding:'2.5rem 1rem'}}>
        <div style=${{fontSize:'2rem',marginBottom:'.3rem'}}>${isClash?'✅':'📋'}</div>
        ${'No '+(isClash?'clashes found yet':'issues yet')}
      </div>
    </div>`;
    // Grouped rendering
    var groups = groupClashes(items, groupBy);
    if (groups) {
      function toggleGroup(label) {
        setCollapsed(function(prev) {
          var n = Object.assign({}, prev);
          n[label] = !n[label];
          return n;
        });
      }
      return html`<div style=${{flex:1,overflowY:'auto'}}>
        ${groups.map(function(g) {
          var isOpen = !collapsed[g.label];
          var statusColors = {open:'#ef4444',in_progress:'#f59e0b',resolved:'#22c55e',closed:'#64748b',hard:'#ef4444',soft:'#f59e0b',duplicate:'#8b5cf6'};
          var dotColor = statusColors[g.label] || '#3b82f6';
          return html`<div key=${g.label}>
            <div onClick=${function(){toggleGroup(g.label)}}
              style=${{display:'flex',alignItems:'center',gap:'.3rem',padding:'.35rem .5rem',cursor:'pointer',background:'var(--bg-tertiary)',borderBottom:'1px solid var(--border-subtle)',position:'sticky',top:0,zIndex:1}}>
              <span style=${{fontSize:'.55rem',color:'var(--text-faint)'}}>${isOpen?'▼':'▶'}</span>
              <span style=${{width:8,height:8,borderRadius:'50%',background:dotColor,flexShrink:0}}></span>
              <span style=${{fontSize:'.65rem',fontWeight:600,color:'var(--text-primary)',flex:1}}>${g.label}</span>
              <span style=${{fontSize:'.6rem',color:'var(--text-faint)',background:'var(--bg-secondary)',padding:'.1rem .35rem',borderRadius:10}}>${g.items.length}</span>
            </div>
            ${isOpen && g.items.map(function(it){return html`<${IssueRow} key=${it.id} item=${it} active=${activeId===it.id} d=${d} isClash=${isClash} prefs=${prefs} />`})}
          </div>`;
        })}
      </div>`;
    }
    // For small lists, render all (no virtualization overhead)
    if(items.length <= 50) return html`<div style=${{flex:1,overflowY:'auto'}}>
      ${items.map(function(it){return html`<${IssueRow} key=${it.id} item=${it} active=${activeId===it.id} d=${d} isClash=${isClash} prefs=${prefs} />`})}
    </div>`;
    // Virtualized rendering for large lists
    var totalHeight = items.length * ROW_HEIGHT;
    var containerH = scrollRef.current ? scrollRef.current.clientHeight : 600;
    var overscan = 5;
    var startIdx = Math.max(0, Math.floor(scrollTop / ROW_HEIGHT) - overscan);
    var endIdx = Math.min(items.length, Math.ceil((scrollTop + containerH) / ROW_HEIGHT) + overscan);
    var visible = items.slice(startIdx, endIdx);
    return html`<div ref=${scrollRef} onScroll=${function(e){setScrollTop(e.target.scrollTop);}} style=${{flex:1,overflowY:'auto'}}>
      <div style=${{height:totalHeight,position:'relative'}}>
        <div style=${{position:'absolute',top:startIdx*ROW_HEIGHT,left:0,right:0}}>
          ${visible.map(function(it){return html`<${IssueRow} key=${it.id} item=${it} active=${activeId===it.id} d=${d} isClash=${isClash} prefs=${prefs} />`})}
        </div>
      </div>
    </div>`;
  }

  function IssueRow(props) {
    var it=props.item, active=props.active, d=props.d, isClash=props.isClash, pr=props.prefs||{};
    var icon = it.type==='hard'?'🔴':it.type==='soft'?'🟡':it.source==='element'?'🏗':'📌';
    var stBg = (STAT[it.status]||STAT.open).bg;
    return html`<div onClick=${function(){
        var wasActive=active;
        d({t:'ACTIVE',id:wasActive?null:it.id});
        // Auto turn off section box when selecting a different clash/issue
        if(!wasActive && window._ccCurrentSbox && window._ccDispatch){
          window._ccDispatch({t:'SECTION_BOX',v:null});
        }
        if(wasActive){
          // Deselecting: restore transparency, remove clash marker
          if(_unghostAll)_unghostAll();
          if(window._ccRemoveActiveClashMarker) window._ccRemoveActiveClashMarker();
          return;
        }
        if(pr.autoHighlight!==false){
          var ids=[];
          if(it.elemA) ids.push(it.elemA);
          if(it.elemB) ids.push(it.elemB);
          if(it.elementId) ids.push(it.elementId);
          if(ids.length&&_ghostOthers) _ghostOthers(ids);
          if(it.elemA&&_highlightById) _highlightById(it.elemA,false);
          if(it.elementId&&_highlightById) _highlightById(it.elementId,false);
          // Show bright blue marker at clash point
          if(it.point && window._ccShowActiveClashMarker) window._ccShowActiveClashMarker(it.point);
        }
        if(pr.autoFlyTo!==false){
          var flyIds=[];
          if(it.elemA) flyIds.push(it.elemA);
          if(it.elemB) flyIds.push(it.elemB);
          if(it.elementId) flyIds.push(it.elementId);
          if(_flyToElements && flyIds.length) _flyToElements(flyIds, it.point);
          else if(it.point && _flyTo) _flyTo(it.point);
        }
      }}
      style=${{padding:'.6rem .7rem',borderBottom:'1px solid var(--border-subtle)',cursor:'pointer',background:active?'var(--bg-secondary)':'transparent',borderLeft:active?'2px solid #3b82f6':'2px solid transparent'}}>

        <span style=${{fontSize:'.85rem',flexShrink:0}}>${icon}</span>

          ${!isClash && it.elementType && html`<div style=${{display:'flex',gap:'.2rem',marginTop:'.15rem',flexWrap:'wrap'}}>
            <span style=${{fontSize:'.5rem',background:'#1e3a5f',color:'#93c5fd',padding:'.05rem .25rem',borderRadius:3}}>${it.elementType}</span>
            ${it.storey && html`<span style=${{fontSize:'.5rem',background:'var(--bg-secondary)',color:'var(--text-secondary)',padding:'.05rem .25rem',borderRadius:3}}>${it.storey}</span>`}
          </div>`}
        </div>
      </div>
      ${active && html`<div style=${{marginTop:'.4rem',paddingTop:'.4rem',borderTop:'1px solid var(--border)'}}>
        <div style=${{display:'flex',gap:'.25rem',marginBottom:'.4rem',flexWrap:'wrap'}}>
          ${Object.keys(STAT).map(function(k){return html`<button key=${k}
            onClick=${function(e){e.stopPropagation();d({t:isClash?'UPD_CLASH':'UPD_ISSUE',id:it.id,u:{status:k}})}}
            style=${{...S_BTN,fontSize:'.6rem',padding:'.15rem .35rem',background:it.status===k?STAT[k].bg:'var(--bg-secondary)',color:it.status===k?'#fff':'var(--text-faint)'}}>${STAT[k].label}</button>`})}
        </div>
        ${(it.propsA||it.propsB) && html`<${ClashProps} item=${it} />`}
        ${!isClash && it.elementProps && html`<${PropBlock} p=${it.elementProps} label=${'Linked: '+(it.elementType||'')+' '+(it.elementName||'#'+it.elementId)} />`}
        ${!isClash && it.assignee && html`<div style=${{fontSize:'.55rem',color:'var(--text-secondary)',marginTop:'.2rem'}}>Assigned: ${it.assignee}</div>`}
        ${!isClash && it.dueDate && html`<div style=${{fontSize:'.55rem',color:'var(--text-secondary)'}}>Due: ${it.dueDate}</div>`}
        ${!isClash && it.category && html`<div style=${{fontSize:'.55rem',color:'var(--text-muted)'}}>Category: ${it.category}</div>`}
      </div>`}
