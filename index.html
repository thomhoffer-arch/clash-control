      case A.MARKUP_TOOL:     return Object.assign({},s,{markupTool:a.v});
      // Bulk selection
      case A.SELECT_TOGGLE:  var sel2=Object.assign({},s.selected); if(sel2[a.id])delete sel2[a.id];else sel2[a.id]=true; return Object.assign({},s,{selected:sel2});
      case A.SELECT_ALL:     var sa={}; (a.ids||[]).forEach(function(id){sa[id]=true;}); return Object.assign({},s,{selected:sa});
      case A.SELECT_NONE:    return Object.assign({},s,{selected:{}});
      case A.SELECT_MODE:    return Object.assign({},s,{selectMode:a.v,selected:a.v?s.selected:{}});
      case A.BATCH_UPD_CLASH:  return Object.assign({},s,{clashes:s.clashes.map(function(c){
        if(!s.selected[c.id]) return c;
        var upd=Object.assign({},c,a.u);
        if(a.u&&a.u.status&&a.u.status!==c.status){
          var sigs=(c.aiSignals||[]).slice();
          if(a.u.status==='resolved'||a.u.status==='in_progress') sigs.push({type:'weak_positive',source:'status_change',value:a.u.status,ts:Date.now()});
          else if(a.u.status==='closed') sigs.push({type:'weak_negative',source:'status_change',value:'closed',ts:Date.now()});
          upd.aiSignals=sigs;
        }
        return upd;
      }),selected:{}});
      case A.BATCH_UPD_ISSUE:  return Object.assign({},s,{issues:s.issues.map(function(i){return s.selected[i.id]?Object.assign({},i,a.u):i;}),selected:{}});
      // Revit Bridge
      case A.UPD_BRIDGE:      return Object.assign({},s,{revitBridge:Object.assign({},s.revitBridge,a.u)});
      case A.BRIDGE_LOG:      return Object.assign({},s,{revitBridge:Object.assign({},s.revitBridge,{log:s.revitBridge.log.concat([{ts:Date.now(),type:a.logType||'info',text:a.text}])})});
      case A.CLEAR_BRIDGE_LOG:return Object.assign({},s,{revitBridge:Object.assign({},s.revitBridge,{log:[]})});
      case A.REVIT_BRIDGE:    return Object.assign({},s,{showRevitBridge:a.v});
      default:            return s;
    }
  }

  // ── IndexedDB persistence for IFC files ────────────────────────
  var IDB_NAME = 'ClashControlFiles';
  var IDB_STORE = 'ifcFiles';
  var IDB_PROJSTORE = 'projects';
  var IDB_GEOCACHE = 'geoCache';
  var IDB_VERSION = 3;

  function _openIDB() {
    return new Promise(function(resolve, reject) {
      var req = indexedDB.open(IDB_NAME, IDB_VERSION);
      req.onupgradeneeded = function(e) {
        var db = e.target.result;
        if(!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE, {keyPath:'id'});
        if(!db.objectStoreNames.contains(IDB_PROJSTORE)) db.createObjectStore(IDB_PROJSTORE, {keyPath:'id'});
        if(!db.objectStoreNames.contains(IDB_GEOCACHE)) db.createObjectStore(IDB_GEOCACHE, {keyPath:'id'});
      };
      req.onsuccess = function(e) { resolve(e.target.result); };
      req.onerror = function(e) { reject(e.target.error); };
    });
  }

  function idbSaveFile(id, name, buffer, projectId) {
    return _openIDB().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx = db.transaction(IDB_STORE, 'readwrite');
        tx.objectStore(IDB_STORE).put({id:id, name:name, buffer:buffer, projectId:projectId||'default', savedAt:Date.now()});
        tx.oncomplete = function() { resolve(); };
        tx.onerror = function(e) { reject(e.target.error); };
      });
    }).catch(function(e) { console.warn('Failed to save IFC to IndexedDB:', e); });
  }

  function idbDeleteFile(id) {
    return _openIDB().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx = db.transaction(IDB_STORE, 'readwrite');
        tx.objectStore(IDB_STORE).delete(id);
        tx.oncomplete = function() { resolve(); };
        tx.onerror = function(e) { reject(e.target.error); };
      });
    }).catch(function(e) { console.warn('Failed to delete IFC from IndexedDB:', e); });
  }

  function idbGetProjectFiles(projectId) {
    return _openIDB().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx = db.transaction(IDB_STORE, 'readonly');
        var req = tx.objectStore(IDB_STORE).getAll();
        req.onsuccess = function() {
          var all = req.result||[];
          resolve(all.filter(function(f){ return f.projectId===(projectId||'default'); }));
        };
        req.onerror = function(e) { reject(e.target.error); };
      });
    }).catch(function(e) { console.warn('Failed to read IndexedDB:', e); return []; });
  }

  function idbDeleteProjectFiles(projectId) {
    return idbGetProjectFiles(projectId).then(function(files){
      return _openIDB().then(function(db){
        return new Promise(function(resolve, reject){
          var tx = db.transaction(IDB_STORE, 'readwrite');
          var store = tx.objectStore(IDB_STORE);
          files.forEach(function(f){ store.delete(f.id); });
          tx.oncomplete = function(){ resolve(); };
          tx.onerror = function(e){ reject(e.target.error); };
        });
      });
    });
  }

  // Background cleanup: delete geo cache entries that don't belong to any project file
  function _idbCleanOrphanedGeoCache() {
    _openIDB().then(function(db) {
      // Get all file IDs across all projects
      return new Promise(function(resolve, reject) {
        var tx = db.transaction(IDB_STORE, 'readonly');
        var req = tx.objectStore(IDB_STORE).getAll();
        req.onsuccess = function() { resolve((req.result||[]).map(function(f){ return f.id; })); };
        req.onerror = function() { resolve([]); };
      }).then(function(validIds) {
        var validSet = {};
        validIds.forEach(function(id){ validSet[id] = true; });
        // Get all geo cache keys
        return new Promise(function(resolve, reject) {
          var tx2 = db.transaction(IDB_GEOCACHE, 'readonly');
          var req2 = tx2.objectStore(IDB_GEOCACHE).getAllKeys();
          req2.onsuccess = function() { resolve(req2.result||[]); };
          req2.onerror = function() { resolve([]); };
        }).then(function(cacheKeys) {
          var orphans = cacheKeys.filter(function(k){ return !validSet[k]; });
          if (!orphans.length) return;
          var tx3 = db.transaction(IDB_GEOCACHE, 'readwrite');
          var store = tx3.objectStore(IDB_GEOCACHE);
          orphans.forEach(function(k){ store.delete(k); });
          console.log('Cleaned ' + orphans.length + ' orphaned geo cache entries');
        });
      });
    }).catch(function(e) { /* silent — cleanup is best-effort */ });
  }

  // Serialise a loadIFC result to plain objects/ArrayBuffers for IDB storage.
  function _geoSerialize(result) {
    var meshData = result.meshes.map(function(m) {
      var g = m.geometry, mat = m.material;
      // Explicitly copy typed arrays — web-ifc returns views of WASM heap that may be freed
      return {
        eid: m.userData.expressId,
        pos: new Float32Array(g.attributes.position.array).buffer,
        nrm: new Float32Array(g.attributes.normal.array).buffer,
        idx: new Uint32Array(g.index.array).buffer,
        mtx: Array.from(m.matrix.elements),
        col: [mat.color.r, mat.color.g, mat.color.b, mat.opacity],
        tr:  mat.transparent ? 1 : 0
      };
    });
    var elData = result.elements.map(function(el) {
      return {
        eid:  el.expressId,
        box:  [el.box.min.x, el.box.min.y, el.box.min.z, el.box.max.x, el.box.max.y, el.box.max.z],
        props: el.props
      };
    });
    return {v:2, meshData:meshData, elData:elData, storeys:result.storeys, storeyData:result.storeyData, relatedPairs:result.relatedPairs||{}, stats:result.stats};
  }

  // Reconstruct Three.js objects from a serialised geo cache entry.
  function _geoDeserialize(cached) {
    var meshByEid = {};
    var meshes = cached.meshData.map(function(md) {
      var geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(md.pos), 3));
      geo.setAttribute('normal',   new THREE.BufferAttribute(new Float32Array(md.nrm), 3));
      geo.setIndex(new THREE.BufferAttribute(new Uint32Array(md.idx), 1));
      var c = md.col;
      var mat = new THREE.MeshPhongMaterial({color:new THREE.Color(c[0],c[1],c[2]), opacity:c[3], transparent:!!md.tr, side:THREE.DoubleSide});
      var mesh = new THREE.Mesh(geo, mat);
      mesh.applyMatrix4(new THREE.Matrix4().fromArray(md.mtx));
      mesh.userData.expressId = md.eid;
      if(!meshByEid[md.eid]) meshByEid[md.eid] = [];
      meshByEid[md.eid].push(mesh);
      return mesh;
    });
    var elements = cached.elData.map(function(ed) {
      var b = ed.box;
      return {
        expressId: ed.eid,
        meshes: meshByEid[ed.eid] || [],
        box:    new THREE.Box3(new THREE.Vector3(b[0],b[1],b[2]), new THREE.Vector3(b[3],b[4],b[5])),
        props:  ed.props
      };
    });
    return {meshes:meshes, elements:elements, storeys:cached.storeys, storeyData:cached.storeyData, relatedPairs:cached.relatedPairs||{}, stats:cached.stats};
  }

  function safeStr(v) {
    if (v == null) return '';
    if (typeof v === 'object' && v.value != null) return String(v.value);
    return String(v);
  }

  // Extract element axis direction from IFC placement (for clash detection optimization)
  // Returns [dx,dy,dz] normalized direction or null if not available
  function _extractAxis(api, modelID, line) {
    try {
      var op = line.ObjectPlacement;
      if (!op || !op.value) return null;
      var placement = api.GetLine(modelID, op.value);
      if (!placement || !placement.RelativePlacement) return null;
      var rp = api.GetLine(modelID, placement.RelativePlacement.value);
      if (!rp) return null;
      // IfcAxis2Placement3D has Axis (Z-direction of local frame)
      // For beams/pipes this is typically the element's long axis
      if (rp.Axis && rp.Axis.value) {
        var axDir = api.GetLine(modelID, rp.Axis.value);
        if (axDir && axDir.DirectionRatios) {
          var dr = axDir.DirectionRatios;
          var dx = dr[0] && dr[0].value != null ? dr[0].value : dr[0];
          var dy = dr[1] && dr[1].value != null ? dr[1].value : dr[1];
          var dz = dr[2] && dr[2].value != null ? dr[2].value : dr[2];
          var len = Math.sqrt(dx*dx+dy*dy+dz*dz);
          if (len > 1e-10) return [dx/len, dy/len, dz/len];
        }
      }
    } catch(e) {}
    return null;
  }

  function extractProperties(api, modelID, expressID) {
    var props = {expressId:expressID, globalId:'', ifcType:'', name:'', description:'', objectType:'', storey:'', storeyId:null, material:'', quantities:{}, psets:{}};
    try {
      var line = api.GetLine(modelID, expressID);
      if (line) {
        // Store the raw type ID for lookups
        if (line.type != null) props.typeId = line.type;
        // Type resolution order: 1) explicit IFC_TYPE_NAMES lookup, 2) constructor name (if non-generic), 3) 'Element'
        if (line.type != null && IFC_TYPE_NAMES[line.type]) {
          props.ifcType = IFC_TYPE_NAMES[line.type];
        } else {
          var ctorName = (line.constructor && line.constructor.name) || '';
          props.ifcType = (ctorName && ctorName !== 'Object' && ctorName !== 'IfcProduct') ? ctorName : 'Element';
        }
        props.globalId = safeStr(line.GlobalId);
        props.name = safeStr(line.Name);
        props.description = safeStr(line.Description);
        props.objectType = safeStr(line.ObjectType);
        // Extract axis direction for linear elements (beams, columns, pipes, ducts)
        // Only for types where axis data is useful for clash optimization
        var tid = line.type;
        if (tid === IFC.IFCBEAM || tid === IFC.IFCCOLUMN || tid === IFC.IFCMEMBER ||
            tid === IFC.IFCPIPESEGMENT || tid === IFC.IFCDUCTSEGMENT ||
            tid === IFC.IFCFLOWSEGMENT || tid === IFC.IFCPILE) {
          props.axis = _extractAxis(api, modelID, line);
        }
      }
    } catch(e) {}
    return props;
  }

  function extractStoreys(api, modelID) {
    // Build map: elementExpressID -> storeyName, plus storeyData with elevations
    var storeyMap = {};
    var storeyData = []; // [{name, elevation}]
    try {
      var storeyIds = api.GetLineIDsWithType(modelID, IFC.IFCBUILDINGSTOREY);
      var storeys = {};
      for (var i = 0; i < storeyIds.size(); i++) {
        var sid = storeyIds.get(i);
        try {
          var sl = api.GetLine(modelID, sid);
          var name = safeStr(sl.Name) || ('Storey #'+sid);
          storeys[sid] = name;
          // Extract elevation from IfcBuildingStorey
          var elev = 0;
          if (sl.Elevation != null) {
            elev = typeof sl.Elevation === 'object' ? (sl.Elevation.value||0) : sl.Elevation;
          }
          storeyData.push({name:name, elevation:Number(elev)||0, id:sid});
        } catch(e) { storeys[sid] = 'Storey #'+sid; }
      }
      // IfcRelContainedInSpatialStructure links elements to storeys
      var relIds = api.GetLineIDsWithType(modelID, IFC.IFCRELCONTAINEDINSPATIALSTRUCTURE);
      for (var i = 0; i < relIds.size(); i++) {
        try {
          var rel = api.GetLine(modelID, relIds.get(i));
          var structId = rel.RelatingStructure ? (rel.RelatingStructure.value||rel.RelatingStructure) : null;
          var storeyName = storeys[structId] || '';
          if (storeyName && rel.RelatedElements) {
            var els = rel.RelatedElements;
            for (var j = 0; j < els.length; j++) {
              var eid = els[j].value != null ? els[j].value : els[j];
              storeyMap[eid] = storeyName;
            }
          }
        } catch(e) {}
      }
    } catch(e) { console.warn('Storey extraction failed:', e.message||e); }
    // Sort storeyData by elevation
    storeyData.sort(function(a,b){return a.elevation-b.elevation;});
    return {map:storeyMap, data:storeyData};
  }

  // Pre-build material map: expressID -> material name (scans relations once, not per element)
  // Resolve material name from any IFC material entity
  function resolveMaterialName(api, modelID, mat) {
    if (!mat) return '';
    // Direct material with Name
    if (mat.Name) return safeStr(mat.Name);
    // IfcMaterialLayerSetUsage → ForLayerSet → MaterialLayers
    if (mat.ForLayerSet || mat.MaterialLayers) {
      var layerSet = mat.ForLayerSet ? api.GetLine(modelID, mat.ForLayerSet.value != null ? mat.ForLayerSet.value : mat.ForLayerSet) : mat;
      if (layerSet) {
        if (layerSet.Name) return safeStr(layerSet.Name);
        if (layerSet.MaterialLayers) {
          var names = [];
          for (var k = 0; k < layerSet.MaterialLayers.length; k++) {
            try {
              var lid = layerSet.MaterialLayers[k].value != null ? layerSet.MaterialLayers[k].value : layerSet.MaterialLayers[k];
              var layer = api.GetLine(modelID, lid);
              if (layer && layer.Material) {
                var mid = layer.Material.value != null ? layer.Material.value : layer.Material;
                var m2 = api.GetLine(modelID, mid);
                if (m2 && m2.Name) names.push(safeStr(m2.Name));
              }
            } catch(e) {}

            var verts = api.GetVertexArray(gd.GetVertexData(), gd.GetVertexDataSize());
            var indices = api.GetIndexArray(gd.GetIndexData(), gd.GetIndexDataSize());

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));

            var col = c ? new THREE.Color(c.x, c.y, c.z) : new THREE.Color(fallbackColor);

    var idB = (clash.globalIdB && clash.globalIdB !== '') ? clash.globalIdB : ('eid:'+clash.elemB);
    // Sort pair so A/B labelling order doesn't matter
    return idA < idB ? idA+'|'+idB : idB+'|'+idA;
  }

  function computeClashIdentityKey(clash) {
    var pair = computeClashPair(clash);
    // Quantise contact point to 500mm grid cell
    var p = clash.point || [0,0,0];
    var gx = Math.round(p[0] / 0.5);
    var gy = Math.round(p[1] / 0.5);
    var gz = Math.round(p[2] / 0.5);
    return pair + '@' + gx + ',' + gy + ',' + gz;
  }

  // ── Denied clash suppression ──────────────────────────────────
  // Store denied clash identity keys so they are suppressed on re-detection,
  // unless the elements have moved (contact point shifted beyond adjacent cells).
  function _getDeniedClashStore() {
    try { return JSON.parse(localStorage.getItem('cc_denied_clashes')||'{}'); } catch(e) { return {}; }
  }
  function _saveDeniedClash(clash) {
    try {
      var store = _getDeniedClashStore();
      var pair = computeClashPair(clash);
      var p = clash.point||[0,0,0];
      store[pair] = {point:[p[0],p[1],p[2]], ts:Date.now()};
      localStorage.setItem('cc_denied_clashes', JSON.stringify(store));
    } catch(e) {}
  }
  function _isDeniedClash(clash) {
    var store = _getDeniedClashStore();
    var pair = computeClashPair(clash);
    var denied = store[pair];
    if (!denied) return false;
    // If contact point moved more than 150mm, elements likely moved — allow re-detection
    var p = clash.point||[0,0,0], dp = denied.point||[0,0,0];
    var distMm = Math.sqrt(Math.pow((p[0]-dp[0])*1000,2)+Math.pow((p[1]-dp[1])*1000,2)+Math.pow((p[2]-dp[2])*1000,2));
    return distMm <= 150;
  }

  function mergeDetectionResults(newClashes, prevClashes) {
    // Filter out previously denied clashes (unless elements moved)
    newClashes = newClashes.filter(function(c){ return !_isDeniedClash(c); });
    if (!prevClashes || prevClashes.length === 0) {
      // First ever run — tag everything as new
      var now0 = Date.now();
      var firstRun = newClashes.map(function(c) {
        return Object.assign({}, c, {_identityKey:computeClashIdentityKey(c), _delta:'new', _firstSeen:now0, _lastSeen:now0, _runCount:1});
      });
      return {clashes:firstRun, deltaSummary:{newCount:firstRun.length,persisting:0,autoResolved:0,ts:now0}};
    }
    var now = Date.now();
    // Build lookup: identity key → previous clash (also index adjacent cells)
    var prevByKey = {};
    prevClashes.forEach(function(c) {
      var key = c._identityKey || computeClashIdentityKey(c);
      prevByKey[key] = c;
    });

    var newKeys = {};
    var merged = newClashes.map(function(c) {
      var key = computeClashIdentityKey(c);
      newKeys[key] = true;
      // Try exact match first
      var prev = prevByKey[key];
      // If no exact match, check 26 adjacent grid cells (handles contact point drift across cell boundary)
      if (!prev) {
        var p = c.point || [0,0,0];
        var gx = Math.round(p[0]/0.5), gy = Math.round(p[1]/0.5), gz = Math.round(p[2]/0.5);
        var pair = computeClashPair(c);
        outer: for (var dx=-1; dx<=1; dx++) { for (var dy=-1; dy<=1; dy++) { for (var dz=-1; dz<=1; dz++) {
          if (dx===0 && dy===0 && dz===0) continue;
          var adjKey = pair+'@'+(gx+dx)+','+(gy+dy)+','+(gz+dz);
          var cand = prevByKey[adjKey];
          if (cand) {
            var pp = cand.point||[0,0,0];
            var distMm = Math.sqrt(Math.pow((p[0]-pp[0])*1000,2)+Math.pow((p[1]-pp[1])*1000,2)+Math.pow((p[2]-pp[2])*1000,2));
            if (distMm <= 300) { prev = cand; newKeys[adjKey] = true; break outer; }
          }
        }}}
      }
      if (prev) {
        // Persisting — carry forward human state, update geometry
        return Object.assign({}, c, {
          id: prev.id,
          _identityKey: key,
          _delta: 'persisting',
          _firstSeen: prev._firstSeen || now,
          _lastSeen: now,
          _runCount: (prev._runCount || 1) + 1,
          _prevDepth: prev.distance,
          _prevPoint: prev.point,
          status: prev.status === 'auto_resolved' ? 'open' : prev.status,
          aiSignals: prev.aiSignals,
          aiFeedback: prev.aiFeedback,
          aiReasons: prev.aiReasons,
          aiResolution: prev.aiResolution,
          aiNote: prev.aiNote,
          clashTypeConfirmed: prev.clashTypeConfirmed,
          linkedIssueId: prev.linkedIssueId,
        });
      }
      return Object.assign({}, c, {_identityKey:key, _delta:'new', _firstSeen:now, _lastSeen:now, _runCount:1});
    });

    // Auto-resolve open clashes no longer detected (cap at 200 to prevent unbounded growth)
    var arCount = 0, AR_CAP = 200;
    prevClashes.forEach(function(c) {
      if (arCount >= AR_CAP) return;
      var key = c._identityKey || computeClashIdentityKey(c);
      if (!newKeys[key] && (c.status==='open' || c.status==='in_progress')) {
        merged.push(Object.assign({}, c, {_delta:'auto_resolved', _lastSeen:now, status:'auto_resolved'}));
        arCount++;
      }
    });

    // Compute delta summary inline to avoid extra iteration in reducer
    var _nw=0,_pe=0,_ar=0;
    merged.forEach(function(c){if(c._delta==='new')_nw++;else if(c._delta==='persisting')_pe++;else if(c._delta==='auto_resolved')_ar++;});
    return {clashes:merged, deltaSummary:{newCount:_nw,persisting:_pe,autoResolved:_ar,ts:now}};
  }

  function classifyModels(models) {
    var byType = {}, byStorey = {}, byDiscipline = {}, byMaterial = {};
    models.forEach(function(model) {
      // By discipline
      var disc = model.discipline || 'other';
      if (!byDiscipline[disc]) byDiscipline[disc] = {label:disc, items:[], count:0};
      byDiscipline[disc].count += (model.elements||[]).length;
      (model.elements||[]).forEach(function(el) {
        var p = el.props || {};
        byDiscipline[disc].items.push({expressId:el.expressId, modelId:model.id});
        // By IFC type
        var t = p.ifcType || 'Unknown';
        if (!byType[t]) byType[t] = {label:t, items:[], count:0};
        byType[t].items.push({expressId:el.expressId, modelId:model.id});
        byType[t].count++;
        // By storey
        var st = p.storey || '(No storey)';
        if (!byStorey[st]) byStorey[st] = {label:st, items:[], count:0};
        byStorey[st].items.push({expressId:el.expressId, modelId:model.id});
        byStorey[st].count++;
        // By material
        var mt = p.material || '(No material)';
        if (!byMaterial[mt]) byMaterial[mt] = {label:mt, items:[], count:0};
        byMaterial[mt].items.push({expressId:el.expressId, modelId:model.id});
        byMaterial[mt].count++;
      });
    });
    return {byType:byType, byStorey:byStorey, byDiscipline:byDiscipline, byMaterial:byMaterial};
  }

  function importBCF(d) {
    var inp = document.createElement('input');
    inp.type = 'file'; inp.accept = '.bcf,.bcfzip';
    inp.onchange = function(e) {
      var f = e.target.files[0]; if (!f) return;
      f.arrayBuffer().then(function(buf) {
        return JSZip.loadAsync(buf);
      }).then(function(zip) {
        var promises = [];
        zip.forEach(function(path, entry) {
          if (path.match(/markup\.bcf$/i)) {
            promises.push(entry.async('text').then(function(xml) {
              return {folder: path.split('/')[0], xml: xml};
            }));
          }
        });
        return Promise.all(promises);
      }).then(function(markups) {
        var imported = 0;
        markups.forEach(function(m) {
          try {
            var parser = new DOMParser();
            var doc = parser.parseFromString(m.xml, 'text/xml');
            var topic = doc.querySelector('Topic');
            if (!topic) return;
            var title = (topic.querySelector('Title')||{}).textContent || 'Imported topic';
            var desc = (topic.querySelector('Description')||{}).textContent || '';
            var priority = (topic.querySelector('Priority')||{}).textContent || 'normal';
            var status = (topic.getAttribute('TopicStatus')||'').toLowerCase();
            var topicType = (topic.getAttribute('TopicType')||'').toLowerCase();
            var creationDate = (topic.querySelector('CreationDate')||{}).textContent || new Date().toISOString();
            // Map BCF status to our status
            var mappedStatus = 'open';
            if (status === 'closed' || status === 'resolved') mappedStatus = 'resolved';
            else if (status === 'in progress' || status === 'in_progress') mappedStatus = 'in_progress';
            // Map type
            var mappedType = 'manual';
            if (topicType === 'issue' || topicType === 'error') mappedType = 'hard';
            else if (topicType === 'warning') mappedType = 'soft';
            d({t:A.ADD_ISSUE, v:{
              id:uid(), source:'bcf_import', type:mappedType, status:mappedStatus,
              title:title, description:desc, priority:priority.toLowerCase(),
              category:'coordination', assignee:'', dueDate:'',
              createdAt:creationDate, bcfGuid:topic.getAttribute('Guid')||''
            }});
            imported++;
          } catch(e) { console.warn('BCF parse error:', e); }
        });
        if (imported > 0) {
          d({t:A.TAB, v:'issues'});
          alert('Imported ' + imported + ' topic' + (imported>1?'s':'') + ' from BCF.');
        } else {
          alert('No valid topics found in BCF file.');
        }
      }).catch(function(err) {
        alert('BCF import failed: ' + err.message);
      });
    };
    inp.click();
  }

  // ── Clash Training Data (localStorage) ─────────────────────────
  // Keyed by clash ID; each entry holds the feature vector and latest label.
  // Cap at 5,000 records. Wrapped in try/catch — never interrupts main flow.
  var _CLASH_TRAIN_CAP = 5000;
  function _getClashTrainStore() {
    try { return JSON.parse(localStorage.getItem('cc_clash_training_data')||'{}'); } catch(e) { return {}; }
  }
  function _saveClashTrainRecord(id, fv, label, labelSource, synthetic) {
    try {
      if (synthetic) return; // Skip incomplete data — only store user-confirmed/denied clashes
      var store = _getClashTrainStore();
      var existing = store[id];
      // Keep strongest label (higher wins; verdict always beats thumbs/AI feedback)
      if (existing && existing.label != null && label != null) {
        var srcPri = {verdict:4, explicit_feedback:3, thumbs_feedback:3, issue_created:2, status_change:1, semantic_filter:0};
        if ((srcPri[labelSource]||0) < (srcPri[existing.label_source]||0)) return;
        if ((srcPri[labelSource]||0) === (srcPri[existing.label_source]||0) && label <= existing.label) return;
      }
      store[id] = {fv:fv, label:label, label_source:labelSource, synthetic:!!synthetic, ts:Date.now()};
      // Cap: remove oldest if over limit
      var keys = Object.keys(store);
      if (keys.length > _CLASH_TRAIN_CAP) {
        keys.sort(function(a,b){return (store[a].ts||0)-(store[b].ts||0);});
        while(keys.length > _CLASH_TRAIN_CAP) { delete store[keys.shift()]; }
      }
      localStorage.setItem('cc_clash_training_data', JSON.stringify(store));
      window.dispatchEvent(new Event('cc-training-data-change'));
    } catch(e) {}
  }

  // ── Navigation Cube (Revit-style 3D cube with compass) ────────
  // Supports face, edge, and corner clicks for 26 snap directions.
  // Touch-enabled for mobile. Drag to orbit the main viewport.
  // Camera is along +Z so cube orientation directly matches the grid axes.
  function ViewCube(props) {
    var state3d = props.state3d;
    var theme = props.theme || 'dark';
    var canvasRef = useRef(null);
    var vcState = useRef(null);

    // Face definitions: label + normal. Order MUST stay fixed (BOX_FACE_MAP depends on it).
    var FACES = [
      {label:'FRONT',  normal:[0,0,1]},
      {label:'BACK',   normal:[0,0,-1]},
      {label:'RIGHT',  normal:[1,0,0]},
      {label:'LEFT',   normal:[-1,0,0]},
      {label:'TOP',    normal:[0,1,0]},
      {label:'BOTTOM', normal:[0,-1,0]}
    ];
    // BoxGeometry material group order: +X, -X, +Y, -Y, +Z, -Z = RIGHT, LEFT, TOP, BOTTOM, FRONT, BACK
    var BOX_FACE_MAP = [2, 3, 4, 5, 0, 1]; // boxGeo slot → FACES index
    // Base face colors — dark faces on light theme, brighter faces on dark theme for readability
    var FACE_CLR = theme==='light'
      ? {FRONT:0x8494a7, BACK:0x7a8a9d, RIGHT:0x8494a7, LEFT:0x7a8a9d, TOP:0x8ea0b5, BOTTOM:0x708090}
      : {FRONT:0x3a5f8a, BACK:0x34537a, RIGHT:0x3a5f8a, LEFT:0x34537a, TOP:0x406690, BOTTOM:0x2e4a6e};

    function flyToDir(dir) {
      var S=state3d.current; if(!S||!S.orbit) return;
      var ctr=new THREE.Vector3();
      if(S.mg&&S.mg.children.length>0) new THREE.Box3().setFromObject(S.mg).getCenter(ctr);
      var d=new THREE.Vector3(dir[0],dir[1],dir[2]).normalize();
      var targetTheta=Math.atan2(d.x,d.z);
      var targetPhi=Math.max(0.05,Math.min(Math.PI-0.05,Math.acos(d.y)));
      var startTheta=S.orbit.sph.theta, startPhi=S.orbit.sph.phi;
      var dTheta=targetTheta-startTheta;
      while(dTheta>Math.PI) dTheta-=2*Math.PI;
      while(dTheta<-Math.PI) dTheta+=2*Math.PI;
      var dPhi=targetPhi-startPhi;
      var startTarget=S.orbit.target.clone();
      var t0=performance.now(), dur=550;
      function step(){
        var t=Math.min((performance.now()-t0)/dur,1);
        var e=t<0.5?2*t*t:-1+(4-2*t)*t;
        S.orbit.sph.theta=startTheta+dTheta*e;
        S.orbit.sph.phi=startPhi+dPhi*e;
        S.orbit.target.lerpVectors(startTarget,ctr,e);
        S.orbit.apply(); invalidate();
        if(t<1) requestAnimationFrame(step);
      }
      step();
    }

    // Canvas texture: transparent background, thin border, bold label.
    // Material color (phong) provides the face colour; lighting gives depth.
    function makeFaceTexture(label, isHovered) {
      var c = document.createElement('canvas');
      c.width=128; c.height=128;
      var ctx=c.getContext('2d');
      ctx.clearRect(0,0,128,128);
      var light = theme==='light';
      ctx.fillStyle = isHovered ? (light ? '#1e293b' : '#ffffff') : (light ? 'rgba(15,23,42,0.85)' : 'rgba(226,232,240,0.88)');
      ctx.font = 'bold 21px system-ui,sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, 64, 64);
      var tex = new THREE.CanvasTexture(c);
      tex.minFilter = THREE.LinearFilter;
      return tex;
    }

    useEffect(function() {
      var canvas = canvasRef.current;
      if(!canvas || vcState.current) return;

      var size = 120;
      var renderer = new THREE.WebGLRenderer({canvas:canvas, alpha:true, antialias:true});
      renderer.setSize(size, size);
      renderer.setPixelRatio(window.devicePixelRatio);

      var scene = new THREE.Scene();
      // Camera along +Z axis so cube rotation directly maps to main viewport orientation.
      // This ensures FRONT face points toward camera when main camera is at +Z (front view),
      // aligning the nav cube with the grid axes at origin.
      var orthoHalf = 0.95;
      var camera = new THREE.OrthographicCamera(-orthoHalf, orthoHalf, orthoHalf, -orthoHalf, 0.1, 20);
      camera.position.set(0, 0, 4);
      camera.lookAt(0, 0, 0);

      // Lighting: key light from upper-right-front + dim fill from opposite side
      scene.add(new THREE.AmbientLight(0xffffff, 0.5));
      var dKey = new THREE.DirectionalLight(0xffffff, 0.95);
      dKey.position.set(2, 4, 5);
      scene.add(dKey);
      var dFill = new THREE.DirectionalLight(0x6688aa, 0.3);
      dFill.position.set(-3, -2, -3);
      scene.add(dFill);

      // BoxGeometry with 6 individual MeshPhongMaterials — real 3D, lit per-face
      var cubeGroup = new THREE.Group();
      var materials = BOX_FACE_MAP.map(function(fi) {
        var f = FACES[fi];
        return new THREE.MeshPhongMaterial({
          map: makeFaceTexture(f.label, false),
          color: new THREE.Color(FACE_CLR[f.label] || 0x2a4a6b),
          transparent: true,
          shininess: 50,
          specular: new THREE.Color(0x3a5a7a)
        });
      });
      var boxGeo = new THREE.BoxGeometry(1, 1, 1);
      var cubeMesh = new THREE.Mesh(boxGeo, materials);
      cubeGroup.add(cubeMesh);

      // Wireframe edges for visibility
      var edgeGeo = new THREE.EdgesGeometry(boxGeo);
      var edgeColor = theme==='light' ? 0x64748b : 0x94a3b8;
      var edgeMat = new THREE.LineBasicMaterial({color:edgeColor, transparent:true, opacity:0.6, depthTest:true});
      var edgeLines = new THREE.LineSegments(edgeGeo, edgeMat);
      cubeGroup.add(edgeLines);

      scene.add(cubeGroup);

      var raycaster = new THREE.Raycaster();
      var mouse = new THREE.Vector2();
      // Reusable quaternion scratch objects (allocated once, avoids GC)
      var _qY  = new THREE.Quaternion();
      var _qX  = new THREE.Quaternion();
      var _qCam = new THREE.Quaternion();
      var _AY  = new THREE.Vector3(0,1,0);
      var _AX  = new THREE.Vector3(1,0,0);

      vcState.current = {renderer:renderer, scene:scene, camera:camera,
        cubeGroup:cubeGroup, cubeMesh:cubeMesh, materials:materials,
        edgeLines:edgeLines,
        raycaster:raycaster, mouse:mouse, hoveredKey:null};

      // ── Animation loop ──────────────────────────────────────────
      // Rotation is derived from orbit spherical angles (theta/phi) rather than
      // camera.quaternion, which suffers gimbal-lock when looking straight up/down.
      var animId;
      function animate() {
        animId = requestAnimationFrame(animate);
        var S = state3d.current;
        var vc = vcState.current;
        if(!S || !vc || !S.orbit) return;
        var theta = S.orbit.sph.theta;
        var phi   = S.orbit.sph.phi;
        // Q_cam = Ry(theta) * Rx(phi-π/2)  — matches camera spherical position
        _qY.setFromAxisAngle(_AY, theta);
        _qX.setFromAxisAngle(_AX, phi - Math.PI/2);
        _qCam.multiplyQuaternions(_qY, _qX);
        // Invert so the face in the camera's direction faces the mini-camera
        vc.cubeGroup.quaternion.copy(_qCam).invert();
        vc.renderer.render(vc.scene, vc.camera);
      }
      animate();

      // ── Hit-zone detection (face / edge / corner) ─────────────
      // Returns {dir:[x,y,z], faces:[indices]} or null.
      // Edge threshold: hits within this distance of a cube edge
      // trigger a 2-face (edge) or 3-face (corner) navigation.
      var EDGE_T = 0.15;
      function getHitZone(cx, cy) {
        var vc = vcState.current; if(!vc) return null;
        var rect = canvas.getBoundingClientRect();
        mouse.x = ((cx-rect.left)/rect.width)*2-1;
        mouse.y = -((cy-rect.top)/rect.height)*2+1;
        raycaster.setFromCamera(mouse, camera);
        var hits = raycaster.intersectObject(cubeMesh);
        if(hits.length===0) return null;
        var hit = hits[0];
        var faceIdx = BOX_FACE_MAP[hit.face.materialIndex];
        // Convert hit point to cube local space (unrotated unit cube -0.5..0.5)
        var lp = cubeMesh.worldToLocal(hit.point.clone());
        var comps = [lp.x, lp.y, lp.z];
        var fn = FACES[faceIdx].normal;
        var dir = [fn[0], fn[1], fn[2]];
        var faces = [faceIdx];
        // For axes perpendicular to the face normal, check if near an edge
        for(var i=0;i<3;i++){
          if(fn[i]!==0) continue;
          if(Math.abs(comps[i]) > 0.5 - EDGE_T){

            dir[i] = sign;
            for(var j=0;j<FACES.length;j++){
              if(FACES[j].normal[i]===sign){ faces.push(j); break; }
            }
          }
        }
        // Normalize direction
        var len = Math.sqrt(dir[0]*dir[0]+dir[1]*dir[1]+dir[2]*dir[2]);
        if(len>0){ dir[0]/=len; dir[1]/=len; dir[2]/=len; }
        return {dir:dir, faces:faces};
      }

      // ── Hover highlight (supports multi-face for edges/corners) ─
      function updateHover(zone) {
        var vc = vcState.current; if(!vc) return;
        var newKey = zone ? zone.faces.slice().sort().join(',') : null;
        if(newKey === vc.hoveredKey) return;
        vc.hoveredKey = newKey;
        var hovSet = {};
        if(zone) zone.faces.forEach(function(f){ hovSet[f]=true; });
        vc.materials.forEach(function(mat, boxIdx) {
          var fi = BOX_FACE_MAP[boxIdx];
          var isHov = !!hovSet[fi];
          if (mat.map) mat.map.dispose();
          mat.map = makeFaceTexture(FACES[fi].label, isHov);
          mat.map.needsUpdate = true;
          mat.color.setHex(isHov ? 0x2563eb : (FACE_CLR[FACES[fi].label]||0x3a5f8a));
        });
      }

      // ── Drag-to-orbit / click (mouse + touch) ────────────────
      var isDragging=false, dragStart={x:0,y:0}, didDrag=false;

      function onPointerDown(cx, cy) { isDragging=true; didDrag=false; dragStart.x=cx; dragStart.y=cy; canvas.style.cursor='grabbing'; }
      function onPointerDrag(cx, cy) {
        var dx=cx-dragStart.x, dy=cy-dragStart.y;
        if(Math.abs(dx)>3||Math.abs(dy)>3) didDrag=true;
        if(!didDrag) return;
        dragStart.x=cx; dragStart.y=cy;
        var S=state3d.current;
        if(S&&S.orbit){
          S.orbit.sph.theta -= dx*0.007;
          S.orbit.sph.phi = Math.max(0.05, Math.min(Math.PI-0.05, S.orbit.sph.phi - dy*0.007));
          S.orbit.apply(); invalidate();
        }
      }
      function onPointerUp(cx, cy) {
        if(isDragging&&!didDrag){ var zone=getHitZone(cx,cy); if(zone) flyToDir(zone.dir); }
        isDragging=false; canvas.style.cursor='pointer';
      }

      // Mouse events
      canvas.addEventListener('mousedown', function(e){ onPointerDown(e.clientX, e.clientY); });
      canvas.addEventListener('mousemove', function(e){
        if(!isDragging){ updateHover(getHitZone(e.clientX, e.clientY)); return; }
        onPointerDrag(e.clientX, e.clientY);
      });
      canvas.addEventListener('mouseup', function(e){ onPointerUp(e.clientX, e.clientY); });
      canvas.addEventListener('mouseleave', function(){ isDragging=false; canvas.style.cursor='pointer'; updateHover(null); });

      // Touch events (navigation cube works on mobile)
      canvas.addEventListener('touchstart', function(e){
        e.preventDefault();
        var t=e.touches[0]; if(!t) return;
        onPointerDown(t.clientX, t.clientY);
      }, {passive:false});
      canvas.addEventListener('touchmove', function(e){
        e.preventDefault();
        var t=e.touches[0]; if(!t) return;
        onPointerDrag(t.clientX, t.clientY);
      }, {passive:false});
      canvas.addEventListener('touchend', function(e){
        e.preventDefault();
        var t=e.changedTouches[0]; if(!t) return;
        onPointerUp(t.clientX, t.clientY);
      }, {passive:false});

      return function(){ cancelAnimationFrame(animId); renderer.dispose(); };
    }, []);

    // Update cube face colors + edges when theme changes
    useEffect(function(){
      var vc = vcState.current; if(!vc) return;
      var light = theme==='light';
      var clr = light
        ? {FRONT:0x8494a7, BACK:0x7a8a9d, RIGHT:0x8494a7, LEFT:0x7a8a9d, TOP:0x8ea0b5, BOTTOM:0x708090}
        : {FRONT:0x3a5f8a, BACK:0x34537a, RIGHT:0x3a5f8a, LEFT:0x34537a, TOP:0x406690, BOTTOM:0x2e4a6e};
      BOX_FACE_MAP.forEach(function(fi, i){
        var f = FACES[fi];
        vc.materials[i].color.set(clr[f.label] || 0x3a5f8a);
        // Rebuild face texture with correct text color for theme
        vc.materials[i].map.dispose();
        vc.materials[i].map = makeFaceTexture(f.label, false);
        vc.materials[i].needsUpdate = true;
      });
      // Update edge color
      if(vc.edgeLines) vc.edgeLines.material.color.setHex(light ? 0x64748b : 0x94a3b8);
    }, [theme]);

    return html`<div class="cc-viewcube-wrap" style=${{position:'absolute',top:'3rem',right:'.5rem',pointerEvents:'auto',width:140,height:140}}>
      <canvas ref=${canvasRef} width="120" height="120" style=${{cursor:'pointer',position:'absolute',top:10,left:10,width:120,height:120}} />
    </div>`;
  }

  // ── Project file restoration (standalone, usable from App) ─────
  function _restoreProjectFilesGlobal(projectId, d) {
    var pid = projectId || 'default';
    function _setGlobalLoading(v) {
      window._ccModelLoading = !!v;
      window.dispatchEvent(new CustomEvent('cc-model-loading', {detail:{loading:!!v}}));
    }
    // Load project data (modelMeta, clashes, etc.) FIRST so that modelMeta
    // is in state before any ADD_MODEL fires — otherwise visibility is lost.
    idbGetProjectData(pid).then(function(data){
      if(data) {
        // Strip stale delta pills — _delta is only valid within the session that produced it
        if(data.clashes) data.clashes = data.clashes.map(function(c){ return c._delta ? Object.assign({},c,{_delta:null}) : c; });
        d({t:A.LOAD_PROJECT_STATE, data:data});
      }
    }).then(function(){
      return idbGetProjectFiles(pid);
    }).then(function(stored){
      if(!stored.length) { d({t:A.SWITCHING_PROJECT, v:false}); return; }
      var chain = Promise.resolve();
      stored.forEach(function(entry){
        chain = chain.then(function(){
          _setGlobalLoading(true);
          return idbGetGeoCache(entry.id).then(function(cached) {
            if(cached && cached.v >= 1) return _geoDeserialize(cached);
            return loadIFC(entry.buffer, DISC[0].c, function(){})
              .then(function(result) {
                idbSaveGeoCache(entry.id, _geoSerialize(result));
                return result;
              });
          }).then(function(result){
            var disc = detectDiscipline(result.elements);
            var dObj = DISC.find(function(x){return x.id===disc;});
            var col = dObj ? dObj.c : DISC[0].c;
            var fSize = result.stats ? result.stats.fileSize : entry.buffer.byteLength;
            d({t:A.ADD_MODEL, v:{id:entry.id, name:entry.name.replace(/\.ifc$/i,''), discipline:disc, color:col, meshes:result.meshes, elements:result.elements, storeys:result.storeys||[], storeyData:result.storeyData||[], relatedPairs:result.relatedPairs||{}, stats:result.stats||{fileSize:fSize}}});
          }).catch(function(e){ console.warn('Failed to restore '+entry.name+':', e); })
            .then(function(){ _setGlobalLoading(false); });
        });
      });
      chain.then(function(){ d({t:A.SWITCHING_PROJECT, v:false}); });
    });
  }

  function GuidedTour(props) {
    var step = props.step, setStep = props.setStep;
    var total = TOUR_STEPS.length;
    var cur = TOUR_STEPS[step] || TOUR_STEPS[0];
    var posState = useState(null), spotPos=posState[0], setSpotPos=posState[1];

    useEffect(function() {
      function update() {
        // Try each selector in comma-separated list
        var sels = cur.sel.split(',');
        var el = null;
        for (var i=0; i<sels.length; i++) {
          el = document.querySelector(sels[i].trim());
          if (el) break;
        }
        if (!el) { setSpotPos(null); return; }
        var r = el.getBoundingClientRect();
        setSpotPos({x:r.left, y:r.top, w:r.width, h:r.height});
      }
      update();
      var id = setInterval(update, 300);
      return function(){ clearInterval(id); };
    }, [step]);

    function next() { if (step < total-1) setStep(step+1); else setStep(null); }
    function prev() { if (step > 0) setStep(step-1); }
    function skip() { setStep(null); }

    // Calculate tooltip position
    var tipStyle = {position:'fixed', zIndex:10002, background:'var(--bg-primary)',
      border:'1px solid var(--accent)', borderRadius:10, padding:'1rem',
      boxShadow:'0 8px 32px rgba(0,0,0,.5)', width:280, maxWidth:'80vw'};
    if (spotPos) {
      var pad = 12;
      if (cur.pos === 'right') { tipStyle.left = spotPos.x + spotPos.w + pad; tipStyle.top = spotPos.y; }
      else if (cur.pos === 'left') { tipStyle.right = window.innerWidth - spotPos.x + pad; tipStyle.top = spotPos.y; }
      else if (cur.pos === 'bottom') { tipStyle.left = spotPos.x; tipStyle.top = spotPos.y + spotPos.h + pad; }
      else { tipStyle.left = spotPos.x; tipStyle.bottom = window.innerHeight - spotPos.y + pad; }
      // Clamp to viewport
      if (tipStyle.left != null && tipStyle.left + 280 > window.innerWidth - 16) tipStyle.left = window.innerWidth - 296;
      if (tipStyle.left != null && tipStyle.left < 16) tipStyle.left = 16;
      if (tipStyle.top != null && tipStyle.top + 200 > window.innerHeight - 16) tipStyle.top = window.innerHeight - 216;
      if (tipStyle.top != null && tipStyle.top < 16) tipStyle.top = 16;
    } else {
      tipStyle.left = '50%'; tipStyle.top = '50%'; tipStyle.transform = 'translate(-50%,-50%)';
    }

    // Spotlight cutout via clip-path
    var overlayStyle = {position:'fixed',inset:0,zIndex:10001,cursor:'default'};
    var clipPath = 'none';
    if (spotPos) {
      var m = 6; // margin around element
      var sx = spotPos.x - m, sy = spotPos.y - m, sw = spotPos.w + m*2, sh = spotPos.h + m*2;
      var r = 8;
      // Outer rect (full viewport) + inner rounded rect cutout using polygon + inset
      clipPath = 'polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%, ' +
        sx+'px '+sy+'px, '+sx+'px '+(sy+sh)+'px, '+(sx+sw)+'px '+(sy+sh)+'px, '+(sx+sw)+'px '+sy+'px, '+sx+'px '+sy+'px)';
      overlayStyle.background = 'rgba(0,0,0,.55)';
      overlayStyle.clipPath = clipPath;
      overlayStyle.WebkitClipPath = clipPath;
    } else {
      overlayStyle.background = 'rgba(0,0,0,.55)';
    }

  // Auto-detect discipline from IFC types
  function detectDiscipline(elements) {
    var mepTypes = {'IfcFlowSegment':1,'IfcFlowTerminal':1,'IfcFlowFitting':1,'IfcDistributionFlowElement':1,'IfcPipeSegment':1,'IfcDuctSegment':1};
    var structTypes = {'IfcBeam':1,'IfcColumn':1,'IfcFooting':1,'IfcPile':1,'IfcMember':1,'IfcPlate':1};
    var mepCount=0, structCount=0, archCount=0;
    (elements||[]).forEach(function(el){
      var t=(el.props&&el.props.ifcType)||'';
      if(mepTypes[t]) mepCount++; else if(structTypes[t]) structCount++; else archCount++;
    });
    if(mepCount>structCount&&mepCount>archCount) return 'mep';
    if(structCount>archCount) return 'structural';
    return 'architectural';
  }

  // (UnderlayImport removed — unified into the main import button in ModelSidebar)

  function ModelSidebar(props) {
    var s=props.s, d=props.d;
    var fileRef = useRef(null);
    var file2dRef = useRef(null);
    var ld = useState(false), loading=ld[0], _setLoadingRaw=ld[1];
    function setLoading(v) { _setLoadingRaw(v); window._ccModelLoading=!!v; window.dispatchEvent(new CustomEvent('cc-model-loading',{detail:{loading:!!v}})); }
    var lm = useState(''), loadMsg=lm[0], setLoadMsg=lm[1];
    var er = useState(''), err=er[0], setErr=er[1];
    var dg = useState(false), dragging=dg[0], setDragging=dg[1];
    var dragCounter = useRef(0);

    // Project file restoration now handled at App level (runs immediately on load,
    // no need to open the models tab first). See _restoreProjectFilesGlobal().

    function processFiles(files) {
      setErr('');
      var errors = [];
      var chain = Promise.resolve();
      var totalIfc = 0, doneIfc = 0;
      files.forEach(function(f) {
        var ext = f.name.split('.').pop().toLowerCase();
        if (ext === 'ifc') totalIfc++;
      });
      files.forEach(function(f) {
        var ext = f.name.split('.').pop().toLowerCase();
        if (ext === 'dwg') {
          errors.push(f.name + ': DWG cannot be parsed in-browser. Convert to DXF first.');
          return;
        }
        if (ext === 'dxf') {
          chain = chain.then(function() {
            setLoadMsg('Loading ' + f.name + '…');
            return f.text().then(function(text) {
              var dxfData = parseDXF(text);
              if (dxfData.entities.length === 0) { errors.push(f.name + ': No entities found in DXF file.'); return; }
              var result = renderDXFToCanvas(dxfData, 2048, 2048);
              d({ t: 'ADD_UNDERLAY', v: { id: uid(), name: f.name, type: 'dxf', canvasData: result.canvas.toDataURL('image/png'),
                offsetX: 0, offsetY: 0, scale: 1, rotation: 0, opacity: 0.7, visible: true,
                extentW: result.extentW, extentH: result.extentH, storeyName: null }});
              d({ t: 'UNDERLAY_MODE', v: 'view2d' });
            }).catch(function(e) { errors.push(f.name + ': ' + (e.message || 'DXF parse failed')); });
          });
          return;
        }
        if (ext === 'pdf') {
          chain = chain.then(function() {
            setLoadMsg('Loading ' + f.name + '…');
            return f.arrayBuffer().then(function(buf) { return loadPDFPage(buf, 1); }).then(function(result) {
              d({ t: 'ADD_UNDERLAY', v: { id: uid(), name: f.name, type: 'pdf', canvasData: result.canvas.toDataURL('image/png'),
                offsetX: 0, offsetY: 0, scale: 1, rotation: 0, opacity: 0.7, visible: true,
                extentW: result.extentW, extentH: result.extentH, storeyName: null, numPages: result.numPages, page: 1 }});
              d({ t: 'UNDERLAY_MODE', v: 'view2d' });
            }).catch(function(e) { errors.push(f.name + ': ' + (e.message || 'PDF load failed')); });
          });
          return;
        }
        if (ext !== 'ifc') return;
        // File size warning: >500 MB IFC files can exhaust browser memory
        if (f.size > 500 * 1024 * 1024) {
          var sizeMB = Math.round(f.size / (1024 * 1024));
          if (!confirm(f.name + ' is ' + sizeMB + ' MB. Large IFC files may freeze or crash the tab. Continue?')) {
            errors.push(f.name + ': Skipped (file too large)');
            return;
          }
        }
        chain = chain.then(function() {
          setLoading(true);
          setLoadMsg(totalIfc > 1 ? f.name + ' (' + (doneIfc + 1) + '/' + totalIfc + ')…' : 'Loading ' + f.name + '…');
          return f.arrayBuffer().then(function(buf) {
            var disc='structural', col=DISC[0].c;
            return loadIFC(buf, col, function(msg){ setLoadMsg(f.name + ': ' + msg); }).then(function(result) {
              disc = detectDiscipline(result.elements);
              var dObj = DISC.find(function(x){return x.id===disc;});
              col = dObj ? dObj.c : col;
              var fSize = result.stats ? result.stats.fileSize : buf.byteLength;
              var baseName = f.name.replace(/\.ifc$/i,'');
              // Check for existing model with same name — replace it (version update)
              var existing = s.models.find(function(m){ return m.name === baseName; });
              var modelId;
              if (existing) {
                modelId = existing.id;
                // Atomic replace: preserve user settings, update geometry
                d({t:A.REPLACE_MODEL, id:modelId, v:{id:modelId, name:baseName,
                  discipline:existing.discipline||disc, color:existing.color||col,
                  visible:existing.visible!==false, tag:existing.tag||'',
                  _version:(existing._version||1)+1,
                  meshes:result.meshes, elements:result.elements,
                  storeys:result.storeys||[], storeyData:result.storeyData||[],
                  relatedPairs:result.relatedPairs||{},
                  stats:result.stats||{fileSize:fSize}}});
              } else {
                modelId = uid();
                d({t:A.ADD_MODEL, v:{id:modelId, name:baseName, discipline:disc, color:col, visible:true, _version:1, meshes:result.meshes, elements:result.elements, storeys:result.storeys||[], storeyData:result.storeyData||[], relatedPairs:result.relatedPairs||{}, stats:result.stats||{fileSize:fSize}}});
              }
              idbSaveFile(modelId, f.name, buf, s.activeProject||'default');
              idbSaveGeoCache(modelId, _geoSerialize(result)); // cache geometry for fast project-switch restore
            });
          }).catch(function(er) {
            console.error(er);
            errors.push(f.name + ': ' + (er.message || 'Load failed'));
          }).then(function(){ doneIfc++; });
        });
      });
      // After all files processed, update loading state once and show accumulated errors
      chain.then(function() {
        setLoading(false);
        setLoadMsg('');
        if (errors.length) setErr(errors.join('\n'));
      });
    }
    function onFiles(e) {
      processFiles(Array.prototype.slice.call(e.target.files||[]));
      e.target.value='';
    }
    // Expose globals so LeftRail buttons can trigger file pickers regardless of which tab is active
    window._ccOpenIFC = function(){setErr('');fileRef.current&&fileRef.current.click();};
    window._ccOpen2D  = function(){setErr('');file2dRef.current&&file2dRef.current.click();};
    // If LeftRail triggered a pending open before this component mounted, honour it now
    useEffect(function(){
      if(window._ccPendingOpen==='ifc'){window._ccPendingOpen=null;window._ccOpenIFC&&window._ccOpenIFC();}
      if(window._ccPendingOpen==='2d') {window._ccPendingOpen=null;window._ccOpen2D&&window._ccOpen2D();}
    },[]);
    function onDrop(e) {
      e.preventDefault(); e.stopPropagation();
      dragCounter.current = 0; setDragging(false);
      var files = Array.prototype.slice.call(e.dataTransfer.files||[]);
      if(files.length) processFiles(files);
    }
    function onDragOver(e){e.preventDefault();e.stopPropagation();}
    function onDragEnter(e){e.preventDefault();e.stopPropagation();dragCounter.current++;setDragging(true);}
    function onDragLeave(e){e.preventDefault();e.stopPropagation();dragCounter.current--;if(dragCounter.current<=0){dragCounter.current=0;setDragging(false);}}

    var splitSt = useState(50), splitPct=splitSt[0], setSplitPct=splitSt[1];
    var splitDrag = useRef(null);
    function onSplitDown(e){
      e.preventDefault();
      splitDrag.current={startY:e.clientY,startPct:splitPct};
      function onMove(ev){
        if(!splitDrag.current) return;
        var dy=ev.clientY-splitDrag.current.startY;
        var aside=ev.target.closest?ev.target.closest('aside'):null;
        var h=aside?aside.offsetHeight:500;
        var newPct=splitDrag.current.startPct+(dy/h)*100;
        setSplitPct(Math.max(15,Math.min(85,newPct)));
      }
      function onUp(){splitDrag.current=null;window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);}
      window.addEventListener('mousemove',onMove);
      window.addEventListener('mouseup',onUp);
    }
    return html`<div style=${{display:'flex',flexDirection:'column',flex:1,overflow:'hidden'}} onDrop=${onDrop} onDragOver=${onDragOver} onDragEnter=${onDragEnter} onDragLeave=${onDragLeave}>

  function ExplorerPanel(props) {
    var s=props.s, d=props.d;
    var vm = useState('tree'), viewMode=vm[0], setViewMode=vm[1];
    var sq = useState(''), treeSearch=sq[0], setTreeSearch=sq[1];
    var ex = useState({}), expanded=ex[0], setExpanded=ex[1];
    function toggle(key){setExpanded(function(prev){var n=Object.assign({},prev);if(n[key])delete n[key];else n[key]=true;return n;});}
    function expandAll(){
      var all={};
      s.models.forEach(function(m){
        all['m_'+m.id]=true;
        (m.storeys||[]).forEach(function(st){all['s_'+m.id+'_'+st]=true;});
      });
      setExpanded(all);
    }
    // Auto-classify
    var cls = s.classifications;
    var lastClassifyRef = useRef('');
    useEffect(function(){
      var vis = s.models.filter(function(m){return m.visible!==false});
      if(vis.length===0){ d({t:A.SET_CLASSIFICATIONS,v:{}}); lastClassifyRef.current=''; return; }
      var sig = vis.map(function(m){return m.id+':'+(m.elements?m.elements.length:0)+':'+(m.visible!==false)}).join(',');
      if(sig===lastClassifyRef.current) return;
      lastClassifyRef.current = sig;
      d({t:A.SET_CLASSIFICATIONS,v:classifyModels(vis)});
    }, [s.models]);
    var hasCls = cls && Object.keys(cls).length>0;
    var classView = viewMode!=='tree' ? viewMode : null;
    var groups = classView && hasCls ? cls[classView] || {} : {};
    var keys = classView ? Object.keys(groups).sort(function(a,b){return (groups[b].count||0)-(groups[a].count||0)}) : [];
    var total = keys.reduce(function(sum,k){return sum+(groups[k].count||0)},0);
    var hiddenCount = classView ? keys.filter(function(k){return s.hiddenClasses[classView+':'+k]}).length : 0;
    var CLASS_COLORS = ['#60a5fa','#f87171','#34d399','#fbbf24','#c084fc','#fb923c','#22d3ee','#e879f9','#a3e635','#f472b6','#38bdf8','#facc15','#4ade80','#f97316','#818cf8'];
    var VIEWS=[{id:'tree',label:'Tree'},{id:'byType',label:'IFC Type'},{id:'byStorey',label:'Storey'},{id:'byDiscipline',label:'Discipline'},{id:'byMaterial',label:'Material'}];
    // Explorer keyboard navigation
    var _ef = useState(null), explorerFocus=_ef[0], setExplorerFocus=_ef[1];
    var explorerScrollRef = useRef(null);
    useEffect(function(){
      function onKey(e){
        if(s.tab!=='explorer') return;
        if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
        if(viewMode!=='tree') return;
        if(e.key!=='ArrowDown'&&e.key!=='ArrowUp'&&e.key!=='ArrowLeft'&&e.key!=='ArrowRight'&&e.key!=='Enter') return;
        e.preventDefault();
        // Build flat list of visible tree nodes
        var nodes = [];
        var q = treeSearch.toLowerCase();
        s.models.filter(function(m){return m.visible!==false}).forEach(function(model){
          var mKey='m_'+model.id;
          nodes.push({key:mKey,type:'model',model:model});
          if(!expanded[mKey]) return;
          var storeyGroups={};var noStorey=[];
          (model.elements||[]).forEach(function(el){
            var st=(el.props&&el.props.storey)||'';
            if(!st){noStorey.push(el);return;}
            if(!storeyGroups[st])storeyGroups[st]=[];
            storeyGroups[st].push(el);
          });
          Object.keys(storeyGroups).sort().forEach(function(st){
            var sKey='s_'+model.id+'_'+st;
            var els=storeyGroups[st];
            var filtered=q?els.filter(function(el){var p=el.props||{};return (p.name||'').toLowerCase().indexOf(q)!==-1||(p.ifcType||'').toLowerCase().indexOf(q)!==-1||String(el.expressId).indexOf(q)!==-1;}):els;
            if(q&&filtered.length===0) return;
            nodes.push({key:sKey,type:'storey',model:model,storey:st});
            if(!expanded[sKey]) return;
            filtered.slice(0,200).forEach(function(el){
              nodes.push({key:'e_'+el.expressId,type:'element',model:model,element:el});
            });
          });
          if(noStorey.length>0){
            var nsKey='s_'+model.id+'_none';
            nodes.push({key:nsKey,type:'storey',model:model,storey:'(No storey)'});
            if(expanded[nsKey]){
              noStorey.filter(function(el){if(!q)return true;var p=el.props||{};return (p.name||'').toLowerCase().indexOf(q)!==-1||(p.ifcType||'').toLowerCase().indexOf(q)!==-1;}).slice(0,100).forEach(function(el){
                nodes.push({key:'e_'+el.expressId,type:'element',model:model,element:el});
              });
            }
          }
        });
        if(!nodes.length) return;
        var curIdx=-1;
        if(explorerFocus!=null){for(var i=0;i<nodes.length;i++){if(nodes[i].key===explorerFocus){curIdx=i;break;}}}
        var nextIdx=curIdx;
        if(e.key==='ArrowDown') nextIdx=curIdx===-1?0:Math.min(nodes.length-1,curIdx+1);
        else if(e.key==='ArrowUp') nextIdx=curIdx<=0?0:curIdx-1;
        else if(e.key==='ArrowRight'&&curIdx>=0&&(nodes[curIdx].type==='model'||nodes[curIdx].type==='storey')){
          if(!expanded[nodes[curIdx].key]) toggle(nodes[curIdx].key);
          return;
        } else if(e.key==='ArrowLeft'&&curIdx>=0){
          if((nodes[curIdx].type==='model'||nodes[curIdx].type==='storey')&&expanded[nodes[curIdx].key]){
            toggle(nodes[curIdx].key); return;
          } else if(nodes[curIdx].type==='element'){
            for(var pi=curIdx-1;pi>=0;pi--){if(nodes[pi].type!=='element'){nextIdx=pi;break;}}
          }
        } else if(e.key==='Enter'&&curIdx>=0){
          var n=nodes[curIdx];
          if(n.type==='model'||n.type==='storey') toggle(n.key);
          else if(n.type==='element'){
            if(_fitToElement){var p2=n.element.props||{};var isFloor=(p2.ifcType||'').match(/slab|floor/i);_fitToElement(n.element.expressId,isFloor?{normal:[0,1,0]}:null);}
            if(_highlightById) _highlightById(n.element.expressId);

          return;

        if(nextIdx!==curIdx||curIdx===-1){
          var nk=nodes[nextIdx].key;

  // Reusable multi-select dropdown with checkboxes
  function MultiSelectDropdown(props) {
    var label=props.label, items=props.items, excluded=props.excluded||[], onToggle=props.onToggle, onToggleAll=props.onToggleAll;
    var op=useState(false), open=op[0], setOpen=op[1];

    var activeCount = items.length - excluded.length;
    var allVisible = excluded.length===0;
    var summary = allVisible ? 'All ('+items.length+')' : activeCount+' of '+items.length;

    // Close on outside click
    useEffect(function(){
      if(!open) return;
      function handler(e){ if(ref.current && !ref.current.contains(e.target)) setOpen(false); }
      document.addEventListener('mousedown', handler);
      return function(){ document.removeEventListener('mousedown', handler); };
    },[open]);

    return html`<div ref=${ref} style=${{position:'relative'}}>
      <button onClick=${function(){setOpen(!open)}}
        style=${{fontSize:'0.75rem',padding:'.2rem .3rem',borderRadius:4,background:'var(--bg-secondary)',color:allVisible?'var(--text-secondary)':'var(--accent)',border:'1px solid var(--border)',width:'100%',textAlign:'left',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between'}}>

        <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'.25rem .4rem',borderBottom:'1px solid var(--border-subtle)',flexShrink:0}}>
          <span style=${{fontSize:'0.67rem',color:'var(--text-muted)'}}>${activeCount} selected</span>
          <button onClick=${onToggleAll} style=${{fontSize:'0.63rem',padding:'1px 5px',background:'none',color:allVisible?'var(--text-faint)':'var(--accent)',border:'1px solid var(--border)',borderRadius:3,cursor:'pointer'}}>
            ${allVisible?'Exclude all':'Show all'}
          </button>
        </div>
        <div style=${{overflowY:'auto',padding:'.15rem'}}>
          ${items.map(function(t){
            var isExcluded = excluded.indexOf(t)!==-1;
            return html`<label key=${t} style=${{display:'flex',alignItems:'center',gap:'.3rem',padding:'.18rem .3rem',borderRadius:3,cursor:'pointer',background:isExcluded?'rgba(239,68,68,.06)':'transparent',opacity:isExcluded?.55:1}}>
              <input type="checkbox" checked=${!isExcluded} onChange=${function(){onToggle(t)}}
                style=${{accentColor:'var(--accent)',cursor:'pointer',flexShrink:0}} />
              <span style=${{fontSize:'0.71rem',color:isExcluded?'var(--text-faint)':'var(--text-primary)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${t}</span>
            </label>`;
          })}
        </div>
      </div>`}
    </div>`;
  }

  // ── Clash Stats Bar ──────────────────────────────────────────
  function ClashStatsBar(props) {
    var items = props.items, isClash = props.isClash, delta = props.delta;
    if (!items.length) return null;
    var total = items.length;
    var open = items.filter(function(c){return c.status==='open';}).length;
    var inProg = items.filter(function(c){return c.status==='in_progress';}).length;
    var resolved = items.filter(function(c){return c.status==='resolved'||c.status==='closed';}).length;
    // For clashes: type breakdown
    var hard = isClash ? items.filter(function(c){return c.type==='hard';}).length : 0;
    var soft = isClash ? items.filter(function(c){return c.type==='soft';}).length : 0;
    var dup = isClash ? items.filter(function(c){return c.type==='duplicate';}).length : 0;
    // Resolution progress
    var pct = total > 0 ? Math.round(resolved / total * 100) : 0;
    var barCol = pct >= 80 ? '#22c55e' : pct >= 40 ? '#f59e0b' : '#ef4444';

    var CHIP = function(label, n, bg, fg) {
      return html`<span style=${{fontSize:'0.67rem',padding:'1px 5px',borderRadius:99,background:bg,color:fg,fontWeight:600,whiteSpace:'nowrap'}}>${label} ${n}</span>`;
    };
    return html`<div style=${{padding:'.35rem .5rem',borderBottom:'1px solid var(--border-subtle)',flexShrink:0,background:'var(--bg-tertiary)'}}>
      <!-- Progress bar -->
      <div style=${{display:'flex',alignItems:'center',gap:'.4rem',marginBottom:'.3rem'}}>
        <div style=${{flex:1,height:4,borderRadius:2,background:'var(--border)',overflow:'hidden'}}>
          <div style=${{width:pct+'%',height:'100%',borderRadius:2,background:barCol,transition:'width .4s ease'}}></div>
        </div>
        <span style=${{fontSize:'0.69rem',fontWeight:600,color:barCol,minWidth:28,textAlign:'right'}}>${pct}%</span>
      </div>
      <!-- Chips row -->
      <div style=${{display:'flex',gap:'.25rem',flexWrap:'wrap',alignItems:'center'}}>
        ${CHIP('Total', total, 'var(--tag-bg)', 'var(--text-secondary)')}
        ${CHIP('Open', open, '#7f1d1d', '#fca5a5')}
        ${inProg > 0 && CHIP('In Prog', inProg, '#78350f', '#fcd34d')}
        ${CHIP('Resolved', resolved, '#052e16', '#4ade80')}
        ${isClash && hard > 0 && html`<span style=${{width:1,height:12,background:'var(--border)',margin:'0 .1rem'}}></span>`}
        ${isClash && hard > 0 && CHIP('Hard', hard, '#7f1d1d', '#fca5a5')}
        ${isClash && soft > 0 && CHIP('Soft', soft, '#78350f', '#fcd34d')}
        ${isClash && dup > 0 && CHIP('Dup', dup, '#4c1d95', '#c4b5fd')}
      </div>
      ${isClash && delta && html`<div style=${{display:'flex',gap:'.3rem',marginTop:'.25rem',alignItems:'center',flexWrap:'wrap'}}>
        <span style=${{fontSize:'0.63rem',color:'var(--text-faint)',flexShrink:0}}>This run:</span>
        ${delta.newCount > 0 && CHIP('New', delta.newCount, '#1e3a5f', '#60a5fa')}
        ${delta.persisting > 0 && CHIP('Unchanged', delta.persisting, 'var(--tag-bg)', 'var(--text-secondary)')}
        ${delta.autoResolved > 0 && CHIP('Auto-res', delta.autoResolved, '#0f172a', '#64748b')}
      </div>`}
    </div>`;
  }

  function _getClashPresets() {
    try { return JSON.parse(localStorage.getItem('cc_clash_presets')||'[]'); } catch(e) { return []; }

  function _saveClashPresets(list) {
    try { localStorage.setItem('cc_clash_presets', JSON.stringify(list)); } catch(e) {}

    // Build detection settings snapshot at run time (for AI training data export)
    function _captureDetectionSettings(rules, models) {

      if (mA && mA.indexOf('disc:')===0) discs.push(mA.slice(5));

      if (discs.length===0) discs = ['all'];
      return { clearance_mm: rules.maxGap > 0 ? rules.maxGap : null, discipline_filters: discs };

    function runDetection() {

                <span style=${{fontSize:'0.67rem',color:'var(--accent-subtle)',fontWeight:600}}>${tpPairs[k]}mm</span>
                <button onClick=${function(){var u=Object.assign({},tpPairs);delete u[k];d({t:A.UPD_RULES,u:{toleranceByTypePair:u}})}}

                <select value=${tp.b} onChange=${function(e){setTPState(Object.assign({},tp,{b:e.target.value}))}}
                  style=${{...S_INPUT,fontSize:'0.63rem',padding:'1px 2px',flex:1,minWidth:60}}>${typeList.map(function(t){return html`<option key=${t} value=${t}>${t.replace('Ifc','')}</option>`})}</select>
                <input type="number" value=${tp.mm} onInput=${function(e){setTPState(Object.assign({},tp,{mm:e.target.value}))}}

  function IssuePanel(props) {
    var s=props.s, d=props.d, f=s.filters, hideTabBar=props.hideTabBar;
    var fo=useState(false), filtersOpen=fo[0], setFiltersOpen=fo[1];
    var isClashTab = s.tab==='clashes';
    var isExplorerTab = s.tab==='explorer';
    var isStandardsTab = s.tab==='standards';
    var rawItems = isClashTab ? s.clashes.filter(function(c){return c.status!=='denied';}) : s.issues;

    // Build set of visible model IDs for filtering
    var visibleModelIds = useMemo(function(){
      var ids = {};
      s.models.forEach(function(m){ if(m.visible !== false) ids[m.id] = true; });
      return ids;
    }, [s.models]);

    // Collect unique values for dynamic filter dropdowns (memoized)
    // Only includes values from clashes/issues belonging to visible (checked) models
    var filterLists = useMemo(function(){
      var uTypes={}, uStoreys={}, uMats={};
      var uPriorities={}, uCategories={}, uAssignees={}, uIssueTypes={}, uIssueStoreys={};
      if(isClashTab){
        s.clashes.forEach(function(c){
          if((c.modelAId && !visibleModelIds[c.modelAId]) || (c.modelBId && !visibleModelIds[c.modelBId])) return;
          if(c.elemAType) uTypes[c.elemAType]=true;
          if(c.elemBType) uTypes[c.elemBType]=true;
          if(c.elemAStorey) uStoreys[c.elemAStorey]=true;
          if(c.elemBStorey) uStoreys[c.elemBStorey]=true;
          if(c.elemAMaterial) uMats[c.elemAMaterial]=true;
          if(c.elemBMaterial) uMats[c.elemBMaterial]=true;
        });
      } else {
        s.issues.forEach(function(i){
          if(i.modelId && !visibleModelIds[i.modelId]) return;
          if(i.priority) uPriorities[i.priority]=true;
          if(i.category) uCategories[i.category]=true;
          if(i.assignee) uAssignees[i.assignee]=true;
          if(i.elementType) uIssueTypes[i.elementType]=true;
          if(i.storey) uIssueStoreys[i.storey]=true;
        });
      }
      return {types:Object.keys(uTypes).sort(), storeys:Object.keys(uStoreys).sort(), materials:Object.keys(uMats).sort(),
        priorities:Object.keys(uPriorities).sort(), categories:Object.keys(uCategories).sort(), assignees:Object.keys(uAssignees).sort(),
        issueTypes:Object.keys(uIssueTypes).sort(), issueStoreys:Object.keys(uIssueStoreys).sort()};
    }, [s.clashes, s.issues, isClashTab, visibleModelIds]);
    var typeList = filterLists.types;
    var storeyList = filterLists.storeys;
    var materialList = filterLists.materials;

    // Count active filters
    var activeCount = 0;
    if(f.status!=='all') activeCount++;
    if(f.discipline!=='all') activeCount++;
    if(f.floor!=='all') activeCount++;
    if(f.selfClash!=='all') activeCount++;
    if(f.elementId) activeCount++;
    if(f.distMax<9999) activeCount++;
    if(f.ifcType!=='all') activeCount++;
    if(f.excludedTypes&&f.excludedTypes.length) activeCount++;
    if(f.excludedStoreys&&f.excludedStoreys.length) activeCount++;
    if(f.excludedMaterials&&f.excludedMaterials.length) activeCount++;
    if(f.storey!=='all') activeCount++;
    if(f.material!=='all') activeCount++;
    if(f.priority!=='all') activeCount++;
    if(f.category!=='all') activeCount++;
    if(f.assignee!=='all') activeCount++;
    if(f.issueElementType!=='all') activeCount++;

  // Group clashes by a field
  var SORT_FNS = {

    date_desc: function(a,b){ return (b.createdAt||'').localeCompare(a.createdAt||''); },
    priority_asc: function(a,b){ var o={critical:0,high:1,normal:2,low:3}; return (o[a.priority]||2)-(o[b.priority]||2); },
    priority_desc: function(a,b){ var o={critical:0,high:1,normal:2,low:3}; return (o[b.priority]||2)-(o[a.priority]||2); },

  function groupAndSort(items, groupBy, sortBy) {

        case 'category': key = it.category || 'other'; break;
        case 'assignee': key = it.assignee || 'Unassigned'; break;

  // Virtualized list: only render visible rows for large lists
