  // ── Advanced Settings Tab (tolerance matrix) ────────────────
  var DEFAULT_IFC_TYPES=['IfcWall','IfcSlab','IfcBeam','IfcColumn','IfcDoor','IfcWindow',
    'IfcPipeSegment','IfcDuctSegment','IfcCableCarrierSegment','IfcFlowTerminal',
    'IfcBuildingElementProxy','IfcPlate','IfcMember','IfcRailing','IfcStair',
    'IfcCovering','IfcFurnishingElement','IfcDistributionElement'];

  function AdvancedSettingsTab(props) {
    var d=props.d, p=props.prefs, models=props.models||[], rules=props.rules||{};
    var SEC=props.SEC, TROW=props.TROW, TLBL=props.TLBL, TSUB=props.TSUB;

    var tolEnabled = !!p.useTypePairTolerances;
    var stExpanded = useState(false), expanded=stExpanded[0], setExpanded=stExpanded[1];

    // Collect IFC types: from loaded models first, then fill with defaults
    var modelTypes = {};
    models.forEach(function(m){(m.elements||[]).forEach(function(el){if(el.props&&el.props.ifcType)modelTypes[el.props.ifcType]=true;});});
    var hasModels = Object.keys(modelTypes).length > 0;
    var ifcTypes = hasModels ? modelTypes : {};
    if(!hasModels) DEFAULT_IFC_TYPES.forEach(function(t){ifcTypes[t]=true;});
    var typeList = Object.keys(ifcTypes).sort();

    // Default tolerances stored in prefs
    var defaultTols = p.defaultTolerances||{};
    var defaultGap = p.defaultMaxGap||50;

    function shortName(t){return t.replace(/^Ifc/,'');}

    function pairKey(a,b){return a<b?a+':'+b:b+':'+a;}

    function setTol(key, val) {
      var u = Object.assign({}, defaultTols);
      if(val===null||val===undefined||val==='') delete u[key]; else u[key]=+val;
      d({t:A.UPD_PREFS,u:{defaultTolerances:u}});
    }

    function toggleEnabled() {
      d({t:A.UPD_PREFS,u:{useTypePairTolerances:!tolEnabled}});
      if(!tolEnabled) setExpanded(true);
    }

    function applyToRules() {
      d({t:A.UPD_RULES,u:{toleranceByTypePair:Object.assign({},defaultTols)}});
    }

    // Build unique pairs for the matrix (upper triangle only, no self-pairs)
    var pairs = [];
    for(var i=0;i<typeList.length;i++){
      for(var j=i+1;j<typeList.length;j++){
        pairs.push({a:typeList[i],b:typeList[j],key:pairKey(typeList[i],typeList[j])});
      }
    }

    var filledCount = Object.keys(defaultTols).length;

    return html`<div style=${{padding:'.2rem 1.2rem 1rem 1.2rem'}}>
      <div style=${SEC}>Type-Pair Tolerances</div>

      <div style=${TROW}>
        <div>
          <div style=${TLBL}>Custom tolerances per type pair</div>
          <div style=${TSUB}>Override the default gap (${defaultGap}mm) for specific IFC type combinations${filledCount?' — '+filledCount+' set':''}</div>
        </div>
        <div onClick=${toggleEnabled} role="switch" aria-checked=${tolEnabled} tabindex="0"
          style=${{width:38,height:22,borderRadius:11,background:tolEnabled?'var(--accent)':'var(--text-faint)',cursor:'pointer',position:'relative',transition:'background .2s',flexShrink:0}}>
          <div style=${{width:18,height:18,borderRadius:9,background:'#fff',position:'absolute',top:2,left:tolEnabled?18:2,transition:'left .2s',boxShadow:'0 1px 3px rgba(0,0,0,.2)'}}></div>
        </div>
      </div>

      ${tolEnabled && html`<div style=${{marginTop:'.5rem'}}>
        <button onClick=${function(){setExpanded(!expanded);}}
          style=${{...S_BTN,width:'100%',padding:'.35rem',fontSize:'0.75rem',
            background:'var(--bg-primary)',color:'var(--text-secondary)',
            border:'1px solid var(--border)',borderRadius:6,
            display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span>${expanded?'Hide':'Show'} tolerance matrix (${typeList.length} types, ${pairs.length} pairs)</span>
          <span style=${{fontSize:'0.63rem',color:'var(--text-faint)'}}>${expanded?'▲':'▼'}</span>
        </button>

        ${expanded && html`<div style=${{marginTop:'.4rem',maxHeight:400,overflowY:'auto',border:'1px solid var(--border)',borderRadius:6,background:'var(--bg-primary)'}}>
          ${typeList.length<2 && html`<div style=${{padding:'1rem',fontSize:'0.75rem',color:'var(--text-faint)',textAlign:'center'}}>
            Load IFC models to populate the type list, or types from the default set will be shown.
          </div>`}
          ${typeList.length>=2 && html`<table style=${{width:'100%',borderCollapse:'collapse',fontSize:'0.67rem'}}>
            <tbody>
              ${pairs.map(function(pr){
                var val = defaultTols[pr.key];
                var hasVal = val!==undefined && val!==null;
                return html`<tr key=${pr.key} style=${{borderBottom:'1px solid var(--border-subtle)'}}>
                  <td style=${{padding:'.3rem .4rem',color:'var(--text-secondary)',whiteSpace:'nowrap',width:'38%'}}>
                    ${shortName(pr.a)}
                  </td>
                  <td style=${{padding:'.3rem 0',color:'var(--text-faint)',width:16,textAlign:'center'}}>↔</td>
                  <td style=${{padding:'.3rem .4rem',color:'var(--text-secondary)',whiteSpace:'nowrap',width:'38%'}}>
                    ${shortName(pr.b)}
                  </td>
                  <td style=${{padding:'.2rem .4rem',textAlign:'right',width:80}}>
                    <input type="number" min="0" max="9999" step="5"
                      value=${hasVal?val:''}
                      placeholder=${defaultGap}
                      onFocus=${function(e){e.target.select();}}
                      onChange=${function(e){
                        var v=e.target.value;
                        if(v===''||v===null) setTol(pr.key,null);
                        else setTol(pr.key,Math.max(0,+v||0));
                      }}
                      onClick=${function(e){e.stopPropagation();}}
                      style=${{...S_INPUT,width:48,textAlign:'center',fontSize:'0.67rem',padding:'2px 3px',
                        background:hasVal?'rgba(37,99,235,.1)':'var(--bg-secondary)',
                        borderColor:hasVal?'rgba(37,99,235,.3)':'var(--border)',
                        color:hasVal?'var(--text-primary)':'var(--text-faint)'}} />
                    <span style=${{color:'var(--text-faint)',fontSize:'0.57rem',marginLeft:2}}>mm</span>
                  </td>
                </tr>`;
              })}
            </tbody>
          </table>`}
        </div>`}

        ${expanded && filledCount>0 && html`<button onClick=${applyToRules}
          style=${{...S_BTN,width:'100%',padding:'.35rem',fontSize:'0.75rem',fontWeight:600,marginTop:'.4rem',
            background:'var(--accent)',color:'#fff',border:'none',borderRadius:6}}>
          Apply ${filledCount} tolerance${filledCount!==1?'s':''} to Current Detection Rules
        </button>`}

        <div style=${{fontSize:'0.63rem',color:'var(--text-faint)',lineHeight:1.5,marginTop:'.4rem'}}>
          Empty cells use the default gap (${defaultGap}mm). Set 0 for hard-clash-only on that pair. Changes are saved automatically.
        </div>
      </div>`}
    </div>`;
  }

  // ── Revit Bridge (AI-powered MCP integration) ─────────────────

  // Persist bridge config to localStorage
  function _saveBridgeConfig(bridge) {
    try {
      localStorage.setItem('cc_revit_bridge', JSON.stringify({
        provider: bridge.provider,
        apiKey: bridge.apiKey,
        mcpHost: bridge.mcpHost,
        mcpPort: bridge.mcpPort
      }));
    } catch(e) {}
  }
  function _loadBridgeConfig() {
    try {
      var raw = localStorage.getItem('cc_revit_bridge');
      return raw ? JSON.parse(raw) : null;
    } catch(e) { return null; }
  }

  // Build tool definitions that expose ClashControl data to the AI
  function _buildCCTools() {
    return [
      {
        name: 'get_clashes',
        description: 'Get all clash detection results from ClashControl. Returns array of clashes with element info, location, status, type.',
        parameters: { type: 'object', properties: { status: { type: 'string', enum: ['all','open','resolved','closed'], description: 'Filter by status' } } }
      },
      {
        name: 'get_issues',
        description: 'Get all issues from ClashControl. Returns array of issues with title, status, priority, assigned element info.',
        parameters: { type: 'object', properties: { status: { type: 'string', enum: ['all','open','in_progress','resolved','closed'], description: 'Filter by status' } } }
      },
      {
        name: 'update_clash_status',
        description: 'Update the status of a clash in ClashControl.',
        parameters: { type: 'object', properties: { clash_id: { type: 'string', description: 'The clash ID' }, status: { type: 'string', enum: ['open','resolved','closed'] }, comment: { type: 'string', description: 'Optional resolution comment' } }, required: ['clash_id','status'] }
      },
      {
        name: 'update_issue_status',
        description: 'Update the status of an issue in ClashControl.',
        parameters: { type: 'object', properties: { issue_id: { type: 'string', description: 'The issue ID' }, status: { type: 'string', enum: ['open','in_progress','resolved','closed'] }, comment: { type: 'string', description: 'Optional comment' } }, required: ['issue_id','status'] }
      },
      {
        name: 'push_to_revit',
        description: 'Push clash/issue data to Revit via MCP. Creates clash markers, sets parameters on elements, creates filtered views.',
        parameters: { type: 'object', properties: { item_ids: { type: 'array', items: { type: 'string' }, description: 'IDs of clashes/issues to push. If empty, pushes all open items.' } } }
      },
      {
        name: 'pull_from_revit',
        description: 'Pull resolution status from Revit via MCP. Checks if clashing elements have been moved and updates ClashControl accordingly.',
        parameters: { type: 'object', properties: {} }
      },
      {
        name: 'get_revit_status',
        description: 'Check if Revit MCP server is running and responsive.',
        parameters: { type: 'object', properties: {} }
      },
      {
        name: 'analyze_clashes',
        description: 'Analyze clash detection results. Returns statistics, patterns, hotspots, and priority recommendations. Use this to understand the overall clash situation.',
        parameters: { type: 'object', properties: {} }
      },
      {
        name: 'suggest_resolution',
        description: 'Get AI-powered resolution suggestions for a specific clash or set of clashes. Returns recommended actions based on element types, disciplines, and spatial context.',
        parameters: { type: 'object', properties: { clash_id: { type: 'string', description: 'Specific clash ID to analyze, or omit for top-priority clashes' } } }
      },
      {
        name: 'generate_report',
        description: 'Generate a coordination report summarizing clashes by discipline, storey, priority, and status. Suitable for sharing with project teams.',
        parameters: { type: 'object', properties: { format: { type: 'string', enum: ['summary','detailed','discipline'], description: 'Report format' } } }
      },
      {
        name: 'batch_update_status',
        description: 'Batch update status of multiple clashes or issues at once. Use for bulk operations like marking all resolved, closing old clashes, etc.',
        parameters: { type: 'object', properties: { ids: { type: 'array', items: { type: 'string' }, description: 'Array of clash/issue IDs to update' }, status: { type: 'string', enum: ['open','in_progress','resolved','closed'] }, item_type: { type: 'string', enum: ['clash','issue'], description: 'Whether these are clash IDs or issue IDs' } }, required: ['ids','status','item_type'] }
      },
      {
        name: 'batch_assign',
        description: 'Batch assign multiple issues to a person.',
        parameters: { type: 'object', properties: { ids: { type: 'array', items: { type: 'string' }, description: 'Array of issue IDs' }, assignee: { type: 'string', description: 'Name of the person to assign to' } }, required: ['ids','assignee'] }
      }
    ];
  }

  // Execute a tool call from the AI response
  function _executeCCTool(name, args, s, d) {
    switch(name) {
      case 'get_clashes': {
        var items = s.clashes;
        if (args.status && args.status !== 'all') items = items.filter(function(c) { return c.status === args.status; });
        return JSON.stringify(items.map(function(c) {
          return { id:c.id, type:c.type, status:c.status, title:c.title, elemAName:c.elemAName, elemBName:c.elemBName,
            elemAType:c.elemAType, elemBType:c.elemBType, point:c.point, distance:c.distance, elevation:c.elevation,
            elemAStorey:c.elemAStorey, elemBStorey:c.elemBStorey, disciplines:c.disciplines };
        }));
      }
      case 'get_issues': {
        var items2 = s.issues;
        if (args.status && args.status !== 'all') items2 = items2.filter(function(i) { return i.status === args.status; });
        return JSON.stringify(items2.map(function(i) {
          return { id:i.id, type:i.type, status:i.status, title:i.title, priority:i.priority, category:i.category,
            assignee:i.assignee, elementName:i.elementName, elementType:i.elementType, point:i.point, storey:i.storey };
        }));
      }
      case 'update_clash_status': {
        if (args.clash_id && args.status) {
          var upd = { status: args.status };
          if (args.comment) upd.description = args.comment;
          d({ t:A.UPD_CLASH, id:args.clash_id, u:upd });
          return JSON.stringify({ success:true, id:args.clash_id, newStatus:args.status });
        }
        return JSON.stringify({ success:false, error:'Missing clash_id or status' });
      }
      case 'update_issue_status': {
        if (args.issue_id && args.status) {
          var upd2 = { status: args.status };
          if (args.comment) upd2.description = args.comment;
          d({ t:A.UPD_ISSUE, id:args.issue_id, u:upd2 });
          return JSON.stringify({ success:true, id:args.issue_id, newStatus:args.status });
        }
        return JSON.stringify({ success:false, error:'Missing issue_id or status' });
      }
      case 'push_to_revit': {
        // This tool call is forwarded to the Revit MCP by the AI
        return JSON.stringify({ action:'forward_to_revit_mcp', tool:'place_family', note:'AI should call Revit MCP tools to place markers' });
      }
      case 'pull_from_revit': {
        return JSON.stringify({ action:'forward_to_revit_mcp', tool:'get_revit_model_info', note:'AI should query Revit MCP for element status' });
      }
      case 'get_revit_status': {
        return JSON.stringify({ action:'forward_to_revit_mcp', tool:'get_revit_status', note:'AI should call Revit MCP get_revit_status' });
      }
      case 'analyze_clashes': {
        var clashes = s.clashes;
        var total = clashes.length;
        var byStatus = {}; clashes.forEach(function(c){ byStatus[c.status] = (byStatus[c.status]||0)+1; });
        var byType = {}; clashes.forEach(function(c){ byType[c.type] = (byType[c.type]||0)+1; });
        var byStorey = {}; clashes.forEach(function(c){
          var st = c.elemAStorey || c.elemBStorey || 'Unknown';
          byStorey[st] = (byStorey[st]||0)+1;
        });
        var byDisc = {}; clashes.forEach(function(c){
          if(c.disciplines) c.disciplines.forEach(function(dd){ byDisc[dd]=(byDisc[dd]||0)+1; });
        });
        // Find hotspot storey
        var hotStorey = Object.keys(byStorey).sort(function(a,b){return byStorey[b]-byStorey[a];})[0]||'N/A';
        // Element type pairs
        var typePairs = {}; clashes.forEach(function(c){
          var pair = [c.elemAType||'?',c.elemBType||'?'].sort().join(' vs ');
          typePairs[pair] = (typePairs[pair]||0)+1;
        });
        var topPairs = Object.keys(typePairs).sort(function(a,b){return typePairs[b]-typePairs[a];}).slice(0,5);
        return JSON.stringify({ total:total, byStatus:byStatus, byType:byType, byStorey:byStorey, byDiscipline:byDisc,
          hotspotStorey:hotStorey, hotspotCount:byStorey[hotStorey]||0,
          topElementTypePairs:topPairs.map(function(p){return {pair:p,count:typePairs[p]};})
        });
      }
      case 'suggest_resolution': {
        var target = args.clash_id ? s.clashes.filter(function(c){return c.id===args.clash_id;}) : s.clashes.filter(function(c){return c.status==='open';}).slice(0,5);
        return JSON.stringify(target.map(function(c){
          return { id:c.id, type:c.type, elemAType:c.elemAType, elemBType:c.elemBType, elemAName:c.elemAName, elemBName:c.elemBName,
            elemAStorey:c.elemAStorey, distance:c.distance, disciplines:c.disciplines,
            context:'Provide resolution suggestions based on these element types, disciplines, and spatial relationship.' };
        }));
      }
      case 'generate_report': {
        var fmt = args.format || 'summary';
        var cl = s.clashes, is = s.issues;
        var data = { format:fmt, totalClashes:cl.length, totalIssues:is.length,
          clashBreakdown:{ open:cl.filter(function(c){return c.status==='open';}).length, resolved:cl.filter(function(c){return c.status==='resolved'||c.status==='closed';}).length, hard:cl.filter(function(c){return c.type==='hard';}).length, soft:cl.filter(function(c){return c.type==='soft';}).length },
          issueBreakdown:{ open:is.filter(function(i){return i.status==='open';}).length, inProgress:is.filter(function(i){return i.status==='in_progress';}).length, resolved:is.filter(function(i){return i.status==='resolved'||i.status==='closed';}).length }
        };
        if (fmt === 'detailed' || fmt === 'discipline') {
          var discData = {};
          cl.forEach(function(c){ (c.disciplines||[]).forEach(function(dd){ if(!discData[dd])discData[dd]={total:0,open:0,hard:0}; discData[dd].total++; if(c.status==='open')discData[dd].open++; if(c.type==='hard')discData[dd].hard++; }); });
          data.byDiscipline = discData;
        }
        return JSON.stringify(data);
      }
      case 'batch_update_status': {
        if (args.ids && args.status && args.item_type) {
          var actionType = args.item_type === 'clash' ? 'UPD_CLASH' : 'UPD_ISSUE';
          args.ids.forEach(function(id) { d({ t:actionType, id:id, u:{status:args.status} }); });
          return JSON.stringify({ success:true, updated:args.ids.length, newStatus:args.status });
        }
        return JSON.stringify({ success:false, error:'Missing ids, status, or item_type' });
      }
      case 'batch_assign': {
        if (args.ids && args.assignee) {
          args.ids.forEach(function(id) { d({ t:A.UPD_ISSUE, id:id, u:{assignee:args.assignee} }); });
          return JSON.stringify({ success:true, assigned:args.ids.length, assignee:args.assignee });
        }
        return JSON.stringify({ success:false, error:'Missing ids or assignee' });
      }
      default:
        return JSON.stringify({ error:'Unknown tool: ' + name });
    }
  }

  // Call AI API with tools (supports Anthropic, OpenAI, Google)
  function _callAIWithTools(provider, apiKey, systemPrompt, userMessage, tools, mcpConfig) {
    var toolDefs = tools.map(function(t) {
      if (provider === 'anthropic') {
        return { name:t.name, description:t.description, input_schema:t.parameters };
      } else if (provider === 'openai') {
        return { type:'function', function:{ name:t.name, description:t.description, parameters:t.parameters } };
      } else {
        // Google Gemini
        return { name:t.name, description:t.description, parameters:t.parameters };
      }
    });

    var mcpNote = '\n\nRevit MCP server is available at ' + mcpConfig.mcpHost + ':' + mcpConfig.mcpPort + '. When you need to interact with Revit, describe the MCP tool calls needed (place_family, set_element_parameter, etc.) in your response.';

    if (provider === 'anthropic') {
      return fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'x-api-key':apiKey,
          'anthropic-version':'2023-06-01',
          'anthropic-dangerous-direct-browser-access':'true'
        },
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:4096,
          system:systemPrompt + mcpNote,
          messages:[{role:'user',content:userMessage}],
          tools:toolDefs
        })
      }).then(function(r) { return r.json(); });
    } else if (provider === 'openai') {
      return fetch('https://api.openai.com/v1/chat/completions', {
        method:'POST',
        headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+apiKey },
        body:JSON.stringify({
          model:'gpt-4o',
          messages:[{role:'system',content:systemPrompt+mcpNote},{role:'user',content:userMessage}],
          tools:toolDefs,
          tool_choice:'auto'
        })
      }).then(function(r) { return r.json(); });
    } else if (provider === 'google') {
      return fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+apiKey, {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body:JSON.stringify({
          system_instruction:{parts:[{text:systemPrompt+mcpNote}]},
          contents:[{role:'user',parts:[{text:userMessage}]}],
          tools:[{function_declarations:toolDefs}]
        })
      }).then(function(r) { return r.json(); });
    }
    return Promise.reject(new Error('Unknown provider: '+provider));
  }

  // Parse tool calls from AI response (normalize across providers)
  function _parseAIToolCalls(provider, response) {
    var text = '';
    var toolCalls = [];
    if (provider === 'anthropic') {
      var content = response.content || [];
      content.forEach(function(block) {
        if (block.type === 'text') text += block.text;
        if (block.type === 'tool_use') toolCalls.push({ id:block.id, name:block.name, args:block.input||{} });
      });
    } else if (provider === 'openai') {
      var choice = (response.choices||[])[0]||{};
      var msg = choice.message||{};
      text = msg.content||'';
      (msg.tool_calls||[]).forEach(function(tc) {
        var fn = tc.function||{};
        toolCalls.push({ id:tc.id, name:fn.name, args:JSON.parse(fn.arguments||'{}') });
      });
    } else if (provider === 'google') {
      var parts = ((response.candidates||[])[0]||{}).content||{};
      (parts.parts||[]).forEach(function(p) {
        if (p.text) text += p.text;
        if (p.functionCall) toolCalls.push({ id:uid(), name:p.functionCall.name, args:p.functionCall.args||{} });
      });
    }
    return { text:text, toolCalls:toolCalls };
  }

  // System prompt for the AI bridge
  var BRIDGE_SYSTEM_PROMPT = 'You are the ClashControl-Revit Bridge AI. Your job is to help sync clash detection data and issues between ClashControl (a web-based BIM clash detection tool) and Autodesk Revit (via MCP server).\n\n' +
    'You have tools to read clashes and issues from ClashControl, update their statuses, and coordinate with Revit MCP.\n\n' +
    'When pushing clashes to Revit:\n' +
    '1. Read open clashes from ClashControl using get_clashes\n' +
    '2. For each clash, describe what Revit MCP calls are needed (place_family at clash point, set_element_parameter for CC_ClashID, CC_Status, etc.)\n' +
    '3. Summarize what was pushed\n\n' +
    'When pulling status from Revit:\n' +
    '1. Query Revit MCP for elements tagged with CC_ClashID parameters\n' +
    '2. Check if geometries have changed (elements moved/resized)\n' +
    '3. Update ClashControl clash statuses using update_clash_status\n' +
    '4. Summarize what changed\n\n' +
    'Be concise. Use tool calls. Report results clearly.';

  // High-level push/pull orchestration
  function _revitBridgePush(s, d) {
    var bridge = s.revitBridge;
    if (!bridge.provider || !bridge.apiKey) return Promise.reject(new Error('Configure AI provider and API key first'));

    d({t:A.UPD_BRIDGE,u:{syncing:true}});
    d({t:A.BRIDGE_LOG,logType:'push',text:'Pushing ' + s.clashes.filter(function(c){return c.status==='open';}).length + ' open clashes + ' + s.issues.filter(function(i){return i.status==='open';}).length + ' open issues to Revit...'});

    var tools = _buildCCTools();
    var userMsg = 'Push all open clashes and issues from ClashControl to Revit. First use get_clashes and get_issues to read the data, then describe the Revit MCP calls needed to create markers and tag elements. Finally summarize what would be pushed.';

    return _callAIWithTools(bridge.provider, bridge.apiKey, BRIDGE_SYSTEM_PROMPT, userMsg, tools, bridge)
      .then(function(response) {
        var parsed = _parseAIToolCalls(bridge.provider, response);
        // Execute any tool calls
        var toolResults = parsed.toolCalls.map(function(tc) {
          return { id:tc.id, name:tc.name, result:_executeCCTool(tc.name, tc.args, s, d) };
        });
        var summary = parsed.text || 'Push completed.';
        if (toolResults.length) {
          summary += '\n\nTool calls executed: ' + toolResults.map(function(tr){ return tr.name; }).join(', ');
        }
        d({t:A.BRIDGE_LOG,logType:'push',text:summary});
        d({t:A.UPD_BRIDGE,u:{syncing:false,lastSync:Date.now()}});
        return summary;
      })
      .catch(function(err) {
        d({t:A.BRIDGE_LOG,logType:'error',text:'Push failed: '+err.message});
        d({t:A.UPD_BRIDGE,u:{syncing:false}});
        throw err;
      });
  }

  function _revitBridgePull(s, d) {
    var bridge = s.revitBridge;
    if (!bridge.provider || !bridge.apiKey) return Promise.reject(new Error('Configure AI provider and API key first'));

    d({t:A.UPD_BRIDGE,u:{syncing:true}});
    d({t:A.BRIDGE_LOG,logType:'pull',text:'Pulling status updates from Revit...'});

    var tools = _buildCCTools();
    var userMsg = 'Pull resolution status from Revit back to ClashControl. First check Revit MCP status, then check which clashes have been resolved in Revit, and update ClashControl accordingly using update_clash_status and update_issue_status tools.';

    return _callAIWithTools(bridge.provider, bridge.apiKey, BRIDGE_SYSTEM_PROMPT, userMsg, tools, bridge)
      .then(function(response) {
        var parsed = _parseAIToolCalls(bridge.provider, response);
        parsed.toolCalls.forEach(function(tc) {
          _executeCCTool(tc.name, tc.args, s, d);
        });
        var summary = parsed.text || 'Pull completed.';
        d({t:A.BRIDGE_LOG,logType:'pull',text:summary});
        d({t:A.UPD_BRIDGE,u:{syncing:false,lastSync:Date.now()}});
        return summary;
      })
      .catch(function(err) {
        d({t:A.BRIDGE_LOG,logType:'error',text:'Pull failed: '+err.message});
        d({t:A.UPD_BRIDGE,u:{syncing:false}});
        throw err;
      });
  }

          h('div',{style:{display:'flex',gap:'.5rem'}},

  // ── Minimal DXF Parser ────────────────────────────────────────
  // Parses LINE, LWPOLYLINE, POLYLINE, CIRCLE, ARC, TEXT entities from DXF ASCII files
  function parseDXF(text) {
    var lines = text.split(/\r?\n/);
    var entities = [], i = 0;
    // Find ENTITIES section
    while (i < lines.length) {
      if (lines[i].trim() === 'ENTITIES') { i++; break; }
      i++;
    }
    var bounds = { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity };
    function addPt(x, y) {
      if (x < bounds.minX) bounds.minX = x;
      if (y < bounds.minY) bounds.minY = y;
      if (x > bounds.maxX) bounds.maxX = x;
      if (y > bounds.maxY) bounds.maxY = y;
    }
    function readEntity() {
      var type = lines[i].trim(); i++;
      var ent = { type: type, props: {} };
      var pts = [];
      while (i < lines.length - 1) {
        var code = parseInt(lines[i].trim(), 10);
        var val = (lines[i + 1] || '').trim();
        i += 2;
        if (code === 0) { i -= 2; break; }
        if (code === 10 || code === 11) ent.props['x' + (code === 11 ? '2' : '1')] = parseFloat(val);
        else if (code === 20 || code === 21) ent.props['y' + (code === 21 ? '2' : '1')] = parseFloat(val);
        else if (code === 40) ent.props.radius = parseFloat(val);
        else if (code === 50) ent.props.startAngle = parseFloat(val);
        else if (code === 51) ent.props.endAngle = parseFloat(val);
        else if (code === 1) ent.props.text = val;
        else if (code === 8) ent.props.layer = val;
        else if (code === 62) ent.props.color = parseInt(val, 10);
        // LWPOLYLINE vertex collection
        if (type === 'LWPOLYLINE') {
          if (code === 10) { pts.push({ x: parseFloat(val) }); }
          else if (code === 20 && pts.length > 0) { pts[pts.length - 1].y = parseFloat(val); }
        }
      }
      if (type === 'LWPOLYLINE') ent.vertices = pts;
      return ent;
    }
    while (i < lines.length) {
      var code2 = parseInt(lines[i].trim(), 10);
      if (code2 === 0) {
        var val2 = (lines[i + 1] || '').trim();
        i += 2;
        if (val2 === 'ENDSEC' || val2 === 'EOF') break;
        // Parse the entity
        var ent = readEntity();
        if (ent.type === 'LINE') {
          addPt(ent.props.x1, ent.props.y1); addPt(ent.props.x2, ent.props.y2);
          entities.push(ent);
        } else if (ent.type === 'LWPOLYLINE' && ent.vertices) {
          ent.vertices.forEach(function(v) { if (v.x != null && v.y != null) addPt(v.x, v.y); });
          entities.push(ent);
        } else if (ent.type === 'CIRCLE' || ent.type === 'ARC') {
          var r = ent.props.radius || 0;
          addPt(ent.props.x1 - r, ent.props.y1 - r);
          addPt(ent.props.x1 + r, ent.props.y1 + r);
          entities.push(ent);
        } else if (ent.type === 'TEXT' || ent.type === 'MTEXT') {
          addPt(ent.props.x1, ent.props.y1);
          entities.push(ent);
        }
      } else { i++; }
    }
    return { entities: entities, bounds: bounds };
  }

  // Render DXF entities to a canvas
  function renderDXFToCanvas(dxfData, width, height) {
    var canvas = document.createElement('canvas');
    canvas.width = width; canvas.height = height;
    var ctx = canvas.getContext('2d');
    var b = dxfData.bounds;
    // Guard against Infinity bounds (no geometry matched)
    if (!isFinite(b.minX)) { b.minX = 0; b.maxX = 1; b.minY = 0; b.maxY = 1; }
    var dw = b.maxX - b.minX || 1, dh = b.maxY - b.minY || 1;
    var pad = 0.05;
    var scale = Math.min(width * (1 - 2 * pad) / dw, height * (1 - 2 * pad) / dh);
    var ox = (width - dw * scale) / 2 - b.minX * scale;
    var oy = (height + dh * scale) / 2 + b.minY * scale; // flip Y
    function tx(x) { return x * scale + ox; }
    function ty(y) { return -y * scale + oy; }
    ctx.fillStyle = '#0f172a';
    ctx.fillRect(0, 0, width, height);
    ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 1; ctx.lineCap = 'round';
    dxfData.entities.forEach(function(ent) {
      if (ent.type === 'LINE') {
        ctx.beginPath();
        ctx.moveTo(tx(ent.props.x1), ty(ent.props.y1));
        ctx.lineTo(tx(ent.props.x2), ty(ent.props.y2));
        ctx.stroke();
      } else if (ent.type === 'LWPOLYLINE' && ent.vertices) {
        ctx.beginPath();
        ent.vertices.forEach(function(v, idx) {
          if (v.x == null || v.y == null) return;
          if (idx === 0) ctx.moveTo(tx(v.x), ty(v.y));
          else ctx.lineTo(tx(v.x), ty(v.y));
        });
        ctx.stroke();
      } else if (ent.type === 'CIRCLE') {
        ctx.beginPath();
        ctx.arc(tx(ent.props.x1), ty(ent.props.y1), (ent.props.radius || 1) * scale, 0, Math.PI * 2);
        ctx.stroke();
      } else if (ent.type === 'ARC') {
        var sa = -(ent.props.startAngle || 0) * Math.PI / 180;
        var ea = -(ent.props.endAngle || 360) * Math.PI / 180;
        ctx.beginPath();
        ctx.arc(tx(ent.props.x1), ty(ent.props.y1), (ent.props.radius || 1) * scale, sa, ea, true);
        ctx.stroke();
      } else if (ent.type === 'TEXT' || ent.type === 'MTEXT') {
        ctx.fillStyle = '#94a3b8';
        ctx.font = Math.max(8, 12 * scale / 100) + 'px monospace';
        ctx.fillText(ent.props.text || '', tx(ent.props.x1), ty(ent.props.y1));
      }
    });
    return { canvas: canvas, originX: ox, originY: oy, scale: scale, extentW: dw, extentH: dh };
  }

  // Load PDF page to canvas
  function loadPDFPage(arrayBuffer, pageNum) {
    if (!window.pdfjsLib) return Promise.reject(new Error('PDF.js not loaded'));

  // ── 2D View Component ──────────────────────────────────────────
  function View2D(props) {
    var s = props.s, d = props.d;

    var panRef = useRef({ x: 0, y: 0, zoom: 1, dragging: false, lx: 0, ly: 0 });
    var markupPtsRef = useRef([]);

    var sRef = useRef(s);

    var activeUl = s.underlays.find(function(u) { return u.id === s.activeUnderlay; });

    function redraw() {
      var cvs = canvasRef.current; if (!cvs) return;
      var s = sRef.current; // always use latest state
      var ctx = cvs.getContext('2d');
      var w = cvs.width, h = cvs.height;
      var pan = panRef.current;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(0, 0, w, h);
      ctx.save();
      ctx.translate(w / 2 + pan.x, h / 2 + pan.y);
      ctx.scale(pan.zoom, pan.zoom);

      // Draw grid
      ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 0.5 / pan.zoom;
      var gridStep = 50;
      var range = Math.max(w, h) / pan.zoom;
      for (var gx = -range; gx < range; gx += gridStep) {
        ctx.beginPath(); ctx.moveTo(gx, -range); ctx.lineTo(gx, range); ctx.stroke();
      }
      for (var gy = -range; gy < range; gy += gridStep) {
        ctx.beginPath(); ctx.moveTo(-range, gy); ctx.lineTo(range, gy); ctx.stroke();
      }
      // Origin cross
      ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2 / pan.zoom;
      ctx.beginPath(); ctx.moveTo(-15 / pan.zoom, 0); ctx.lineTo(15 / pan.zoom, 0); ctx.stroke();
      ctx.strokeStyle = '#22c55e';
      ctx.beginPath(); ctx.moveTo(0, -15 / pan.zoom); ctx.lineTo(0, 15 / pan.zoom); ctx.stroke();

      // Draw each visible underlay
      s.underlays.forEach(function(ul) {
        if (!ul.visible || !ul.canvasData) return;
        ctx.save();
        ctx.globalAlpha = ul.opacity != null ? ul.opacity : 0.7;
        ctx.translate(ul.offsetX || 0, ul.offsetY || 0);
        ctx.rotate((ul.rotation || 0) * Math.PI / 180);
        var sc = ul.scale || 1;
        var img = _underlayImgCache[ul.id];
        if (!img || _underlayImgDataCache[ul.id] !== ul.canvasData) {
          img = new Image();
          img.src = ul.canvasData;

          _underlayImgDataCache[ul.id] = ul.canvasData;
          img.onload = function() { redraw(); };

        if (img.complete && img.naturalWidth > 0) {

        ctx.restore();
      });

      // Draw 3D model floor plan outline (if in compare mode)
      if (s.underlayMode === 'compare' && s.floorPlan && _cc2DOutlines) {
        ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 2 / pan.zoom; ctx.globalAlpha = 0.8;

          ctx.beginPath();

          ctx.lineTo(seg[2], -seg[3]);

      }

      // Draw markups
      ctx.lineWidth = 2 / pan.zoom; ctx.lineCap = 'round';
      s.markups.forEach(function(mk) {
        ctx.strokeStyle = mk.color || '#f59e0b'; ctx.fillStyle = mk.color || '#f59e0b';
        if (mk.type === 'line' && mk.points && mk.points.length >= 4) {
          ctx.beginPath();
          ctx.moveTo(mk.points[0], mk.points[1]);
          ctx.lineTo(mk.points[2], mk.points[3]);
          ctx.stroke();
        } else if (mk.type === 'rect' && mk.points && mk.points.length >= 4) {
          ctx.strokeRect(mk.points[0], mk.points[1], mk.points[2] - mk.points[0], mk.points[3] - mk.points[1]);
        } else if (mk.type === 'arrow' && mk.points && mk.points.length >= 4) {
          ctx.beginPath();
          ctx.moveTo(mk.points[0], mk.points[1]);
          ctx.lineTo(mk.points[2], mk.points[3]);
          ctx.stroke();
          // Arrowhead
          var dx = mk.points[2] - mk.points[0], dy = mk.points[3] - mk.points[1];
          var ang = Math.atan2(dy, dx);
          var hl = 10 / pan.zoom;
          ctx.beginPath();
          ctx.moveTo(mk.points[2], mk.points[3]);
          ctx.lineTo(mk.points[2] - hl * Math.cos(ang - 0.4), mk.points[3] - hl * Math.sin(ang - 0.4));
          ctx.moveTo(mk.points[2], mk.points[3]);
          ctx.lineTo(mk.points[2] - hl * Math.cos(ang + 0.4), mk.points[3] - hl * Math.sin(ang + 0.4));
          ctx.stroke();
        } else if (mk.type === 'text' && mk.points && mk.text) {

          ctx.fillText(mk.text, mk.points[0], mk.points[1]);

        if (s.markupTool === 'line' || s.markupTool === 'arrow') {

        } else if (s.markupTool === 'rect') {
          ctx.strokeRect(mp[0], mp[1], (mp[2] || mp[0]) - mp[0], (mp[3] || mp[1]) - mp[1]);
        }
        ctx.setLineDash([]);
      }
      ctx.restore();
    }

    useEffect(function() {
      // Purge image cache for removed underlays
      var ids = s.underlays.reduce(function(acc, u) { acc[u.id] = true; return acc; }, {});
      Object.keys(_underlayImgCache).forEach(function(k) { if (!ids[k]) { delete _underlayImgCache[k]; delete _underlayImgDataCache[k]; } });
      redraw();
    }, [s.underlays, s.activeUnderlay, s.markups, s.markupTool, s.underlayMode, s.floorPlan]);

    useEffect(function() {
      var cvs = canvasRef.current; if (!cvs) return;
      window._cc2DCanvas = cvs;

      function resize() { cvs.width = el.clientWidth; cvs.height = el.clientHeight; redraw(); }

    }, []);

    function toWorld(e) {
      var cvs = canvasRef.current; if (!cvs) return [0, 0];
      var rect = cvs.getBoundingClientRect();
      var pan = panRef.current;

      var py = e.clientY - rect.top - cvs.height / 2 - pan.y;

    var toolBtns = ['line', 'rect', 'arrow', 'text', 'erase'];
    var toolIcons = { line: '╱', rect: '▭', arrow: '→', text: 'T', erase: '✕' };
    return html`<div style=${{ position: 'relative', flex: 1, overflow: 'hidden' }}>
      <canvas ref=${canvasRef} onMouseDown=${onDown} onMouseMove=${onMove} onMouseUp=${onUp} onWheel=${onWheel}
        style=${{ width: '100%', height: '100%', cursor: s.markupTool ? 'crosshair' : 'grab' }} />
      <div style=${{ position: 'absolute', top: '.5rem', left: '.5rem', display: 'flex', gap: '.2rem', pointerEvents: 'auto' }}>
        ${toolBtns.map(function(t) {
          return html`<button key=${t} onClick=${function() { d({ t: 'MARKUP_TOOL', v: s.markupTool === t ? null : t }); }}
            style=${{ ...S_BTN, fontSize: '.65rem', padding: '.25rem .4rem',

        })}
        ${s.markups.length > 0 && html`<button onClick=${function() { d({ t: 'CLEAR_MARKUPS' }); }}
          style=${{ ...S_BTN, fontSize: '.55rem', padding: '.25rem .4rem', background: 'var(--overlay-bg)', color: '#ef4444', border: '1px solid var(--border)' }}>Clear all</button>`}
      </div>
      <div style=${{ position: 'absolute', top: '.5rem', right: '.5rem', display: 'flex', gap: '.3rem', pointerEvents: 'auto' }}>
        <button onClick=${function() { d({ t: 'UNDERLAY_MODE', v: null }); }}
          style=${{ ...S_BTN, fontSize: '.6rem', padding: '.2rem .5rem', background: '#2563eb', color: '#fff', border: '1px solid #3b82f6' }}>Back to 3D</button>
        ${s.floorPlan && html`<button onClick=${function() { d({ t: 'UNDERLAY_MODE', v: s.underlayMode === 'compare' ? 'view2d' : 'compare' }); }}
          style=${{ ...S_BTN, fontSize: '.6rem', padding: '.2rem .5rem',
            background: s.underlayMode === 'compare' ? '#7c3aed' : 'var(--overlay-bg)',
            color: s.underlayMode === 'compare' ? '#fff' : 'var(--text-muted)',
            border: '1px solid var(--border)' }}>${s.underlayMode === 'compare' ? 'Compare ON' : 'Compare'}</button>`}

        <div style=${{ fontSize: '.65rem', fontWeight: 600, color: 'var(--text-primary)' }}>${activeUl.name}</div>
        <label style=${{ fontSize: '.55rem', color: 'var(--text-muted)', display: 'flex', alignItems: 'center', gap: '.3rem' }}>

            style=${{ width: 80 }} /> ${Math.round((activeUl.scale || 1) * 100)}%</label>

            onInput=${function(e) { d({ t: 'UPD_UNDERLAY', id: activeUl.id, u: { offsetX: +e.target.value } }); }}
            style=${{ ...S_INPUT, width: 50, fontSize: '.55rem', padding: '.1rem .2rem' }} /></label>

      ${s.underlays.length > 1 && html`<div style=${{ position: 'absolute', bottom: '.5rem', right: '.5rem', background: 'var(--overlay-bg)', border: '1px solid var(--border)', borderRadius: 8, padding: '.3rem', pointerEvents: 'auto', display: 'flex', flexDirection: 'column', gap: '.2rem' }}>

            <span onClick=${function() { d({ t: 'SET_UNDERLAY', id: ul.id }); }}
              style=${{ fontSize: '.55rem', color: s.activeUnderlay === ul.id ? '#3b82f6' : 'var(--text-muted)', cursor: 'pointer' }}>${ul.name}</span>
          </div>`;
        })}
      </div>`}
    </div>`;
  }

  // ── 2D Generation & Export ──────────────────────────────────────
  // Generate floor plan outlines from 3D geometry at a given elevation
  function generate2DOutlines(models, elevation, cutHeight) {
    var outlines = [];
    var cutAt = elevation + (cutHeight || 1.2);
    models.forEach(function(m) {
      if (!m.visible) return;
      (m.elements || []).forEach(function(el) {
        if (!el.box) return;
        var b = el.box;
        // Skip elements entirely above or below cut
        if (b.min.y > cutAt || b.max.y < elevation) return;
        // Project bounding box edges at cut level (XZ plane)
        var x1 = b.min.x, z1 = b.min.z, x2 = b.max.x, z2 = b.max.z;
        outlines.push([x1, z1, x2, z1]); // bottom
        outlines.push([x2, z1, x2, z2]); // right
        outlines.push([x2, z2, x1, z2]); // top
        outlines.push([x1, z2, x1, z1]); // left
      });
    });
    return outlines;
  }

  // Export outlines to DXF format string
  function exportDXF(outlines, models, elevation) {
    var dxf = '0\nSECTION\n2\nHEADER\n0\nENDSEC\n';
    dxf += '0\nSECTION\n2\nTABLES\n0\nENDSEC\n';
    dxf += '0\nSECTION\n2\nENTITIES\n';
    outlines.forEach(function(seg) {
      dxf += '0\nLINE\n8\nFloorPlan\n';
      dxf += '10\n' + seg[0].toFixed(4) + '\n20\n' + seg[1].toFixed(4) + '\n30\n0.0\n';
      dxf += '11\n' + seg[2].toFixed(4) + '\n21\n' + seg[3].toFixed(4) + '\n31\n0.0\n';
    });
    dxf += '0\nENDSEC\n0\nEOF\n';
    return dxf;
  }

  // Export 2D view to PNG (captures the 2D canvas)
  function export2DPNG(canvasEl) {
    if (!canvasEl) return;
    var link = document.createElement('a');
    link.download = 'floorplan_' + new Date().toISOString().slice(0, 10) + '.png';
    link.href = canvasEl.toDataURL('image/png');
    link.click();
  }

  // Export 2D view to PDF — opens print dialog in a new window
  function export2DPDF(canvasEl) {
    if (!canvasEl) return;
    var imgData = canvasEl.toDataURL('image/png');
    var isLand = canvasEl.width > canvasEl.height;
    var win = window.open('', '_blank');
    if (win) {
      win.document.write('<html><head><title>Floor Plan Export</title><style>@page{size:'+(isLand?'landscape':'portrait')+';margin:0}body{margin:0;display:flex;align-items:center;justify-content:center;height:100vh}img{max-width:100%;max-height:100%}</style></head><body><img src="' + imgData + '" onload="window.print();"/></body></html>');
      win.document.close();
    }
  }

  // ── Export Bar (shown in 2D mode) ───────────────────────────────
  function ExportBar(props) {
    var s = props.s, d = props.d;

    function doExportDXF() {
      if (!s.floorPlan && !s.models.length) { alert('Load a model and activate a floor plan cut first.'); return; }
      var elev = s.floorPlan ? s.floorPlan.elevation : 0;
      var cutH = s.floorPlan ? s.floorPlan.cutHeight || 1.2 : 3;
      var outlines = generate2DOutlines(s.models, elev, cutH);
      if (outlines.length === 0) { alert('No geometry found at this elevation.'); return; }
      var dxfStr = exportDXF(outlines, s.models, elev);
      var blob = new Blob([dxfStr], { type: 'application/dxf' });
      var link = document.createElement('a');
      link.download = 'floorplan_' + (s.floorPlan ? s.floorPlan.storeyName || '' : '') + '.dxf';
      link.href = URL.createObjectURL(blob);
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function doExportPNG() {
      var cvs = window._cc2DCanvas;
      if (cvs) export2DPNG(cvs);
      else alert('No 2D view canvas found.');
    }

    function doExportPDF() {
      var cvs = window._cc2DCanvas;
      if (cvs) export2DPDF(cvs);
      else alert('No 2D view canvas found.');
    }

    var EBTN = Object.assign({}, S_BTN, { fontSize: '.65rem', padding: '.25rem .6rem', border: '1px solid var(--border)' });
    return html`<div style=${{ background: 'var(--bg-primary)', borderTop: '1px solid var(--border-subtle)', padding: '.45rem 1rem', display: 'flex', alignItems: 'center', gap: '.6rem', flexShrink: 0, flexWrap: 'wrap' }}>
      <span style=${{ fontSize: '.7rem', fontWeight: 600, color: 'var(--text-faint)', textTransform: 'uppercase', letterSpacing: '.05em' }}>2D Export</span>
      <button onClick=${doExportDXF} style=${{ ...EBTN, background: '#1e3a5f', color: '#93c5fd' }}>DXF (AutoCAD)</button>
      <button onClick=${doExportPNG} style=${{ ...EBTN, background: '#1e3a5f', color: '#93c5fd' }}>PNG (Image)</button>
      <button onClick=${doExportPDF} style=${{ ...EBTN, background: '#1e3a5f', color: '#93c5fd' }}>PDF (Print)</button>
      <span style=${{ fontSize: '.55rem', color: 'var(--text-faint)', marginLeft: 'auto' }}>DXF export generates floor plan from 3D model geometry at the active storey cut · PNG/PDF exports the current 2D view</span>
    </div>`;
  }

  // ── ifc-lite Migration Notice ──────────────────────────────────
  // NOTE: The 2D generation below uses bounding-box projections from web-ifc geometry.
  // For higher-fidelity 2D plans (true wall outlines, door swings, MEP routing),
  // consider migrating to ifc-lite (https://github.com/louistrue/ifc-lite) which
  // provides native 2D floor plan, section, and elevation generation from the
  // IFC4X3 schema with full geometric accuracy. Migration would replace the
  // getIfcAPI() loader and generate2DOutlines() with ifc-lite's built-in pipeline.

  // ── Natural Language Command Engine ────────────────────────────
  // Scope: clash setup, Q&A, result navigation, issue management, export.
  // Spatial interactions (measuring, section planes, camera) stay as traditional UI.

  // ── Ollama detection ─────────────────────────────────────────────
  var _ollamaAvailable = false;
  var _ollamaModel = 'qwen2.5:7b';
  var _ollamaChecked = false;

  function checkOllama() {
    if (_ollamaChecked) return Promise.resolve(_ollamaAvailable);
    return fetch('http://localhost:11434/api/tags', {method:'GET'})
      .then(function(r){ return r.json(); })
      .then(function(data){
        _ollamaChecked = true;
        _ollamaAvailable = true;
        // Check if our preferred model is available
        var models = (data.models||[]).map(function(m){ return m.name||m.model||''; });
        if (models.some(function(n){ return n.indexOf('qwen2.5') !== -1; })) _ollamaModel = models.find(function(n){ return n.indexOf('qwen2.5') !== -1; });
        else if (models.some(function(n){ return n.indexOf('mistral') !== -1; })) _ollamaModel = models.find(function(n){ return n.indexOf('mistral') !== -1; });
        else if (models.some(function(n){ return n.indexOf('llama') !== -1; })) _ollamaModel = models.find(function(n){ return n.indexOf('llama') !== -1; });
        else if (models.length > 0) _ollamaModel = models[0];
        _nlBackend = 'ollama';
        _nlModelStatus = 'ready';
        _nlModelListeners.forEach(function(cb){ cb('ready', 100); });
        return true;
      })
      .catch(function(){
        _ollamaChecked = true;
        _ollamaAvailable = false;
        return false;
      });
  }

  function callOllama(systemPrompt, userMsg) {
    return fetch('http://localhost:11434/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: _ollamaModel,
        messages: [
          {role:'system', content:systemPrompt},
          {role:'user', content:userMsg}
        ],
        stream: false,
        options: {temperature:0, num_predict:150}

  // ── In-browser LLM (fallback when Ollama not available) ────────
  function getNLPipeline() {
    if (_nlPipeline) return Promise.resolve(_nlPipeline);
    if (_nlModelStatus === 'loading') return new Promise(function(res, rej) {
      _nlModelListeners.push(function(st) {
        if (st === 'ready') res(_nlPipeline);
        else if (st === 'error') rej(new Error('LLM load failed'));
      });
    });
    if (_nlModelStatus === 'error') return Promise.reject(new Error('LLM failed to load'));
    _nlModelStatus = 'loading';
    _nlModelListeners.forEach(function(cb){ cb('loading', 0); });
    return import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3/dist/transformers.min.js')
      .then(function(mod) {
        try { if (mod.env) mod.env.useBrowserCache = true; } catch(e) {}
        return mod.pipeline('text-generation', 'onnx-community/Qwen2.5-0.5B-Instruct', {
          dtype: 'q4',
          progress_callback: function(p) {
            if (typeof p.progress === 'number') {
              _nlModelProgress = Math.round(p.progress);
              _nlModelListeners.forEach(function(cb) { cb('loading', _nlModelProgress); });
            }
          }
        });
      })
      .then(function(pipe) {
        _nlPipeline = pipe;
        _nlBackend = 'browser';
        _nlModelStatus = 'ready';
        _nlModelListeners.forEach(function(cb) { cb('ready', 100); });
        _resetIdleTimer();
        return pipe;
      })
      .catch(function(err) {
        _nlModelStatus = 'error';
        _nlModelError = (err && (err.message || String(err))) || 'Unknown error';

  }

  // ── Idle auto-unload for in-browser LLM (frees ~2GB after 5min) ──
  function _resetIdleTimer() {
    if (_nlIdleTimer) clearTimeout(_nlIdleTimer);
    if (_nlBackend !== 'browser' || !_nlPipeline) return;
    _nlIdleTimer = setTimeout(function() {
      if (_nlPipeline && _nlBackend === 'browser') {
        try { if (_nlPipeline.dispose) _nlPipeline.dispose(); } catch(e){}
        _nlPipeline = null;
        _nlBackend = 'none';
        _nlModelStatus = 'idle';
        _nlModelListeners.forEach(function(cb){ cb('idle', 0); });
        console.log('[ClashControl] In-browser LLM unloaded after idle timeout (memory freed)');
      }
    }, _nlIdleTimeout);
  }

  // ── LLM system prompt ──────────────────────────────────────────
  var NL_SYSTEM_PROMPT = [
    'You are a command parser for a BIM clash detection app called ClashControl.',
    'Output ONLY a single JSON object. No explanation, no markdown fences, no extra text.',
    '',
    'Loaded models: {{MODEL_LIST}}',
    'Current rules: maxGap={{MAX_GAP}}mm, hard={{HARD}}, modelA={{MODEL_A}}, modelB={{MODEL_B}}',
    '',
    'Convert all lengths to mm (5cm→50, 2in→51). Use model name substrings from the loaded list, or "all".',
    '',
    'Intent values and their fields:',
    'run_detection: {intent, modelA, modelB, maxGap, hard, duplicates, excludeSelf}',
    'set_max_gap: {intent, value}',
    'set_duplicates: {intent, enabled}',
    'filter_status: {intent, status: "open"|"resolved"|"all"}',
    'reset_filters: {intent}',
    'group_by: {intent, groupBy: "storey"|"discipline"|"status"|"type"|"none"}',
    'export_bcf: {intent}',
    'query: {intent, query: "clash_count"|"issue_count"|"model_list"|"current_rules"|"worst_storey"}',
    'help: {intent}',
    'unknown: {intent}',
    '',
    'Examples:',
    'User: look for pipe beam conflicts with 5cm gap',
    '{"intent":"run_detection","modelA":"pipe","modelB":"beam","maxGap":50,"hard":true,"duplicates":false}',
    'User: structural vs all others',
    '{"intent":"run_detection","modelA":"structural","modelB":"all","excludeSelf":true,"hard":true}',
    'User: show resolved clashes',
    '{"intent":"filter_status","status":"resolved"}'

  // ── LLM JSON→action dispatcher ─────────────────────────────────
  function dispatchLLMAction(jsonText, s, d) {

    if (!intent) return null;

      var h = String(hint).toLowerCase();

    }

    switch (intent) {
      case 'run_detection': {
        if (!s.models.length) return 'No models loaded yet — drop IFC files onto the viewer first.';
        var mA = resolveModel(action.modelA), mB = resolveModel(action.modelB);

      case 'help': return processNLCommand('help', s, d);

    }

  // ── Async NL handler: regex fast-path → Ollama/browser LLM fallback ──
  function processNLCommandWithLLM(raw, s, d) {

            action = first;
          }
        }
        _saveNLTrainRecord(raw, result != null ? (typeof result === 'object' ? result : String(result)) : null,
          {ts:Date.now(), path:path, matched:result!=null, action:action, v:CC_VERSION.v});
      } catch(e) {}
      return result;
    }

    // 1. Try regex (instant, no LLM needed)
    var regexResult = processNLCommand(raw, s, d);
    if (regexResult !== null) return Promise.resolve(_captureNL(regexResult, 'matched'));

    // 2. Build prompt context
    var modelList = s.models.length ? s.models.map(function(m){ return m.name; }).join(', ') : 'none';
    var r = s.rules || {};

      .replace('{{MODEL_LIST}}', modelList)
      .replace('{{MAX_GAP}}', r.maxGap || 0)
      .replace('{{HARD}}', !!r.hard)
      .replace('{{MODEL_A}}', r.modelA || 'all').replace('{{MODEL_B}}', r.modelB || 'all');

        .catch(function() { return _captureNL(null, 'ollama'); });
    }

    if (_nlModelStatus !== 'ready' || !_nlPipeline) return Promise.resolve(_captureNL(null, 'unmatched'));

      [{role:'system', content:prompt}, {role:'user', content:raw}],
      {max_new_tokens: 150, temperature: 0.0, do_sample: false}
    ).then(function(out) {
      var text = out[0].generated_text;
      if (Array.isArray(text)) text = text[text.length - 1].content;
      return _captureNL(dispatchLLMAction(text, s, d), 'browser-llm');
    }).catch(function() { return _captureNL(null, 'browser-llm'); });
  }

  function processNLCommand(raw, s, d) {

        '**Batch:** "mark all open clashes as resolved", "assign all issues to John"\n' +
        '**Analysis:** "how many clashes?", "analyze clashes", "summary"\n' +
        '**Theme:** "switch to light", "dark mode"\n' +
        '**Files:** "load ifc", "load 2d", "import bcf", "export bcf"\n' +
        '**Navigation:** "show clashes tab", "open settings", "open bridge", "training mode"\n' +
        '**Viewer:** "section x", "wireframe mode", "show markers", "hide grid"\n' +

    function applyClashOpts(updRules) {

      return {_clashSetup:true, rules:updRules, nameA:mA?mA.name:'All models', nameB:mB?mB.name:'All models'};
    }

    // ── Self-clash patterns ────────────────────────────────────────
    // "self:architectural" → clash architectural vs itself
    // "self:architectural, mep" → architectural vs architectural AND mep vs mep
    // "self: all" → every model vs itself
    // "intra architectural" / "internal mep" / "within structural"
    var selfMatch = text.match(/(?:self\s*[:=]\s*|intra[\s-]*|internal\s+|within\s+)(.+?)(?:\s+with\s+.*)?$/i);
    if (selfMatch && /self|intra|internal|within/.test(text)) {
      if (!s.models.length) return 'No models loaded yet.';
      var selfTargets = selfMatch[1].split(/\s*[,;&]\s*|\s+and\s+/i).map(function(t){return t.trim();}).filter(Boolean);
      if (selfTargets.length === 1 && /^all$/i.test(selfTargets[0])) {
        // Self-clash every model individually
        var updSelf = applyClashOpts({ modelA:'all', modelB:'all', excludeSelf:false });
        return {_clashSetup:true, rules:updSelf, nameA:'All models', nameB:'All models (self)', _selfMode:'all'};
      }
      if (selfTargets.length === 1) {
        var ref = resolveModel(selfTargets[0]);
        if (ref) {
          var updSelf1 = applyClashOpts({ modelA:ref.id, modelB:ref.id, excludeSelf:false });
          return {_clashSetup:true, rules:updSelf1, nameA:ref.name, nameB:ref.name+' (self)', _selfMode:'single'};
        }
      }
      // Multiple self-clash groups: queue them as a multi-pass
      var selfPasses = [];
      selfTargets.forEach(function(t) {
        var ref = resolveModel(t);
        if (ref) selfPasses.push({id:ref.id, name:ref.name});
      });
      if (selfPasses.length) {
        var baseRules = applyClashOpts({ excludeSelf:false });
        return {_clashSetup:true, _multiSelf:selfPasses, rules:baseRules,
          nameA:selfPasses.map(function(p){return p.name;}).join(', '),
          nameB:'(self-clash each)', _selfMode:'multi'};
      }
    }

    // ── "each" / "all self" / "every model against itself" ─────────
    if (/(?:each|every)\s+(?:model|discipline)\s+(?:against|vs\.?|versus)\s+itself|all\s+self[\s-]*clash/i.test(text)) {
      if (!s.models.length) return 'No models loaded yet.';
      var discs = [];
      DISC.forEach(function(dd) {
        if (s.models.some(function(m){ return m.discipline===dd.id; })) discs.push({id:'disc:'+dd.id, name:dd.label});
      });
      var baseR = applyClashOpts({ excludeSelf:false });
      return {_clashSetup:true, _multiSelf:discs, rules:baseR,
        nameA:discs.map(function(p){return p.name;}).join(', '),
        nameB:'(self-clash each)', _selfMode:'multi'};
    }

    // ── "only between" / "only within" (restrict to same-discipline) ──
    if (/(?:only\s+)?(?:between|within)\s+same\s+(?:discipline|category|type)/i.test(text)) {
      if (!s.models.length) return 'No models loaded yet.';
      var samePasses = [];
      DISC.forEach(function(dd) {
        if (s.models.some(function(m){ return m.discipline===dd.id; })) samePasses.push({id:'disc:'+dd.id, name:dd.label});
      });
      var baseSD = applyClashOpts({ excludeSelf:false });
      return {_clashSetup:true, _multiSelf:samePasses, rules:baseSD,
        nameA:samePasses.map(function(p){return p.name;}).join(', '),
        nameB:'(same discipline)', _selfMode:'multi'};
    }

    // "X vs/versus/against Y"
    var vsMatch = text.match(/(.+?)\s+(?:vs\.?|versus|against)\s+(.+?)(?:\s+with\s+.*)?$/);
    if (vsMatch) return runSetup(vsMatch[1].replace(/^(?:check|compare|run|detect|find|look\s+for|scan|anal[yz]se?|test|search\s+for)\s+(?:(?:for\s+)?(?:clashes?|conflicts?|collisions?|clashcontrol)\s+)?(?:on\s+)?/,'').trim(), vsMatch[2].split(/\s+with\s+/)[0].replace(/\s*models?\s*$/i,'').trim());

    // "between X and Y"
    var betweenMatch = text.match(/between\s+(.+?)\s+and\s+(.+?)(?:\s+with\s+.*)?$/);
    if (betweenMatch && /check|compare|find|detect|look|scan|anal[yz]se?|run|clashes?|conflicts?|collisions?/.test(text))
      return runSetup(betweenMatch[1].trim(), betweenMatch[2].split(/\s+with\s+/)[0].trim());

    // ── Word-based: scan for action words + model/tag/discipline keywords ──
    // Uses the same fuzzy resolver — works with any custom labels or language
    var actionWords = /\b(?:run|start|do|execute|detect|find|check|scan|re-?run|again|clashcontrol|clash)\b/i;
    if (actionWords.test(text)) {
      var NOISE = /^(?:run|start|do|execute|detect|find|check|scan|again|clash|clashcontrol|on|the|with|and|for|of|a|an|model|models|re-?run|clashes?|detection|conflicts?|collisions?|hard|soft|near|miss|all)$/;
      var words = text.toLowerCase().replace(/[,;:!?.]+/g,' ').split(/\s+/);
      var foundRefs = [];
      var usedIds = {};
      words.forEach(function(w){
        if (NOISE.test(w) || w.length < 2) return;
        var ref = resolveModelSingle(w);
        if (ref && !usedIds[ref.id]) {
          foundRefs.push({ref:ref, word:w});
          usedIds[ref.id] = true;
        }
      });
      if(foundRefs.length>=2) return runSetup(foundRefs[0].word, foundRefs[1].word);
      if(foundRefs.length===1) {
        if(!s.models.length) return 'No models loaded yet.';
        var ref = foundRefs[0].ref;
        var updSingle = applyClashOpts({ modelA:ref.id, modelB:'all' });
        return {_clashSetup:true, rules:updSingle, nameA:ref.name, nameB:'All models'};
      }
    }

    // ── "within Xmm" / "near miss" / proximity phrasing ──
    var withinMatch = text.match(/(?:within|closer\s+than|nearer\s+than|distance\s+(?:of\s+)?(?:under|less\s+than|below)?)\s*(\d+(?:\.\d+)?)\s*(mm|cm|m(?!m))/);
    if (withinMatch && /check|find|detect|run|scan|clash|near|proximity|within/.test(text)) {
      if (!s.models.length) return 'No models loaded yet.';
      var wv = parseFloat(withinMatch[1]), wu = withinMatch[2];
      var wmm = wu==='cm' ? Math.round(wv*10) : wu==='m' ? Math.round(wv*1000) : Math.round(wv);
      var updW = applyClashOpts({ modelA:'all', modelB:'all', maxGap:wmm, hard:true });
      return {_clashSetup:true, rules:updW, nameA:'All models', nameB:'All models'};
    }
    if (/(?:find|check|detect|run|scan)\s+(?:for\s+)?(?:near[\s-]*miss|proximity|soft\s+clash|gap\s+clash)/.test(text)) {
      if (!s.models.length) return 'No models loaded yet.';
      var updNM = applyClashOpts({ modelA:'all', modelB:'all', maxGap:50, hard:true });
      return {_clashSetup:true, rules:updNM, nameA:'All models', nameB:'All models'};
    }

    // ── "run clash …" generic fallback (no model/discipline found) ──
    if (/(?:run|start|do|execute|detect|find|check|scan|re-?run|again)\s+(?:the\s+)?(?:clash|detection|conflicts?|collisions?|scan|check|clashcontrol)/i.test(text)) {
      if (!s.models.length) return 'No models loaded yet.';
      var updRun = applyClashOpts({ modelA:'all', modelB:'all' });
      return {_clashSetup:true, rules:updRun, nameA:'All models', nameB:'All models'};
    }

    // ── Individual rule settings (no run, just tweak) ────────────
    var gapSet = text.match(/(?:max\s*)?gap\s+(?:to\s+|of\s+|=\s*)?(\d+(?:\.\d+)?)\s*(mm|cm)|(\d+(?:\.\d+)?)\s*(mm|cm)\s+(?:max\s*)?(?:gap|distance|proximity)/);
    if (gapSet) {
      var gv2 = gapSet[1]||gapSet[3], gu = gapSet[2]||gapSet[4];
      var gmm = gu==='cm' ? Math.round(parseFloat(gv2)*10) : Math.round(parseFloat(gv2));
      d({t:A.UPD_RULES, u:{maxGap:gmm}});
      return 'Max gap set to ' + gmm + 'mm. Re-run detection to apply.';
    }
    if (/(?:include|enable)\s+duplicates?/.test(text)) { d({t:A.UPD_RULES,u:{duplicates:true}}); return 'Duplicates included.'; }
    if (/(?:exclude|ignore|no)\s+duplicates?/.test(text)) { d({t:A.UPD_RULES,u:{duplicates:false}}); return 'Duplicates excluded.'; }
    if (/cross[\s-]*(?:model\s+)?only|no\s+self[\s-]*clash|exclude\s+self|not?\s+with\s+itself/.test(text)) { d({t:A.UPD_RULES,u:{excludeSelf:true}}); return 'Cross-model only — self-clashes excluded.'; }
    if (/(?:include|enable|allow)\s+self[\s-]*clash|self[\s-]*clash.*on/.test(text)) { d({t:A.UPD_RULES,u:{excludeSelf:false}}); return 'Self-clashes included.'; }
    if (/(?:enable|turn\s+on|activate)\s+semantic[\s-]*filter/.test(text)) { d({t:A.UPD_RULES,u:{useSemanticFilter:true}}); return 'Semantic filter enabled — intentional relationships (doors in walls, assembly parts) will suppress hard clashes.'; }
    if (/(?:disable|turn\s+off|deactivate)\s+semantic[\s-]*filter/.test(text)) { d({t:A.UPD_RULES,u:{useSemanticFilter:false}}); return 'Semantic filter disabled — all geometric intersections will be reported.'; }

    // ── Overlap volume threshold ──────────────────────────────────
    var ovMatch = text.match(/(?:min(?:imum)?\s+)?overlap\s+(?:volume?\s+)?(\d+(?:\.\d+)?)\s*(?:cm3|cm³)?/i);
    if (!ovMatch) ovMatch = text.match(/overlap\s+(?:volume?\s+)?(?:to\s+|=\s*)?(\d+(?:\.\d+)?)\s*(?:cm3|cm³)?/i);
    if (ovMatch) {
      var cm3 = parseFloat(ovMatch[1]);
      d({t:A.UPD_RULES, u:{minOverlapVolM3:cm3/1e6}});
      return 'Minimum overlap volume set to ' + cm3 + ' cm³. Re-run detection to apply.';
    }

    // ── Per-type-pair tolerance ───────────────────────────────────
    var tpMatch = text.match(/(?:set\s+)?(\w+)\s+(\w+)\s+(?:clearance|tolerance|gap|distance)\s+(\d+)\s*mm/i);
    if (tpMatch) {
      // Fuzzy-match IFC types from loaded models
      var _findType = function(hint) {
        hint = hint.toLowerCase();
        var all = [];
        s.models.forEach(function(m){ (m.elements||[]).forEach(function(el){ if(el.props&&el.props.ifcType&&all.indexOf(el.props.ifcType)===-1) all.push(el.props.ifcType); }); });
        return all.find(function(t){ return t.toLowerCase().indexOf(hint)!==-1; });
      };
      var ta = _findType(tpMatch[1]), tb = _findType(tpMatch[2]);
      if (ta && tb && ta !== tb) {
        var key = ta < tb ? ta+':'+tb : tb+':'+ta;
        var tpObj = Object.assign({}, s.rules.toleranceByTypePair||{});
        tpObj[key] = +tpMatch[3];
        d({t:A.UPD_RULES, u:{toleranceByTypePair:tpObj}});
        return 'Set ' + ta.replace('Ifc','') + ' ↔ ' + tb.replace('Ifc','') + ' clearance to ' + tpMatch[3] + 'mm.';
      }
    }

    // ── Presets (save/load) ───────────────────────────────────────
    var savePresetMatch = text.match(/save\s+(?:preset|rules?|config)\s+(?:as\s+)?["""]?(.+?)["""]?\s*$/i);
    if (savePresetMatch) {
      var pName = savePresetMatch[1].trim();
      var presets = _getClashPresets();
      presets.push({id:Date.now().toString(36), name:pName, rules:Object.assign({},s.rules)});
      _saveClashPresets(presets);
      return 'Saved current rules as "' + pName + '".';
    }
    var runPresetMatch = text.match(/(?:run|load|use|apply)\s+(?:preset\s+)?["""]?(.+?)["""]?\s*$/i);
    if (runPresetMatch && !/(?:run|start|do)\s+(?:it|the|detection|clash)/i.test(text)) {
      var pHint = runPresetMatch[1].trim().toLowerCase();
      var presets2 = _getClashPresets();
      var found = presets2.find(function(p){ return p.name.toLowerCase() === pHint || p.name.toLowerCase().indexOf(pHint) !== -1; });
      if (found) {
        d({t:A.UPD_RULES, u:found.rules});
        if (/run/.test(text) && s.models.length && !s.detecting) {
          var merged = Object.assign({}, s.rules, found.rules);
          d({t:A.DETECTING}); d({t:A.TAB,v:'clashes'});
          detectClashesAsync(s.models, merged).then(function(result){ d({t:A.MERGE_CLASHES, v:result}); });
          return 'Running "' + found.name + '" preset…';
        }
        return 'Loaded preset "' + found.name + '". Say "run" to detect.';
      }
    }

    // ── Plain run ──────────────────────────────────────────────────
    if (/^(?:run|go|start|detect|execute|scan|proceed|re-?run|again)$/.test(text) ||
        /^(?:run|start|do|execute|re-?run)\s+(?:it|the\s+)?(?:detection|clashes?|check|scan|again)?$/.test(text) ||
        /^(?:find|detect|check\s+for|scan\s+for)\s+(?:all\s+)?(?:clashes?|conflicts?|collisions?)$/.test(text) ||
        /^(?:run|detect)\s+(?:it\s+)?again$/.test(text)) {
      if (!s.models.length) return 'No models loaded yet.';
      if (s.detecting) return 'Already running…';
      d({t:A.DETECTING}); d({t:A.TAB,v:'clashes'});
      detectClashesAsync(s.models,s.rules).then(function(result){ d({t:A.MERGE_CLASHES, v:result}); });
      var r2 = s.rules;
      return 'Running clash detection' + (r2.maxGap ? ' with ' + r2.maxGap + 'mm max gap' : '') + '…';
    }

    // ── Result filtering & grouping ────────────────────────────────
    var statusMap = {open:'open',new:'new',active:'open',resolved:'resolved',closed:'resolved',all:'all'};
    var swMatch = text.match(/\b(open|new|active|resolved|closed|all)\b/);
    if (swMatch && /show|display|filter|view|see|only|just|list|give|get|want|need|find|clashes?|issues?/.test(text)) {
      var sw = swMatch[1];
      d({t:A.UPD_FILTERS, u:{status:statusMap[sw]||'all'}}); d({t:A.TAB,v:'clashes'});
      return sw==='all' ? 'Showing all clashes.' : 'Filtered to ' + sw + ' clashes.';
    }
    if (/reset\s+filters?|clear\s+filters?|show\s+all|remove\s+filters?|no\s+filter/.test(text)) {
      d({t:A.RESET_FILTERS});
      return 'Filters cleared.';
    }
    var groupMatch = text.match(/(?:group|grouped|organize|organise|sort|arrange|categorize|categorise)\s+(?:\w+\s+)?by\s+(storey|floor|level|discipline|status|type|none)/);
    if (!groupMatch) groupMatch = text.match(/by\s+(storey|floor|level|discipline|status|type)\b/);
    if (groupMatch) {
      var gv = {storey:'storey',floor:'storey',level:'storey',discipline:'discipline',status:'status',type:'type',none:'none'}[groupMatch[1]];
      d({t:A.CLASH_GROUP_BY,v:gv}); d({t:A.TAB,v:'clashes'});
      return 'Grouped by ' + groupMatch[1] + '.';
    }

    // ── Batch Operations ───────────────────────────────────────────
    var batchStatusMatch = text.match(/(?:mark|set|change|update)\s+all\s+(?:(open|resolved|hard|soft)\s+)?(?:clashes?|issues?)\s+(?:as\s+|to\s+)(open|in.?progress|resolved|closed)/);
    if (batchStatusMatch) {
      var filterKey = batchStatusMatch[1];
      var newStatus = batchStatusMatch[2].replace(/\s+/g,'_');
      var isIssue = /issues?/.test(text);
      var pool = isIssue ? s.issues : s.clashes;
      var targets = pool;
      if (filterKey === 'open') targets = pool.filter(function(x){return x.status==='open';});
      else if (filterKey === 'resolved') targets = pool.filter(function(x){return x.status==='resolved';});
      else if (filterKey === 'hard') targets = pool.filter(function(x){return x.type==='hard';});
      else if (filterKey === 'soft') targets = pool.filter(function(x){return x.type==='soft';});
      var actionT = isIssue ? 'UPD_ISSUE' : 'UPD_CLASH';
      targets.forEach(function(x){ d({t:actionT, id:x.id, u:{status:newStatus}}); });
      return 'Updated ' + targets.length + (isIssue?' issues':' clashes') + ' to ' + newStatus + '.';
    }

    var batchAssignMatch = text.match(/(?:assign|give|set)\s+all\s+(?:(open|unassigned)\s+)?issues?\s+to\s+(.+)/i);
    if (batchAssignMatch) {
      var assignFilter = batchAssignMatch[1];
      var assignee = batchAssignMatch[2].trim();
      var issueTargets = s.issues;
      if (assignFilter === 'open') issueTargets = issueTargets.filter(function(i){return i.status==='open';});
      else if (assignFilter === 'unassigned') issueTargets = issueTargets.filter(function(i){return !i.assignee;});
      issueTargets.forEach(function(i){ d({t:A.UPD_ISSUE, id:i.id, u:{assignee:assignee}}); });
      return 'Assigned ' + issueTargets.length + ' issues to ' + assignee + '.';
    }

    // Analyze / report commands → open Revit Bridge if configured, else give summary
    if (/(?:analyze|analyse|analysis|summarize|summarise|summary|report|insights?|overview)\s*(?:clashes?|results?|detection)?/.test(text)) {
      var cl=s.clashes, op=cl.filter(function(c){return c.status==='open';}), hd=cl.filter(function(c){return c.type==='hard';}), sf=cl.filter(function(c){return c.type==='soft';});
      var storeys = {}; cl.forEach(function(c){ var st=c.elemAStorey||c.elemBStorey||'Unknown'; storeys[st]=(storeys[st]||0)+1; });
      var hotStorey = Object.keys(storeys).sort(function(a,b){return storeys[b]-storeys[a];})[0];
      var pct = cl.length>0 ? Math.round((cl.length - op.length) / cl.length * 100) : 0;
      var lines = [cl.length + ' total clashes: ' + hd.length + ' hard, ' + sf.length + ' soft, ' + op.length + ' open.'];
      lines.push('Resolution progress: ' + pct + '%.');
      if (hotStorey) lines.push('Hotspot: ' + hotStorey + ' (' + storeys[hotStorey] + ' clashes).');
      if (s.revitBridge.provider && s.revitBridge.apiKey) lines.push('Tip: Use Revit Bridge for deeper AI-powered analysis.');
      return lines.join('\n');
    }

    // ── Export ─────────────────────────────────────────────────────
    if (/(?:export|download|save|get)\s+(?:as\s+)?bcf|bcf\s+(?:export|download|file)|save\s+as\s+bcf/.test(text)) {
      if (!s.issues.length && !s.clashes.length) return 'Nothing to export yet.';
      var items = s.issues.length ? s.issues : s.clashes;
      exportBCF(items, '2.1', s.viewpoints);
      return 'Exported ' + items.length + ' item' + (items.length===1?'':'s') + ' as BCF 2.1.';
    }

    // ── Theme ──────────────────────────────────────────────────────
    if (/(?:switch|change|toggle|set|go)\s+(?:to\s+)?(?:light|dark)\s*(?:mode|theme)?/.test(text) || /(?:light|dark)\s+(?:mode|theme)/.test(text)) {
      var wantLight = /light/.test(text);
      d({t:A.UPD_PREFS,u:{theme:wantLight?'light':'dark'}});
      return 'Switched to ' + (wantLight?'light':'dark') + ' mode.';
    }

    // ── Reload ─────────────────────────────────────────────────
    if (/^\/reload|^reload\s*page|^refresh\s*page|^reload$/.test(text)) {
      setTimeout(function(){window.location.reload();},300);
      return 'Reloading page\u2026';
    }

    // ── File Loading ─────────────────────────────────────────────
    if (/(?:load|open|import|add)\s+(?:an?\s+)?ifc|ifc\s+(?:file|model)/.test(text)) {
      if(window._ccOpenIFC) window._ccOpenIFC();
      else { window._ccPendingOpen='ifc'; d({t:A.TAB,v:'models'}); }
      return 'Opening IFC file picker...';
    }
    if (/(?:load|open|import|add)\s+(?:an?\s+)?(?:2d|dxf|pdf|dwg|underlay|drawing)/.test(text)) {
      if(window._ccOpen2D) window._ccOpen2D();
      else { window._ccPendingOpen='2d'; d({t:A.TAB,v:'models'}); }
      return 'Opening 2D file picker...';
    }
    if (/(?:import|load|open)\s+(?:a\s+)?bcf/.test(text)) {
      importBCF(d);
      return 'Opening BCF file picker...';
    }

    // ── Tab Navigation ───────────────────────────────────────────
    if (/(?:show|open|go\s+to|switch\s+to)\s+(?:the\s+)?models?\s*(?:tab|panel|sidebar)?/.test(text)) { d({t:A.TAB,v:'models'}); return 'Opened Models tab.'; }
    if (/(?:show|open|go\s+to|switch\s+to)\s+(?:the\s+)?clashes?\s*(?:tab|panel|sidebar)?/.test(text)) { d({t:A.TAB,v:'clashes'}); return 'Opened Clashes tab.'; }
    if (/(?:show|open|go\s+to|switch\s+to)\s+(?:the\s+)?issues?\s*(?:tab|panel|sidebar)?/.test(text)) { d({t:A.TAB,v:'issues'}); return 'Opened Issues tab.'; }
    if (/(?:show|open|go\s+to|switch\s+to)\s+(?:the\s+)?explorer?\s*(?:tab|panel)?/.test(text)) { d({t:A.TAB,v:'explorer'}); return 'Opened Explorer tab.'; }

    // ── Training Mode ─────────────────────────────────────────────
    if (/training\s*mode|(?:enable|start|activate|turn\s+on)\s+training|(?:open|show)\s+(?:the\s+)?training/.test(text)) {
      if(!s.trainingMode) d({t:A.TRAINING_MODE});
      return s.trainingMode ? 'Training Mode is already active. Use thumbs up/down on clash rows to label data.' : 'Training Mode enabled. Use the thumbs up/down buttons on each clash to label true/false positives.';
    }
    if (/(?:disable|stop|deactivate|turn\s+off|exit)\s+training/.test(text)) {
      if(s.trainingMode){if(window._ccToggleTraining)window._ccToggleTraining();else d({t:A.TRAINING_MODE});}
      return s.trainingMode ? 'Check the warning popup to confirm.' : 'Training Mode is already off.';
    }

    // ── Settings & Modals ────────────────────────────────────────
    if (/(?:open|show)\s+(?:the\s+)?settings?/.test(text)) { d({t:A.SETTINGS,v:true}); return 'Opened settings.'; }
    if (/(?:open|show)\s+(?:the\s+)?(?:revit\s+)?bridge/.test(text)) { d({t:A.REVIT_BRIDGE,v:true}); return 'Opened Revit Bridge.'; }
    if (/(?:new|create|add)\s+(?:an?\s+)?issue/.test(text)) { d({t:A.MODAL,v:true}); return 'Opened new issue form.'; }

    // ── Viewer Controls ──────────────────────────────────────────
    if (/(?:reset|home|default)\s+(?:the\s+)?(?:view|camera)|(?:fit|zoom)\s+(?:to\s+)?all/.test(text)) {
      if(_resetView) _resetView();
      return 'View reset to default.';
    }

    // Section planes
    if (/(?:section|cut|slice)\s+(?:plane\s+)?(?:on\s+)?x|x\s+(?:section|cut)/.test(text)) { d({t:A.SECTION,axis:'x'}); return 'Section plane set on X axis.'; }
    if (/(?:section|cut|slice)\s+(?:plane\s+)?(?:on\s+)?y|y\s+(?:section|cut)/.test(text)) { d({t:A.SECTION,axis:'y'}); return 'Section plane set on Y axis.'; }
    if (/(?:section|cut|slice)\s+(?:plane\s+)?(?:on\s+)?z|z\s+(?:section|cut)/.test(text)) { d({t:A.SECTION,axis:'z'}); return 'Section plane set on Z axis.'; }
    if (/(?:remove|clear|off|disable|hide)\s+(?:the\s+)?(?:section|cut|slice|clipping)/.test(text)) { d({t:A.SECTION,axis:null}); d({t:A.SECTION_BOX,v:null}); return 'Section planes cleared.'; }

    // Render style

  function ClashSetupCard(props) {
    var setup = props.setup, s = props.s, d = props.d, onRun = props.onRun, setMsgs = props.setMsgs, idx = props.idx;

        opts.push({id:'disc:'+dc.id, label:dc.label+' models'});
    });
    s.models.forEach(function(m){ opts.push({id:m.id, label:m.name}); });

      if (multiSelf && multiSelf.length) {
        // Multi-pass self-clash: run each group against itself
        var labels = multiSelf.map(function(p){return p.name;}).join(', ');
        setMsgs(function(prev){
          var next=prev.slice();
          next[idx]={role:'assistant',text:'Running self-clash: '+labels
            +(rules.hard?' | hard':'')+(rules.maxGap?' | max gap '+rules.maxGap+'mm':'')+'…',ran:true};
          return next;
        });
        d({t:A.UPD_RULES, u:rules});

        var mergedRules = Object.assign({},s.rules,rules);
        Promise.all(multiSelf.map(function(pass){
          var passRules = Object.assign({}, mergedRules, {modelA:pass.id, modelB:pass.id, excludeSelf:false});
          return detectClashesAsync(s.models, passRules);
        })).then(function(results){
          var allClashes = [];
          results.forEach(function(r){allClashes=allClashes.concat(r);});
          d({t:A.MERGE_CLASHES, v:allClashes});
        });
        return;
      }
      var nameA=opts.find(function(o){return o.id===rules.modelA;})||{label:'All'};

          +(rules.duplicates?' | duplicates':'')+(rules.excludeSelf?' | cross-model only':'')
          +(rules.excludeTypes&&rules.excludeTypes.length?' | excl: '+rules.excludeTypes.join(', '):'')+'…',ran:true};
