      window.addEventListener('cc-project-switch', onSwitch);
      return function(){ window.removeEventListener('cc-project-switch', onSwitch); };
    }, []);
    // Track model loading state for glow effect
    useEffect(function() {
      function onModelLoad(e) { setModelLoading(!!(e.detail && e.detail.loading)); }
      window.addEventListener('cc-model-loading', onModelLoad);
      return function() { window.removeEventListener('cc-model-loading', onModelLoad); };
    }, []);

    // Show a chat bubble while detection runs, replace with result when done
    useEffect(function() {
      var was = prevDetecting.current;
      prevDetecting.current = s.detecting;
      if (s.detecting && !was) {
        setOpen(true);
        setMsgs(function(prev) {
          detectMsgIdx.current = prev.length;
          return prev.concat([{role:'assistant', detecting:true}]);
        });
      } else if (!s.detecting && was) {
        var n = s.clashes.length;
        var op = s.clashes.filter(function(c){return c.status==='open';}).length;
        var nHard = s.clashes.filter(function(c){return c.type==='hard';}).length;
        var nSoft = s.clashes.filter(function(c){return c.type==='soft';}).length;
        var breakdown = [];
        if(nHard) breakdown.push(nHard+' hard');
        if(nSoft) breakdown.push(nSoft+' soft');
        var txt = n===0 ? 'No clashes detected.' : 'Found '+n+' clash'+(n!==1?'es':'')+' ('+breakdown.join(', ')+(breakdown.length?', ':'')+op+' open).';
        setMsgs(function(prev) {
          var idx = detectMsgIdx.current;
          var next = prev.slice();
          if (idx>=0 && idx<next.length) next[idx]={role:'assistant',text:txt};
          else next = next.concat([{role:'assistant',text:txt}]);
          return next;
        });
        detectMsgIdx.current = -1;
      }
    }, [s.detecting]);

    useEffect(function() {
      function onKey(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === '/') {
          e.preventDefault();
          setOpen(function(o){ return !o; });
        }
      }
      window.addEventListener('keydown', onKey);
      return function() { window.removeEventListener('keydown', onKey); };
    }, []);

    // On first open: check Ollama → fallback to browser LLM
    useEffect(function() {
      if (!open) return;
      // Sync state
      setLLMStatus(_nlModelStatus);
      setBackend(_nlBackend);
      if (_nlBackend === 'ollama' || _nlModelStatus === 'ready') return;
      // Check for Ollama
      var listener = function(st, pct) {
        setLLMStatus(st); setBackend(_nlBackend);
        if (typeof pct === 'number') setLLMProgress(pct);
      };
      _nlModelListeners.push(listener);
      checkOllama().then(function(hasOllama) {
        setBackend(_nlBackend);
        setLLMStatus(_nlModelStatus);
        if (!hasOllama) {
          // Show Ollama tip, then start loading browser LLM
          setShowOllamaTip(true);
          if (_nlModelStatus === 'idle') getNLPipeline().catch(function(){});
        }
      });
    }, [open]);

    useEffect(function() {
      if (open && inputRef.current) setTimeout(function(){ inputRef.current && inputRef.current.focus(); }, 80);
    }, [open]);

    useEffect(function() {
      if (bottomRef.current) bottomRef.current.scrollIntoView({behavior:'smooth'});
    }, [msgs]);

    function executeDetection(rules) {
      d({t:A.UPD_RULES, u:rules});
      if (s.detecting) return;
      d({t:A.DETECTING}); d({t:A.TAB,v:'clashes'});
      detectClashesAsync(s.models, Object.assign({},s.rules,rules)).then(function(result){ d({t:A.MERGE_CLASHES, v:result}); });
    }

    // ── NL feedback for unmatched commands (training mode only) ─
    var nlFeedbackRef = useRef(null); // {input: string} — pending user description of intent
    function _checkNLFeedback(text) {
      if (!nlFeedbackRef.current) return null;
      var pending = nlFeedbackRef.current;
      nlFeedbackRef.current = null;
      // Save the feedback: original command + what user actually wanted
      try {
        var store = _getNLTrainStore();
        // Find the last record matching this input and annotate it
        for (var i = store.length - 1; i >= 0; i--) {
          if (store[i].input === pending.input) {
            store[i].meta = store[i].meta || {};
            store[i].meta.user_intent = text;
            store[i].meta.feedback = true;
            break;
          }
        }
        localStorage.setItem('cc_nl_training_data', JSON.stringify(store));
      } catch(e) {}
      return 'Thanks! I\'ll learn from this. Your feedback has been saved.';
    }

    // ── Conversational clash setup context ──────────────────────
    var clashCtxRef = useRef(null); // {rules, asked, nameA, nameB}
    function _clashConverse(text, result) {
      var ctx = clashCtxRef.current;
      var tl = text.trim().toLowerCase();
      // If there's a pending context, check if this message answers it
      if (ctx && ctx.asked) {
        var answered = false;
        if (ctx.asked === 'selfClash') {
          if (/yes|yeah|yep|sure|ok|include|enable|on|true/i.test(tl)) { ctx.rules.excludeSelf = false; answered = true; }
          else if (/no|nah|nope|off|exclude|skip|false|cross/i.test(tl)) { ctx.rules.excludeSelf = true; answered = true; }
        }
        if (ctx.asked === 'gap') {
          var gapVal = tl.match(/(\d+(?:\.\d+)?)\s*(mm|cm|m(?!m))?/);
          if (gapVal) {
            var u = gapVal[2] || 'mm';
            ctx.rules.maxGap = u==='cm' ? Math.round(parseFloat(gapVal[1])*10) : u==='m' ? Math.round(parseFloat(gapVal[1])*1000) : Math.round(parseFloat(gapVal[1]));
            ctx.rules.hard = true;
            answered = true;
          }
          if (/no|none|zero|0|hard\s+only|skip/i.test(tl)) { ctx.rules.maxGap = 0; ctx.rules.hard = true; answered = true; }
        }
        if (ctx.asked === 'confirm') {
          if (/yes|yeah|yep|sure|ok|go|run|start|do it|proceed|execute/i.test(tl)) {
            clashCtxRef.current = null;
            return {_clashSetup:true, _runNow:true, rules:ctx.rules, nameA:ctx.nameA, nameB:ctx.nameB, _multiSelf:ctx._multiSelf};
          }
          if (/cancel|stop|abort/i.test(tl)) { clashCtxRef.current = null; return 'Clash setup cancelled.'; }
          if (/no|nah|nope|change|adjust|edit|modify/i.test(tl)) {
            ctx.asked = 'adjust';
            clashCtxRef.current = ctx;
            return 'What would you like to change?\n- **Sets** (e.g. "check structural vs architectural")\n- **Max gap** (e.g. "set gap to 50mm" or "no gap")\n- **Self-clashes** (e.g. "include self-clashes")\n- **Hard clashes** / **Duplicates**\n- **Exclude types** (e.g. "exclude IfcWall")\n\nOr say **cancel** to stop.';
          }
        }
        if (ctx.asked === 'adjust') {
          if (/cancel|stop|abort|nevermind/i.test(tl)) { clashCtxRef.current = null; return 'Clash setup cancelled.'; }
          // Parse adjustments
          var gapMatch = tl.match(/(?:gap|distance|tolerance|near)[^\d]*(\d+(?:\.\d+)?)\s*(mm|cm|m(?!m))?/);
          if (gapMatch) { var gu = gapMatch[2]||'mm'; ctx.rules.maxGap = gu==='cm'?Math.round(parseFloat(gapMatch[1])*10):gu==='m'?Math.round(parseFloat(gapMatch[1])*1000):Math.round(parseFloat(gapMatch[1])); }
          if (/no\s*(gap|near|clearance)|gap\s*0|zero\s*gap|hard\s*only/i.test(tl)) { ctx.rules.maxGap = 0; }
          if (/include\s*self|self.?clash.*on|self.?clash.*yes|enable\s*self/i.test(tl)) { ctx.rules.excludeSelf = false; }
          if (/exclude\s*self|self.?clash.*off|self.?clash.*no|disable\s*self|no\s*self|cross.?model/i.test(tl)) { ctx.rules.excludeSelf = true; }
          if (/(?:add|include|enable|with)\s*dup/i.test(tl)) { ctx.rules.duplicates = true; }
          if (/(?:no|remove|disable|without)\s*dup/i.test(tl)) { ctx.rules.duplicates = false; }
          if (/(?:no|disable|remove|without)\s*hard/i.test(tl)) { ctx.rules.hard = false; }
          if (/(?:add|enable|include|with)\s*hard/i.test(tl)) { ctx.rules.hard = true; }
          ctx.asked = null;
          return _askNext(ctx);
        }
        if (answered) { ctx.asked = null; } // Continue to next question
        else if (ctx.asked) {
          // Didn't understand — re-ask
          return _askNext(ctx);
        }
      }
      // New setup result → start conversation
      if (result && result._clashSetup) {
        ctx = {rules:Object.assign({},result.rules), nameA:result.nameA, nameB:result.nameB, asked:null, _multiSelf:result._multiSelf};
        clashCtxRef.current = ctx;
      }
      if (!ctx) return result; // Not a clash conversation
      return _askNext(ctx);
    }
    function _askNext(ctx) {
      var r = ctx.rules;
      // Check what's unspecified
      if (r.excludeSelf === undefined) {
        ctx.asked = 'selfClash';
        clashCtxRef.current = ctx;
        return 'Got it: **' + ctx.nameA + '** vs **' + ctx.nameB + '**'
          + (r.hard ? ', hard clashes' : '') + (r.maxGap ? ', ' + r.maxGap + 'mm gap' : '')
          + '.\n\nShould I include **self-clashes** (elements within the same model)? *(yes/no)*';
      }
      if (r.maxGap === undefined || r.maxGap === null) {
        ctx.asked = 'gap';
        clashCtxRef.current = ctx;
        return 'Do you want to detect **near misses**? If so, what max gap distance? *(e.g. 50mm, or "no" for hard clashes only)*';
      }
      // Everything specified → confirm
      ctx.asked = 'confirm';
      clashCtxRef.current = ctx;
      var summary = '**' + ctx.nameA + '** vs **' + ctx.nameB + '**\n'
        + (r.hard ? '- Hard clashes: yes\n' : '- Hard clashes: no\n')
        + '- Max gap: ' + (r.maxGap || 0) + 'mm\n'
        + '- Self-clashes: ' + (r.excludeSelf ? 'excluded' : 'included') + '\n'
        + (r.duplicates ? '- Duplicates: yes\n' : '')
        + (r.excludeTypes && r.excludeTypes.length ? '- Excluding: ' + r.excludeTypes.join(', ') + '\n' : '')
        + (r.excludeTypePairs && r.excludeTypePairs.length ? '- Pair exclusions: ' + r.excludeTypePairs.map(function(p){return p.replace(':',' vs ');}).join(', ') + '\n' : '')
        + '\nReady to run? *(yes/no)*';
      return summary;
    }

    function send() {
      var text = input.trim();
      if (!text) return;
      setMsgs(function(m){ return m.concat([{role:'user', text:text}]); });
      setInput('');
      // Check if this is a response to NL feedback prompt
      var feedbackResult = _checkNLFeedback(text);
      if (feedbackResult) {
        setMsgs(function(m){ return m.concat([{role:'assistant', text:feedbackResult}]); });
        return;
      }
      // Check if this is a response to a pending clash conversation
      var ctxResult = _clashConverse(text, null);
      if (ctxResult !== null && ctxResult !== undefined) {
        if (ctxResult && ctxResult._clashSetup) {
          if (ctxResult._runNow) {
            var rNameA = ctxResult.nameA, rNameB = ctxResult.nameB, rRules = ctxResult.rules;
            setMsgs(function(m){ return m.concat([{role:'assistant', text:'Running: **' + rNameA + '** vs **' + rNameB + '**'
              + (rRules.hard?' | hard':'') + (rRules.maxGap?' | max gap '+rRules.maxGap+'mm':'')
              + (rRules.duplicates?' | duplicates':'') + (rRules.excludeSelf?' | cross-model only':'') + '…'}]); });
            // Delay detection start so React can paint the "Running..." message first
            setTimeout(function(){ executeDetection(rRules); }, 80);
          } else {
            setMsgs(function(m){ return m.concat([{role:'assistant', setup:ctxResult}]); });
          }
        } else if (typeof ctxResult === 'string') {
          setMsgs(function(m){ return m.concat([{role:'assistant', text:ctxResult}]); });
        }
        return;
      }
      setLoading(true);
      processNLCommandWithLLM(text, s, d).then(function(rawResult) {
        // If it's a clash setup, run through conversation flow
        if (rawResult && rawResult._clashSetup) {
          var convResult = _clashConverse(text, rawResult);
          if (convResult && convResult._clashSetup) {
            setMsgs(function(m){ return m.concat([{role:'assistant', setup:convResult}]); });
          } else {
            setMsgs(function(m){ return m.concat([{role:'assistant', text:convResult||''}]); });
          }
        } else if (rawResult !== null) {
          setMsgs(function(m){ return m.concat([{role:'assistant', text:rawResult}]); });
        } else {
          if (s.trainingMode) {
            nlFeedbackRef.current = {input: text};
            setMsgs(function(m){ return m.concat([{role:'assistant', text:'I didn\'t understand that. Could you describe what you wanted to happen? This helps me learn and serve you better next time.\n\n*(Or try: "check structural vs MEP", "find near misses", "how many clashes?", or "help")*'}]); });
          } else {
            setMsgs(function(m){ return m.concat([{role:'assistant', text:'Not sure what you mean. Try: "check structural vs MEP", "find near misses", "how many clashes?", or "help".'}]); });
          }
        }
        setLoading(false);
      });
    }

    function onKeyDown(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
      if (e.key === 'Escape') setOpen(false);
    }

    // Resizable panel
    var stW = useState(500), panelW = stW[0], setPanelW = stW[1];
    var stH = useState(300), panelH = stH[0], setPanelH = stH[1];
    var dragRef = useRef(null);
    function onResizeStart(e, dir) {
      e.preventDefault();
      var startX = e.clientX, startY = e.clientY, startW = panelW, startH = panelH;
      function onMove(ev) {
        if (dir === 'w' || dir === 'nw' || dir === 'n') {
          if (dir !== 'n') setPanelW(Math.max(320, Math.min(800, startW - 2*(ev.clientX - startX))));
          if (dir !== 'w') setPanelH(Math.max(150, Math.min(600, startH - (ev.clientY - startY))));
        }
      }
      function onUp() { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    }

    var isDark = (s.prefs && s.prefs.theme) !== 'light';
    var panelBg  = 'var(--bg-secondary)';
    var borderCol = 'var(--border)';
    var textCol  = 'var(--text-primary)';
    var mutedCol = 'var(--text-muted)';
    var inputBg  = 'var(--input-bg)';
    var aiBubbleBg = 'var(--card-bg)';

    var isDetecting = s.detecting;
    if (!open) {
      var closedGlow = modelLoading || isDetecting;
      var closedAnim = closedGlow ? 'nlBorderPulse 2s ease-in-out infinite' : 'none';
      var closedBorder = closedGlow ? '1px solid rgba(96,165,250,.5)' : '1px solid ' + borderCol;
      var closedLabel = isDetecting ? 'Detecting clashes…' : modelLoading ? 'Model loading…' : 'ClashControl';
      return html`<button class="cc-nlpanel-closed"
        onClick=${function(){ setOpen(true); }}
        title=${isDetecting ? 'Clash detection running…' : modelLoading ? 'Model is loading… click to set up clashes' : 'ClashControl — describe tasks in plain English ( / )'}
        style=${{
          position:'absolute', bottom:'1.5rem', left:'50%', transform:'translateX(-50%)',
          zIndex:1200, display:'flex', alignItems:'center', gap:'.5rem',
          padding:'.55rem 2rem', borderRadius:999, minWidth:280,justifyContent:'center',
          background:panelBg, border:closedBorder,
          color:closedGlow ? 'var(--accent-subtle)' : mutedCol, fontSize:'0.95rem', cursor:'pointer',
          boxShadow: closedGlow ? 'var(--shadow-md), 0 0 20px rgba(37,99,235,.3)' : 'var(--shadow-md)',
          whiteSpace:'nowrap', animation:closedAnim
        }}>
        ${closedGlow ? html`<span class="spin" style=${{display:'inline-block',width:12,height:12,borderRadius:'50%',border:'1.5px solid rgba(96,165,250,.3)',borderTopColor:'#60a5fa'}}></span>` : html`<svg width="12" height="12" viewBox="0 0 16 16" fill="none" style=${{flexShrink:0}}>
          <path d="M2 4h12M2 8h8M2 12h10" stroke="var(--accent)" stroke-width="1.6" stroke-linecap="round"/>
        </svg>`}
        ${closedLabel}
        <span style=${{fontSize:'0.69rem', opacity:.5, marginLeft:'.15rem'}}>/</span>
      </button>`;
    }

    var panelGlow = modelLoading || llmStatus === 'loading' || isDetecting;
    var panelAnimation = panelGlow ? 'nlBorderPulse 2s ease-in-out infinite' : 'none';
    var panelBorderCol = panelGlow ? 'rgba(96,165,250,.5)' : borderCol;
    var backendLabel = backend === 'ollama' ? 'Ollama (' + _ollamaModel + ')' : backend === 'browser' ? 'In-browser (0.5B)' : null;
    var backendColor = backend === 'ollama' ? '#22c55e' : backend === 'browser' ? '#f59e0b' : mutedCol;
    return html`<div class="cc-nlpanel" style=${{
      position:'absolute', bottom:'1rem', left:'50%', transform:'translateX(-50%)',
      zIndex:1200, width:'min('+panelW+'px, calc(100% - 2rem))',
      background:panelBg, border:'1px solid '+panelBorderCol,
      borderRadius:12, boxShadow:'var(--shadow-lg)',
      display:'flex', flexDirection:'column', overflow:'hidden',
      animation:panelAnimation
    }}>
      <div onMouseDown=${function(e){onResizeStart(e,'n')}} style=${{
        height:4, cursor:'ns-resize', flexShrink:0
      }}></div>
      <div style=${{
        display:'flex', alignItems:'center', padding:'0 .8rem .55rem',
        borderBottom:'1px solid '+borderCol, gap:'.5rem'
      }}>
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" style=${{flexShrink:0}}>
          <path d="M2 4h12M2 8h8M2 12h10" stroke="#60a5fa" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <span style=${{fontSize:'0.87rem', fontWeight:600, color:textCol, flex:1}}>ClashControl</span>
        ${llmStatus === 'loading' && html`<span style=${{fontSize:'0.69rem', color:'#60a5fa', display:'flex', alignItems:'center', gap:'.25rem'}}>
          <span class="spin" style=${{display:'inline-block', width:'.55rem', height:'.55rem', borderRadius:'50%', border:'1.5px solid rgba(96,165,250,.3)', borderTopColor:'#60a5fa'}}></span>
          AI ${llmProgress}%
        </span>`}
        ${llmStatus === 'ready' && backendLabel && html`<span style=${{fontSize:'0.63rem', color:backendColor, display:'flex', alignItems:'center', gap:'.2rem'}}>
          <span style=${{width:'.4rem', height:'.4rem', borderRadius:'50%', background:backendColor, display:'inline-block'}}></span>
          ${backendLabel}
        </span>`}
        <button onClick=${function(){if(window._ccToggleTraining)window._ccToggleTraining();else d({t:A.TRAINING_MODE});}} style=${{
          background:s.trainingMode?'rgba(124,58,237,.85)':'none', border:'1px solid '+(s.trainingMode?'#a78bfa':'var(--border)'),
          borderRadius:6, cursor:'pointer', display:'flex', alignItems:'center', gap:'.25rem',
          padding:'.15rem .45rem', color:s.trainingMode?'#e9d5ff':mutedCol, fontSize:'0.69rem', whiteSpace:'nowrap',
          transition:'background .15s, border-color .15s'
        }}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a4 4 0 0 1 4 4c0 1.95-1.4 3.58-3.25 3.93V12h3.5a2.25 2.25 0 0 1 0 4.5h-3.5v1.25A3.25 3.25 0 0 1 9.5 21 3.25 3.25 0 0 1 6.25 17.75V14.5h-1A2.25 2.25 0 0 1 3 12.25 2.25 2.25 0 0 1 5.25 10h3.5V9.93A4 4 0 0 1 12 2z"/>
          </svg>
          ${s.trainingMode?'Training On':'Training'}
        </button>
        <button onClick=${function(){ setOpen(false); }} style=${{
          background:'none', border:'none', cursor:'pointer',
          color:mutedCol, fontSize:'1.26rem', lineHeight:1, padding:'0 .1rem'
        }}>×</button>
      </div>

      ${showOllamaTip && backend !== 'ollama' && html`<div style=${{
        padding:'.4rem .8rem', borderBottom:'1px solid '+borderCol,
        background: 'var(--accent-bg)',
        fontSize:'0.72rem', color:mutedCol, display:'flex', alignItems:'center', gap:'.5rem'
      }}>
        <span style=${{flex:1, lineHeight:1.5}}>
          <strong style=${{color:textCol}}>Speed tip:</strong> Install <a href="https://ollama.com" target="_blank" rel="noopener"
            style=${{color:'#60a5fa', textDecoration:'underline'}}>Ollama</a> and run
          <code style=${{background:'var(--tag-bg)', padding:'.1rem .25rem', borderRadius:3, fontSize:'0.67rem'}}>ollama pull qwen2.5:7b</code>
          for a faster, smarter local AI — no cloud, runs on your machine.
        </span>
        <button onClick=${function(){ setShowOllamaTip(false); }} style=${{
          background:'none', border:'none', cursor:'pointer', color:mutedCol, fontSize:'0.92rem', padding:'0 .1rem', lineHeight:1
        }}>×</button>
      </div>`}

      <div style=${{
        overflowY:'auto', padding:'.7rem .8rem',
        display:'flex', flexDirection:'column', gap:'.55rem',
        maxHeight:panelH, minHeight:80
      }}>
        ${msgs.map(function(m, i) {
          var isUser = m.role === 'user';
          if (m.setup) return html`<${ClashSetupCard} key=${i} setup=${m.setup} s=${s} d=${d} onRun=${executeDetection} setMsgs=${setMsgs} idx=${i} />`;
          if (m.detecting) return null;
          return html`<div key=${i} style=${{display:'flex', justifyContent: isUser?'flex-end':'flex-start'}}>
            <div style=${{
              maxWidth:'85%', padding:'.45rem .7rem',
              borderRadius: isUser ? '12px 12px 3px 12px' : '12px 12px 12px 3px',
              background: isUser ? 'var(--accent)' : aiBubbleBg,
              color: isUser ? '#fff' : textCol,
              fontSize:'0.87rem', lineHeight:1.55, wordBreak:'break-word'
            }}>
              ${m.text}
            </div>
          </div>`;
        })}
        ${loading && html`<div style=${{display:'flex'}}>
          <div style=${{
            padding:'.4rem .65rem', borderRadius:'12px 12px 12px 3px',
            background:aiBubbleBg, color:mutedCol, fontSize:'0.84rem'
          }}>…</div>
        </div>`}
        <div ref=${bottomRef}></div>
      </div>

      ${(isDetecting || modelLoading) ? html`<div style=${{
        padding:'.55rem .7rem', borderTop:'1px solid '+borderCol,
        display:'flex', alignItems:'center', gap:'.45rem'
      }}>
        <div style=${{
          flex:1, display:'flex', alignItems:'center', gap:'.45rem',
          background:isDetecting && detectPct>0 ? 'linear-gradient(90deg, rgba(37,99,235,.25) '+detectPct+'%, '+inputBg+' '+detectPct+'%)' : inputBg,
          border:'1px solid rgba(96,165,250,.35)',
          borderRadius:8, padding:'.5rem .65rem',
          transition:'background .3s',
          animation:(!isDetecting||detectPct===0)?'nlBorderPulse 2s ease-in-out infinite':'none'
        }}>
          <span class="spin" style=${{display:'inline-block',width:'.7rem',height:'.7rem',borderRadius:'50%',border:'1.5px solid rgba(96,165,250,.3)',borderTopColor:'#60a5fa',flexShrink:0}}></span>
          <span style=${{fontSize:'0.85rem',color:'#60a5fa',fontWeight:500}}>${isDetecting ? (function(){
            var p=detectPct;
            var msg=p===0?'Running clash detection':p<15?'Running clash detection':p<30?'Crunching triangles':p<45?'Working hard':p<60?'Running as fast as I can':p<75?'Almost halfway… just kidding, past it':p<85?'So many clashes to check':p<93?'Wrapping things up':p>=93?'Final stretch':'Detecting';
            return msg+(p>0?' — '+p+'%':'')+'…';
          }()) : 'Model loading…'}</span>
        </div>

  // ── Training Pill (top-center, expandable when active) ──────
  function TrainingPill(props) {
    var s = props.s, d = props.d;
    var clashes = s.clashes;
    var stExpanded = useState(false), isExpanded=stExpanded[0], setExpanded=stExpanded[1];
    var stWarn = useState(false), showWarn=stWarn[0], setShowWarn=stWarn[1];
    var stDelConfirm = useState(false), showDelConfirm=stDelConfirm[0], setShowDelConfirm=stDelConfirm[1];
    var prevTraining = useRef(false);
    var stConsent = useState(function(){try{return localStorage.getItem('cc_data_consent')==='granted';}catch(e){return false;}}), dataConsent=stConsent[0], setDataConsent=stConsent[1];
    useEffect(function(){
      if(s.trainingMode && !prevTraining.current) setExpanded(true);
      if(!s.trainingMode) setExpanded(false);
      prevTraining.current = s.trainingMode;
    },[s.trainingMode]);
    // Sync toggle when consent popup or other tab changes cc_data_consent
    useEffect(function(){
      function sync(){try{setDataConsent(localStorage.getItem('cc_data_consent')==='granted');}catch(e){}}
      window.addEventListener('cc-consent-change', sync);
      window.addEventListener('storage', function(e){if(e.key==='cc_data_consent') sync();});
      return function(){window.removeEventListener('cc-consent-change', sync);};
    },[]);

    var confirmedFromClash = s.issues.filter(function(i){return i.source==='clash';});
    var allTrainable = clashes.concat(confirmedFromClash);
    var reviewedCount = allTrainable.filter(function(c){return c.status!=='open';}).length;
    var feedbackCount = allTrainable.filter(function(c){return c.aiFeedback||c.clashTypeConfirmed||(c.aiReasons&&c.aiReasons.length)||(c.aiResolution&&c.aiResolution.length)||c.aiNote;}).length;
    var totalCount = allTrainable.length;

    // Global guard: warn before turning off if unsent data exists
    window._ccToggleTraining = function(){
      if(s.trainingMode && feedbackCount > 0){setShowWarn(true);return;}
      d({t:A.TRAINING_MODE});
    };

    function doDelete() { d({t:A.CLEAR_TRAINING_DATA}); }
    var hasData = feedbackCount > 0;
    // Reactive data counts — update when training data changes
    var stNlN = useState(function(){return _getNLTrainCount();}), nlN=stNlN[0], setNlN=stNlN[1];
    var stClN = useState(function(){return _getClashTrainCount();}), clashN=stClN[0], setClashN=stClN[1];
    var stRunN = useState(function(){try{return JSON.parse(localStorage.getItem('cc_detection_runs')||'[]').length;}catch(e){return 0;}}), runN=stRunN[0], setRunN=stRunN[1];
    var stFlash = useState(false), sentFlash=stFlash[0], setSentFlash=stFlash[1];
    useEffect(function(){
      function sync(){ setNlN(_getNLTrainCount()); setClashN(_getClashTrainCount()); try{setRunN(JSON.parse(localStorage.getItem('cc_detection_runs')||'[]').length);}catch(e){setRunN(0);} }
      function flash(){ setSentFlash(true); setTimeout(function(){setSentFlash(false);},2000); }
      window.addEventListener('cc-training-data-change', sync);
      window.addEventListener('cc-training-sent', flash);
      return function(){ window.removeEventListener('cc-training-data-change', sync); window.removeEventListener('cc-training-sent', flash); };
    },[]);

    var _pillTop = props.topOffset ? '3.5rem' : '.75rem';
    return html`<div style=${{position:'absolute',top:_pillTop,left:'50%',transform:'translateX(-50%)',
      zIndex:20,pointerEvents:'auto',display:'flex',flexDirection:'column',alignItems:'center',transition:'top .2s'}}>
      <div class="cc-training-btn-3d" style=${{display:'flex',alignItems:'center',
          borderRadius:999,
          background:sentFlash?'rgba(34,197,94,.85)':s.trainingMode?'rgba(124,58,237,.85)':'var(--overlay-bg)',
          border:'1px solid '+(sentFlash?'#22c55e':s.trainingMode?'#a78bfa':'var(--border)'),
          boxShadow:sentFlash?'0 0 24px rgba(34,197,94,.5)':s.trainingMode?'0 0 20px rgba(124,58,237,.3)':'var(--shadow-md)',
          transition:'background .3s, border-color .3s, box-shadow .3s',
          overflow:'hidden'}}>
        <button onClick=${function(){if(window._ccToggleTraining)window._ccToggleTraining();else d({t:A.TRAINING_MODE}); if(!s.trainingMode) setExpanded(false);}}
          style=${{display:'flex',alignItems:'center',gap:'.4rem',
            padding:'.45rem .7rem .45rem 1.1rem',background:'none',border:'none',
            color:s.trainingMode?'#e9d5ff':'var(--text-muted)',fontSize:'0.85rem',cursor:'pointer',whiteSpace:'nowrap'}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a4 4 0 0 1 4 4c0 1.95-1.4 3.58-3.25 3.93V12h3.5a2.25 2.25 0 0 1 0 4.5h-3.5v1.25A3.25 3.25 0 0 1 9.5 21 3.25 3.25 0 0 1 6.25 17.75V14.5h-1A2.25 2.25 0 0 1 3 12.25 2.25 2.25 0 0 1 5.25 10h3.5V9.93A4 4 0 0 1 12 2z"/>
          </svg>
          ${s.trainingMode?'Training Mode On':'Training Mode'}
        </button>
        ${s.trainingMode && html`<button onClick=${function(e){e.stopPropagation();setExpanded(!isExpanded);}}
          style=${{display:'flex',alignItems:'center',padding:'.45rem .7rem .45rem .3rem',background:'none',border:'none',
            borderLeft:'1px solid rgba(196,181,253,.3)',cursor:'pointer',color:'#c4b5fd',fontSize:'0.63rem'}}>
          ${isExpanded?'▲':'▼'}

      </div>
      ${s.trainingMode && isExpanded && function(){
        var anyData = hasData || nlN > 0 || clashN > 0 || runN > 0;

          background:'var(--overlay-bg-strong)',border:'1px solid rgba(124,58,237,.4)',borderRadius:10,

            <div onClick=${function(){var nv=!dataConsent;setDataConsent(nv);try{localStorage.setItem('cc_data_consent',nv?'granted':'denied');}catch(e){}window.dispatchEvent(new Event('cc-consent-change'));}}
              role="switch" aria-checked=${dataConsent} tabindex="0"
              onKeyDown=${function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();var nv2=!dataConsent;setDataConsent(nv2);try{localStorage.setItem('cc_data_consent',nv2?'granted':'denied');}catch(e){}window.dispatchEvent(new Event('cc-consent-change'));}}}
              style=${{width:30,height:16,borderRadius:8,background:dataConsent?'#7c3aed':'var(--text-faint)',cursor:'pointer',position:'relative',transition:'background .2s',flexShrink:0}}>
              <div style=${{width:12,height:12,borderRadius:6,background:'#fff',position:'absolute',top:2,left:dataConsent?16:2,transition:'left .2s',boxShadow:'0 1px 2px rgba(0,0,0,.2)'}}></div>
            </div>
          </div>
          <!-- Data recorded -->
          <div style=${{fontSize:'0.57rem',color:'var(--text-faint)',marginBottom:'.25rem'}}>
            ${function(){
              var parts=[];
              if(runN>0) parts.push(runN+' detection run'+(runN!==1?'s':''));
              if(clashN>0) parts.push(clashN+' clash verdict'+(clashN!==1?'s':''));

            }()}

            }} disabled=${!anyData||!dataConsent}

  // ── sendBeacon auto-send ──────────────────────────────────────
  function _beaconSendTrainingData(clashes, detectionSettings, models, defaultTolerances, issues) {
    try {
      if(localStorage.getItem('cc_data_consent')!=='granted') return;
    } catch(e){ return; }
    var allClashData = clashes.slice();
    if(issues) issues.forEach(function(i){if(i.source==='clash') allClashData.push(i);});
    var unsent = allClashData.filter(function(c){
      return c.status!=='open' && !_beaconSentIds[c.id];
    });
    if(!unsent.length) return;
    var payload = _buildAITrainingPayload(unsent, detectionSettings, models, defaultTolerances, []);
    if(!payload) return;
    var json = JSON.stringify(payload);
    _clearClashTrainStore();
    unsent.forEach(function(c){ _beaconSentIds[c.id]=true; });
    var fd = new URLSearchParams();
    fd.append('entry.1252313993', json);
    var _gf = ['https://docs','google','com/forms/d/e/','1FAIpQLSc51xdQw_8JY2lN1aw8OZOT2Jzdx42m','vilJzqMGVw4tXo7wtA'];
    var baseUrl = _gf[0]+'.'+_gf[1]+'.'+_gf[2]+_gf[3]+_gf[4];
    fetch(baseUrl+'/formResponse',{method:'POST',body:fd}).then(function(resp){
      if(resp.ok||resp.status===0) window.dispatchEvent(new Event('cc-training-sent'));
    }).catch(function(){
      fetch(baseUrl+'/formResponse',{method:'POST',mode:'no-cors',body:fd}).then(function(){
        window.dispatchEvent(new Event('cc-training-sent'));
      }).catch(function(){});
    });
  }

  function _beaconSendNLTrainingData(models) {
    try {
      if(localStorage.getItem('cc_data_consent')!=='granted') return;
    } catch(e){ return; }
    var store = _getNLTrainStore();
    if(!store.length) return;
    var records = store.map(function(r){
      return {
        input: _sanitizeNLInput(r.input||'', models),
        matched: !!(r.output!=null),
        action: r.meta&&r.meta.action||null,
        path: r.meta&&r.meta.path||'unknown',
        user_intent: r.meta&&r.meta.user_intent||null,
        v: r.meta&&r.meta.v||'',
        ts: r.meta&&r.meta.ts||0
      };
    });
    var payload = {type:'nl_training', version:'1.0', app_version:CC_VERSION.v, count:records.length, records:records};
    var json = JSON.stringify(payload);
    // Clear BEFORE sending — ensures no re-sends even if fetch fails silently
    _clearNLTrainStore();
    var fd = new URLSearchParams();
    fd.append('entry.65932609', json);
    var _gf = ['https://docs','google','com/forms/d/e/','1FAIpQLSc51xdQw_8JY2lN1aw8OZOT2Jzdx42m','vilJzqMGVw4tXo7wtA'];
    var baseUrl = _gf[0]+'.'+_gf[1]+'.'+_gf[2]+_gf[3]+_gf[4];
    fetch(baseUrl+'/formResponse',{method:'POST',body:fd}).then(function(resp){
      if(resp.ok||resp.status===0) window.dispatchEvent(new Event('cc-training-sent'));
    }).catch(function(){
      fetch(baseUrl+'/formResponse',{method:'POST',mode:'no-cors',body:fd}).then(function(){
        window.dispatchEvent(new Event('cc-training-sent'));
      }).catch(function(){});
    });
  }

  function _beaconSendDetectionRuns() {
    try {
      if(localStorage.getItem('cc_data_consent')!=='granted') return;
    } catch(e){ return; }
    var runs = [];
    try { runs = JSON.parse(localStorage.getItem('cc_detection_runs')||'[]'); } catch(e){ return; }
    if (!runs.length) return;
    // Slim payload: strip bulky clashFeatures/suppressedPairs to stay within form field limits
    var slimRuns = runs.map(function(r){
      var s = Object.assign({}, r);
      delete s.clashFeatures;
      delete s.suppressedPairs;
      s.suppressedCount = r.suppressedCount || (r.suppressedPairs||[]).length;
      return s;
    });
    var payload = {type:'detection_runs', version:'1.0', app_version:CC_VERSION.v, count:slimRuns.length, runs:slimRuns};
    var json = JSON.stringify(payload);
    try { localStorage.removeItem('cc_detection_runs'); } catch(e){}
    window.dispatchEvent(new Event('cc-training-data-change'));
    var fd = new URLSearchParams();
    fd.append('entry.61454827', json);
    var _gf = ['https://docs','google','com/forms/d/e/','1FAIpQLSc51xdQw_8JY2lN1aw8OZOT2Jzdx42m','vilJzqMGVw4tXo7wtA'];
    var baseUrl = _gf[0]+'.'+_gf[1]+'.'+_gf[2]+_gf[3]+_gf[4];
    fetch(baseUrl+'/formResponse',{method:'POST',body:fd}).then(function(resp){
      if(resp.ok||resp.status===0) window.dispatchEvent(new Event('cc-training-sent'));
    }).catch(function(){
      fetch(baseUrl+'/formResponse',{method:'POST',mode:'no-cors',body:fd}).then(function(){
        window.dispatchEvent(new Event('cc-training-sent'));
      }).catch(function(){});
    });
  }

  // ── Side Panel ─────────────────────────────────────────────────

  function SidePanel(props) {
    var s=props.s, d=props.d;
    var tab=s.tab;
    // Hooks MUST be called unconditionally (before any early return)
    var widthSt=useState(300), panelW=widthSt[0], setPanelW=widthSt[1];
    var dragRef=useRef(null);
    if (!tab) return null;
    var projects=s.projectList||[];
    var activeProj=projects.find(function(p){return p.id===s.activeProject;})||projects[0]||{name:'Default'};
    var TITLES={models:'Models',clashes:'Clashes',issues:'Issues',explorer:'Explorer',tools:'Tools'};
    function onResizeDown(e){
      e.preventDefault();
      dragRef.current={startX:e.clientX,startW:panelW};
      function onMove(ev){
        if(!dragRef.current) return;
        var dx=dragRef.current.startX-ev.clientX;
        setPanelW(Math.max(200,Math.min(600,dragRef.current.startW+dx)));
      }
      function onUp(){dragRef.current=null;window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);}
      window.addEventListener('mousemove',onMove);
      window.addEventListener('mouseup',onUp);
    }
    return html`<div class="cc-side-panel" style=${{
      width:panelW,flexShrink:0,display:'flex',flexDirection:'column',overflow:'hidden',
      background:'var(--bg-primary)',borderLeft:'1px solid var(--border-subtle)',position:'relative'
    }}>
      <div onMouseDown=${onResizeDown} style=${{position:'absolute',left:0,top:0,bottom:0,width:8,cursor:'col-resize',zIndex:10,
        background:'transparent',transition:'background .15s'}} onMouseEnter=${function(e){e.currentTarget.style.background='rgba(59,130,246,0.3)';}} onMouseLeave=${function(e){e.currentTarget.style.background='transparent';}}></div>
      <div style=${{display:'flex',alignItems:'center',padding:'.6rem .85rem',
        borderBottom:'1px solid var(--border-subtle)',flexShrink:0,gap:'.5rem'}}>
        <span style=${{fontWeight:600,fontSize:'.82rem',flex:1,color:'var(--text-primary)'}}>${TITLES[tab]||''}</span>
        ${tab==='models' && html`<span style=${{fontSize:'.68rem',color:'var(--text-muted)',overflow:'hidden',
          textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:140}} title=${activeProj.name}>📁 ${activeProj.name}</span>`}
        <button onClick=${function(){d({t:A.TAB,v:null});}}
          style=${{background:'none',border:'none',cursor:'pointer',color:'var(--text-muted)',
            fontSize:'1.1rem',lineHeight:1,padding:'2px 4px',borderRadius:4}} title="Close panel">×</button>
      </div>
      ${tab==='models'   && html`<${ModelSidebar}  s=${s} d=${d} />`}
      ${tab==='clashes'  && html`<${IssuePanel} key="clashes" s=${s} d=${d} hideTabBar=${true} />`}
      ${tab==='issues'   && html`<${IssuePanel} key="issues" s=${s} d=${d} hideTabBar=${true} />`}
      ${tab==='explorer' && html`<${IssuePanel} key="explorer" s=${s} d=${d} hideTabBar=${true} />`}
      ${tab==='standards' && html`<${StandardsPanel} />`}
      ${tab==='tools'    && html`<${ToolsPanel} s=${s} d=${d} />`}
    </div>`;
  }

  // ── First-Visit Welcome Popup ─────────────────────────────────

  function WelcomePopup(props) {

      try { return !sessionStorage.getItem('cc_session_seen'); } catch(e){ return true; }
    });
    var show = stShow[0], setShow = stShow[1];
    // Check if data consent still needs to be decided
    var needsConsent = useState(function(){
      try { var v=localStorage.getItem('cc_data_consent'); return v!=='granted'&&v!=='denied'; } catch(e){ return true; }
    })[0];
    // Animate in

    useEffect(function(){ if(show) requestAnimationFrame(function(){ setVis(true); }); },[show]);

      if(enableTraining) { try{localStorage.setItem('cc_training_informed','1');}catch(e){} }

        try { sessionStorage.setItem('cc_session_seen','1'); } catch(e){}

      if(!show) return;
      function onKey(e){if(e.key==='Escape') dismiss(needsConsent?'denied':null);}
