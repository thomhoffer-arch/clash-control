<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>

  <title>ClashControl — Open BIM Clash Detection</title>

  <!-- Only 3 CDN deps: React, Three.js, JSZip — all UMD, all cdnjs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <!-- htm — tagged template to React.createElement (hand-written, tested, 11/11 pass) -->
  <script>
  (function(g) {
    var HOLE = '\0';
    g.htm = function(statics) {
      var fields = [];
      for (var a = 1; a < arguments.length; a++) fields.push(arguments[a]);
      var h = this;
      var tpl = statics[0];
      for (var a = 1; a < statics.length; a++) tpl += HOLE + (a-1) + HOLE + statics[a];
      var i = 0, len = tpl.length;
      function readHole() {
        i++;
        var n = '';
        while (tpl[i] !== HOLE) n += tpl[i++];
        i++;
        return fields[parseInt(n)];
      }
      function ws() { while (i < len && (tpl[i] === ' ' || tpl[i] === '\t' || tpl[i] === '\n' || tpl[i] === '\r')) i++; }
      function parseChildren() {
        var ch = [];
        while (i < len) {
          if (tpl[i] === '<') {
            if (tpl[i+1] === '/') { while (i < len && tpl[i] !== '>') i++; i++; return ch; }
            i++;
            ch.push(parseElement());
          } else if (tpl[i] === HOLE) {
            var v = readHole();
            if (Array.isArray(v)) { for (var x = 0; x < v.length; x++) if (v[x] != null && v[x] !== false) ch.push(v[x]); }
            else if (v != null && v !== false && v !== true) ch.push(v);
          } else {
            var txt = '';
            while (i < len && tpl[i] !== '<' && tpl[i] !== HOLE) txt += tpl[i++];
            txt = txt.replace(/^\s+|\s+$/g, '');
            if (txt) ch.push(txt);
          }
        }
        return ch;
      }
      function parseElement() {
        ws();
        var tag;
        if (tpl[i] === HOLE) { tag = readHole(); }
        else { tag = ''; while (i < len && tpl[i] !== ' ' && tpl[i] !== '>' && tpl[i] !== '/' && tpl[i] !== '\n' && tpl[i] !== '\t' && tpl[i] !== '\r') tag += tpl[i++]; }
        var props = null;
        ws();
        while (i < len && tpl[i] !== '>' && !(tpl[i] === '/' && (i+1 >= len || tpl[i+1] === '>'))) {
          ws();
          if (i >= len || tpl[i] === '>' || (tpl[i] === '/' && (i+1 >= len || tpl[i+1] === '>'))) break;
          if (tpl[i] === '.' && tpl[i+1] === '.' && tpl[i+2] === '.') { i += 3; if (tpl[i] === HOLE) props = Object.assign(props || {}, readHole()); ws(); continue; }
          var name = '';
          while (i < len && tpl[i] !== '=' && tpl[i] !== ' ' && tpl[i] !== '>' && tpl[i] !== '/' && tpl[i] !== '\n' && tpl[i] !== '\t' && tpl[i] !== '\r' && tpl[i] !== HOLE) name += tpl[i++];
          if (!name) { i++; continue; }
          if (tpl[i] === '=') {
            i++;
            var val;
            if (tpl[i] === HOLE) { val = readHole(); }
            else if (tpl[i] === '"' || tpl[i] === "'") { var q = tpl[i++]; val = ''; while (i < len && tpl[i] !== q) { if (tpl[i] === HOLE) val += readHole(); else val += tpl[i++]; } i++; }
            else { val = ''; while (i < len && tpl[i] !== ' ' && tpl[i] !== '>' && tpl[i] !== '/') val += tpl[i++]; }
            props = props || {};
            props[name] = val;
          } else { props = props || {}; props[name] = true; }
          ws();
        }
        var selfClose = false;
        if (tpl[i] === '/') { i++; selfClose = true; }
        if (tpl[i] === '>') i++;
        var children = selfClose ? [] : parseChildren();
        var args = [tag, props];
        for (var c = 0; c < children.length; c++) args.push(children[c]);
        return h.apply(null, args);
      }
      var result = parseChildren();
      return result.length === 1 ? result[0] : result.length === 0 ? null : result;
    };
  })(window);
  </script>

  <style>

<body>

<div id="boot" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;text-align:center">
  <div style="width:48px;height:48px;background:#2563eb;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:1rem"><span style="color:#fff;font-weight:900;font-size:18px">CC</span></div>
  <div style="font-size:1.25rem;font-weight:700;margin-bottom:.5rem">ClashControl</div>
  <div id="boot-msg" style="color:#64748b;font-size:.85rem">Loading…</div>
</div>
<div id="root"></div>

<script>
// =====================================================================
// Boot: wait for page, check globals, then launch app
// =====================================================================
window.onload = function() {
  try { startApp(); }
  catch(e) {
    document.getElementById('boot-msg').textContent = 'Error: ' + e.message;
    document.getElementById('boot-msg').style.color = '#f87171';
    console.error(e);
  }
};

function startApp() {
  // Check CDN deps loaded
  var need = [];
  if (typeof React === 'undefined')    need.push('React');
  if (typeof ReactDOM === 'undefined') need.push('ReactDOM');
  if (typeof THREE === 'undefined')    need.push('Three.js');
  if (typeof htm === 'undefined')      need.push('htm');
  if (typeof JSZip === 'undefined')   need.push('JSZip');
  if (need.length) throw new Error('CDN failed for: ' + need.join(', ') + '. Check internet.');

  var h          = React.createElement;
  var useState   = React.useState;
  var useEffect  = React.useEffect;
  var useRef     = React.useRef;
  var useReducer = React.useReducer;
  var html       = htm.bind(h);

  // ── Constants ──────────────────────────────────────────────────

  var DISC = [
    { id:'structural',    label:'Structural',    c:'#60a5fa' },
    { id:'mep',           label:'MEP',           c:'#f87171' },
    { id:'architectural', label:'Architectural', c:'#c084fc' },
    { id:'civil',         label:'Civil',         c:'#34d399' },
    { id:'other',         label:'Other',         c:'#fbbf24' },
  ];
  var STAT = {
    open:        { label:'Open',        bg:'#ef4444' },
    in_progress: { label:'In progress', bg:'#f59e0b' },
    resolved:    { label:'Resolved',    bg:'#22c55e' },
  };

  function uid()  { return Math.random().toString(36).slice(2,10).toUpperCase(); }
  function guid() { return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){var r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16)}); }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // ── Reducer ────────────────────────────────────────────────────

  var INIT_FILTERS = {
    search:'', status:'all', type:'all', discipline:'all',
    floor:'all', distMin:0, distMax:9999, elementId:'', selfClash:'all',
    ifcType:'all', storey:'all', material:'all'
  };
  var INIT = {
    models:[], clashes:[], issues:[], activeId:null, showModal:false, modalElement:null, tab:'clashes',
    rules:{ modelA:'all', modelB:'all', hard:true, soft:true, clearance:50 },
    detecting:false, sectionAxis:null, sectionPos:0.5,
    filters:Object.assign({},INIT_FILTERS), floors:[]
  };
  function reducer(s,a) {
    switch(a.t) {
      case 'ADD_MODEL':   return Object.assign({},s,{models:s.models.concat([a.v])});
      case 'DEL_MODEL':   return Object.assign({},s,{models:s.models.filter(function(m){return m.id!==a.id})});
      case 'UPD_MODEL':   return Object.assign({},s,{models:s.models.map(function(m){return m.id===a.id?Object.assign({},m,a.u):m})});
      case 'SET_CLASHES': return Object.assign({},s,{clashes:a.v, detecting:false, activeId:null, floors:deriveFloors(a.v), filters:Object.assign({},INIT_FILTERS)});
      case 'DETECTING':   return Object.assign({},s,{detecting:true});
      case 'ADD_ISSUE':   return Object.assign({},s,{issues:s.issues.concat([a.v])});
      case 'UPD_ISSUE':   return Object.assign({},s,{issues:s.issues.map(function(i){return i.id===a.id?Object.assign({},i,a.u):i})});
      case 'UPD_CLASH':   return Object.assign({},s,{clashes:s.clashes.map(function(c){return c.id===a.id?Object.assign({},c,a.u):c})});
      case 'ACTIVE':      return Object.assign({},s,{activeId:a.id});
      case 'MODAL':       return Object.assign({},s,{showModal:a.v, modalElement:a.el||null});
      case 'UPD_RULES':   return Object.assign({},s,{rules:Object.assign({},s.rules,a.u)});
      case 'UPD_FILTERS': return Object.assign({},s,{filters:Object.assign({},s.filters,a.u)});
      case 'RESET_FILTERS': return Object.assign({},s,{filters:Object.assign({},INIT_FILTERS)});
      case 'SECTION':     return Object.assign({},s,{sectionAxis:a.axis, sectionPos:a.pos!=null?a.pos:s.sectionPos});
      case 'TAB':         return Object.assign({},s,{tab:a.v});
      default:            return s;
    }
  }

  // ── IFC Loader (web-ifc, lazy) ─────────────────────────────────

  var _ifcAPI = null;
  function getIfcAPI() {
    if (_ifcAPI) return Promise.resolve(_ifcAPI);
    return import('https://esm.sh/web-ifc@0.0.57').then(function(mod) {
      var api = new mod.IfcAPI();
      api.SetWasmPath('https://cdn.jsdelivr.net/npm/web-ifc@0.0.57/');
      return api.Init().then(function() { _ifcAPI = api; return api; });
    });
  }

  // IFC type constants (from web-ifc schema)
  var IFC = {
    IFCWALL:839292159, IFCWALLSTANDARDCASE:3512223829, IFCSLAB:1529196076,
    IFCBEAM:753842376, IFCCOLUMN:843113511, IFCDOOR:395920057,
    IFCWINDOW:3304561284, IFCROOF:2016517767, IFCSTAIR:331165859,
    IFCRAILING:2262370178, IFCFURNISHINGELEMENT:263784265,
    IFCFLOWSEGMENT:987401354, IFCFLOWTERMINAL:2058353004,
    IFCFLOWFITTING:4278956645, IFCDISTRIBUTIONFLOWELEMENT:3040386961,
    IFCPIPESEGMENT:3612865200, IFCDUCTSEGMENT:3518393246,
    IFCMEMBER:1073191201, IFCPLATE:3171933400, IFCFOOTING:900683007,
    IFCPILE:1687234759, IFCCOVERING:1973544240, IFCSPACE:3856911033,
    IFCBUILDINGSTOREY:3124254112, IFCRELCONTAINEDINSPATIALSTRUCTURE:3242617779,
    IFCRELDEFINESBYPROPERTIES:4186316022, IFCPROPERTYSET:1451395588,
    IFCPROPERTYSINGLEVALUE:3972844353, IFCELEMENTQUANTITY:1883228015,
    IFCQUANTITYLENGTH:931644368, IFCQUANTITYAREA:2235152071,
    IFCQUANTITYVOLUME:3252649465, IFCQUANTITYWEIGHT:825690147,
    IFCRELASSOCIATESMATERIAL:2655215786, IFCMATERIALLAYERSETUSAGE:1303795690,
    IFCMATERIALLAYERSET:3303938423, IFCMATERIALLAYER:248100487,
    IFCMATERIAL:1838606355
  };

  function safeStr(v) {
    if (v == null) return '';
    if (typeof v === 'object' && v.value != null) return String(v.value);
    return String(v);
  }

  function extractProperties(api, modelID, expressID) {
    var props = {expressId:expressID, ifcType:'', name:'', description:'', objectType:'', storey:'', storeyId:null, material:'', quantities:{}, psets:{}};
    try {
      var line = api.GetLine(modelID, expressID);
      if (line) {
        props.ifcType = line.__proto__.constructor.name || line.type || '';
        // Try to get a readable type name from the IFC type number
        if (line.constructor && line.constructor.name) props.ifcType = line.constructor.name;
        props.name = safeStr(line.Name);
        props.description = safeStr(line.Description);
        props.objectType = safeStr(line.ObjectType);
        // Store the raw type ID for lookups
        if (line.type != null) props.typeId = line.type;
      }
    } catch(e) {}
    return props;
  }

  function extractStoreys(api, modelID) {
    // Build map: elementExpressID -> storeyName
    var storeyMap = {};
    try {
      var storeyIds = api.GetLineIDsWithType(modelID, IFC.IFCBUILDINGSTOREY);
      var storeys = {};
      for (var i = 0; i < storeyIds.size(); i++) {
        var sid = storeyIds.get(i);
        try {
          var sl = api.GetLine(modelID, sid);
          storeys[sid] = safeStr(sl.Name) || ('Storey #'+sid);
        } catch(e) { storeys[sid] = 'Storey #'+sid; }
      }
      // IfcRelContainedInSpatialStructure links elements to storeys
      var relIds = api.GetLineIDsWithType(modelID, IFC.IFCRELCONTAINEDINSPATIALSTRUCTURE);
      for (var i = 0; i < relIds.size(); i++) {
        try {
          var rel = api.GetLine(modelID, relIds.get(i));
          var structId = rel.RelatingStructure ? (rel.RelatingStructure.value||rel.RelatingStructure) : null;
          var storeyName = storeys[structId] || '';
          if (storeyName && rel.RelatedElements) {
            var els = rel.RelatedElements;
            for (var j = 0; j < els.length; j++) {
              var eid = els[j].value != null ? els[j].value : els[j];
              storeyMap[eid] = storeyName;
            }
          }
        } catch(e) {}
      }
    } catch(e) { console.warn('Storey extraction failed:', e.message||e); }
    return storeyMap;
  }

  function extractQuantitiesAndPsets(api, modelID, expressID, props) {
    try {
      var relIds = api.GetLineIDsWithType(modelID, IFC.IFCRELDEFINESBYPROPERTIES);
      for (var i = 0; i < relIds.size(); i++) {
        try {
          var rel = api.GetLine(modelID, relIds.get(i));
          var objs = rel.RelatedObjects || [];
          var found = false;
          for (var j = 0; j < objs.length; j++) {
            var oid = objs[j].value != null ? objs[j].value : objs[j];
            if (oid === expressID) { found = true; break; }
          }
          if (!found) continue;
          var defId = rel.RelatingPropertyDefinition ? (rel.RelatingPropertyDefinition.value||rel.RelatingPropertyDefinition) : null;
          if (!defId) continue;
          var def = api.GetLine(modelID, defId);
          if (!def) continue;
          var setName = safeStr(def.Name) || 'Unknown';
          // IfcElementQuantity
          if (def.Quantities) {
            for (var q = 0; q < def.Quantities.length; q++) {
              try {
                var qid = def.Quantities[q].value != null ? def.Quantities[q].value : def.Quantities[q];
                var ql = api.GetLine(modelID, qid);
                var qn = safeStr(ql.Name);
                var qv = ql.LengthValue||ql.AreaValue||ql.VolumeValue||ql.WeightValue||ql.CountValue;
                if (qn && qv != null) props.quantities[qn] = typeof qv === 'object' ? qv.value : qv;
              } catch(e) {}
            }
          }
          // IfcPropertySet
          if (def.HasProperties) {
            var pset = {};
            for (var p = 0; p < def.HasProperties.length; p++) {
              try {
                var pid = def.HasProperties[p].value != null ? def.HasProperties[p].value : def.HasProperties[p];
                var pl = api.GetLine(modelID, pid);
                var pn = safeStr(pl.Name);
                var pv = pl.NominalValue;
                if (pn && pv != null) pset[pn] = typeof pv === 'object' ? (pv.value != null ? pv.value : String(pv)) : pv;
              } catch(e) {}
            }
            if (Object.keys(pset).length) props.psets[setName] = pset;
          }
        } catch(e) {}
      }
    } catch(e) { console.warn('Property extraction failed for #'+expressID+':', e.message||e); }
  }

  function extractMaterials(api, modelID, expressID) {
    try {
      var relIds = api.GetLineIDsWithType(modelID, IFC.IFCRELASSOCIATESMATERIAL);
      for (var i = 0; i < relIds.size(); i++) {
        try {
          var rel = api.GetLine(modelID, relIds.get(i));
          var objs = rel.RelatedObjects || [];
          var found = false;
          for (var j = 0; j < objs.length; j++) {
            var oid = objs[j].value != null ? objs[j].value : objs[j];
            if (oid === expressID) { found = true; break; }
          }
          if (!found) continue;
          var matRef = rel.RelatingMaterial ? (rel.RelatingMaterial.value||rel.RelatingMaterial) : null;
          if (!matRef) continue;
          var mat = api.GetLine(modelID, matRef);
          if (!mat) continue;
          // Direct material
          if (mat.Name) return safeStr(mat.Name);
          // MaterialLayerSetUsage -> MaterialLayerSet -> layers
          if (mat.ForLayerSet) {
            var lsid = mat.ForLayerSet.value != null ? mat.ForLayerSet.value : mat.ForLayerSet;
            var ls = api.GetLine(modelID, lsid);
            if (ls && ls.MaterialLayers) {
              var names = [];
              for (var k = 0; k < ls.MaterialLayers.length; k++) {
                try {
                  var lid = ls.MaterialLayers[k].value != null ? ls.MaterialLayers[k].value : ls.MaterialLayers[k];
                  var layer = api.GetLine(modelID, lid);
                  if (layer && layer.Material) {
                    var mid = layer.Material.value != null ? layer.Material.value : layer.Material;
                    var m = api.GetLine(modelID, mid);
                    if (m && m.Name) names.push(safeStr(m.Name));
                  }
                } catch(e) {}
              }
              if (names.length) return names.join(', ');
            }
          }
          // MaterialLayerSet directly
          if (mat.MaterialLayers) {
            var names = [];
            for (var k = 0; k < mat.MaterialLayers.length; k++) {
              try {
                var lid = mat.MaterialLayers[k].value != null ? mat.MaterialLayers[k].value : mat.MaterialLayers[k];
                var layer = api.GetLine(modelID, lid);
                if (layer && layer.Material) {
                  var mid = layer.Material.value != null ? layer.Material.value : layer.Material;
                  var m = api.GetLine(modelID, mid);
                  if (m && m.Name) names.push(safeStr(m.Name));
                }
              } catch(e) {}
            }
            if (names.length) return names.join(', ');
          }
        } catch(e) {}
      }
    } catch(e) {}
    return '';
  }

  // IFC type ID to human-readable name map
  var IFC_TYPE_NAMES = {};
  IFC_TYPE_NAMES[839292159] = 'IfcWall'; IFC_TYPE_NAMES[3512223829] = 'IfcWall';
  IFC_TYPE_NAMES[1529196076] = 'IfcSlab'; IFC_TYPE_NAMES[753842376] = 'IfcBeam';
  IFC_TYPE_NAMES[843113511] = 'IfcColumn'; IFC_TYPE_NAMES[395920057] = 'IfcDoor';
  IFC_TYPE_NAMES[3304561284] = 'IfcWindow'; IFC_TYPE_NAMES[2016517767] = 'IfcRoof';
  IFC_TYPE_NAMES[331165859] = 'IfcStair'; IFC_TYPE_NAMES[2262370178] = 'IfcRailing';
  IFC_TYPE_NAMES[263784265] = 'IfcFurnishingElement';
  IFC_TYPE_NAMES[987401354] = 'IfcFlowSegment'; IFC_TYPE_NAMES[2058353004] = 'IfcFlowTerminal';
  IFC_TYPE_NAMES[4278956645] = 'IfcFlowFitting'; IFC_TYPE_NAMES[3040386961] = 'IfcDistributionFlowElement';
  IFC_TYPE_NAMES[3612865200] = 'IfcPipeSegment'; IFC_TYPE_NAMES[3518393246] = 'IfcDuctSegment';
  IFC_TYPE_NAMES[1073191201] = 'IfcMember'; IFC_TYPE_NAMES[3171933400] = 'IfcPlate';
  IFC_TYPE_NAMES[900683007] = 'IfcFooting'; IFC_TYPE_NAMES[1687234759] = 'IfcPile';
  IFC_TYPE_NAMES[1973544240] = 'IfcCovering'; IFC_TYPE_NAMES[3856911033] = 'IfcSpace';

  function loadIFC(buffer, fallbackColor) {
    return getIfcAPI().then(function(api) {
      var modelID = api.OpenModel(new Uint8Array(buffer));
      var meshes = [], elements = [];

      // Pre-extract storey assignments for all elements
      var storeyMap = extractStoreys(api, modelID);
      var allStoreys = {};
      Object.keys(storeyMap).forEach(function(k){ allStoreys[storeyMap[k]] = true; });

      api.StreamAllMeshes(modelID, function(ifcMesh) {
        var expressID = ifcMesh.expressID;
        var elMeshes = [], elBox = new THREE.Box3();
        for (var i = 0; i < ifcMesh.geometries.size(); i++) {
          var placed = ifcMesh.geometries.get(i);
          try {
            var gd = api.GetGeometry(modelID, placed.geometryExpressID);
            var verts = api.GetVertexArray(gd.GetVertexData(), gd.GetVertexDataSize());
            var indices = api.GetIndexArray(gd.GetIndexData(), gd.GetIndexDataSize());
            var pos = new Float32Array(verts.length/2), nrm = new Float32Array(verts.length/2);
            for (var j = 0; j < verts.length; j += 6) {
              var k = j/2;
              pos[k]=verts[j]; pos[k+1]=verts[j+1]; pos[k+2]=verts[j+2];
              nrm[k]=verts[j+3]; nrm[k+1]=verts[j+4]; nrm[k+2]=verts[j+5];
            }
            var geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('normal',   new THREE.BufferAttribute(nrm, 3));
            geo.setIndex(new THREE.BufferAttribute(indices, 1));
            var c = placed.color;
            var col = c ? new THREE.Color(c.x, c.y, c.z) : new THREE.Color(fallbackColor);
            var mat = new THREE.MeshPhongMaterial({ color:col, opacity:c?c.w:1, transparent:c?c.w<0.99:false, side:THREE.DoubleSide });
            var mesh = new THREE.Mesh(geo, mat);
            mesh.applyMatrix4(new THREE.Matrix4().fromArray(placed.flatTransformation));
            mesh.userData.expressID = expressID;
            elBox.expandByObject(mesh);
            elMeshes.push(mesh); meshes.push(mesh);
            gd.delete();
          } catch(e) { console.warn('Skipped element geometry #'+expressID+': '+(e.message||e)); }
        }
        if (elMeshes.length > 0) {
          // Extract full properties for this element
          var props = extractProperties(api, modelID, expressID);
          props.storey = storeyMap[expressID] || '';
          props.material = extractMaterials(api, modelID, expressID);
          // Resolve type name from typeId
          if (props.typeId && IFC_TYPE_NAMES[props.typeId]) props.ifcType = IFC_TYPE_NAMES[props.typeId];
          // Extract quantities and property sets
          extractQuantitiesAndPsets(api, modelID, expressID, props);
          elements.push({ expressId:expressID, meshes:elMeshes, box:elBox.clone(), props:props });
        }
      });
      api.CloseModel(modelID);
      return { meshes:meshes, elements:elements, storeys:Object.keys(allStoreys).sort() };
    });
  }

  // ── Clash Detection ────────────────────────────────────────────

  function detectClashes(models, rules) {
    var pick = function(id) { return id === 'all' ? models : models.filter(function(m){return m.id===id}); };
    var grpA = pick(rules.modelA), grpB = pick(rules.modelB);
    var clashes = [], seen = {};
    grpA.forEach(function(mA) { grpB.forEach(function(mB) {
      var sameModel = mA.id === mB.id;
      var key = [mA.id, mB.id].sort().join('|');
      if (seen[key]) return; seen[key] = true;
      (mA.elements||[]).forEach(function(eA, iA) { (mB.elements||[]).forEach(function(eB, iB) {
        if (sameModel && iB <= iA) return;
        var bA = eA.box.clone(), bB = eB.box.clone();
        var isHard = bA.intersectsBox(bB);
        var isSoft = !isHard && rules.soft && bA.clone().expandByScalar(rules.clearance/1000).intersectsBox(bB);
        if ((isHard && rules.hard) || isSoft) {
          var ctr = new THREE.Vector3(); bA.getCenter(ctr);
          // Compute distance between bounding boxes (mm)
          var gx=Math.max(0,bB.min.x-bA.max.x,bA.min.x-bB.max.x);
          var gy=Math.max(0,bB.min.y-bA.max.y,bA.min.y-bB.max.y);
          var gz=Math.max(0,bB.min.z-bA.max.z,bA.min.z-bB.max.z);
          var dist=Math.round(Math.sqrt(gx*gx+gy*gy+gz*gz)*1000);
          var pA = eA.props||{}, pB = eB.props||{};
          var tA = pA.ifcType||'Element', tB = pB.ifcType||'Element';
          var nA = pA.name||('#'+eA.expressId), nB = pB.name||('#'+eB.expressId);
          clashes.push({
            id:uid(), source:'auto', type:isHard?'hard':'soft', status:'open',
            title:sameModel?mA.name+' (self)':mA.discipline.toUpperCase()+' \u2194 '+mB.discipline.toUpperCase(),
            description:tA+': '+nA+' ('+mA.name+') vs '+tB+': '+nB+' ('+mB.name+')',
            modelAId:mA.id, modelBId:mB.id, elemA:eA.expressId, elemB:eB.expressId,
            point:[ctr.x,ctr.y,ctr.z], createdAt:new Date().toISOString(),
            distance:dist, elevation:Math.round(ctr.y*1000)/1000,
            disciplines:[mA.discipline,mB.discipline], selfClash:sameModel,
            elemAType:tA, elemBType:tB, elemAName:nA, elemBName:nB,
            elemAStorey:pA.storey||'', elemBStorey:pB.storey||'',
            elemAMaterial:pA.material||'', elemBMaterial:pB.material||'',
            propsA:pA, propsB:pB
          });
        }
      }); });
    }); });
    return clashes;
  }

  function deriveFloors(clashes) {
    if (!clashes.length) return [];
    var ys = clashes.map(function(c){return c.elevation||0}).sort(function(a,b){return a-b});
    var tol = 0.5; // 500mm tolerance
    var floors = [], cur = {yMin:ys[0],yMax:ys[0],sum:ys[0],count:1};
    for (var i=1;i<ys.length;i++) {
      if (ys[i]-cur.yMax > tol) {
        cur.yMax = cur.sum/cur.count + tol/2;
        cur.yMin = cur.sum/cur.count - tol/2;
        floors.push(cur);
        cur = {yMin:ys[i],yMax:ys[i],sum:ys[i],count:1};
      } else {
        cur.yMax = ys[i]; cur.sum += ys[i]; cur.count++;
      }
    }
    floors.push(cur);
    return floors.map(function(f,idx){
      var avg = f.sum/f.count;
      return {id:'L'+idx, label:'Level '+(idx+1)+' ('+avg.toFixed(1)+'m)', yMin:f.yMin-0.25, yMax:f.yMax+0.25};
    });
  }

  // ── Save / Load Project ────────────────────────────────────────

  function saveProject(s) {
    // Serialise everything except Three.js mesh objects (not JSON-safe)
    var data = {
      _cc: 'ClashControl', _v: '0.9',
      savedAt: new Date().toISOString(),
      rules: s.rules,
      models: s.models.map(function(m) {
        return { id:m.id, name:m.name, discipline:m.discipline, color:m.color, visible:m.visible };
      }),
      clashes: s.clashes,
      issues:  s.issues,
      floors:  s.floors,
    };
    var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'project-'+new Date().toISOString().slice(0,10)+'.ccproj';
    a.click();
  }

  function loadProject(d) {
    var inp = document.createElement('input');
    inp.type = 'file'; inp.accept = '.ccproj,application/json';
    inp.onchange = function(e) {
      var f = e.target.files[0]; if (!f) return;
      var r = new FileReader();
      r.onload = function(ev) {
        try {
          var data = JSON.parse(ev.target.result);
          if (!data._cc || data._cc !== 'ClashControl') throw new Error('Not a ClashControl project file.');
          // Restore models as stubs (geometry must be re-uploaded)
          data.models.forEach(function(m) {
            d({ t:'ADD_MODEL', v: Object.assign({}, m, { meshes:[], elements:[], _stub:true }) });
          });
          // Restore rules
          d({ t:'UPD_RULES', u: data.rules });
          // Restore clashes & issues
          if (data.clashes) d({ t:'SET_CLASHES', v: data.clashes });
          (data.issues||[]).forEach(function(i) { d({ t:'ADD_ISSUE', v:i }); });
        } catch(err) {
          alert('Load failed: ' + err.message);
        }
      };
      r.readAsText(f);
    };
    inp.click();
  }

  // ── BCF 2.1 Export ─────────────────────────────────────────────

  function exportBCF(items) {
    if (!items.length) return;
    var zip = new JSZip();
    zip.file('bcf.version','<?xml version="1.0" encoding="UTF-8"?>\n<Version VersionId="2.1"><DetailedVersion>2.1</DetailedVersion></Version>');
    zip.file('project.bcfp','<?xml version="1.0" encoding="UTF-8"?>\n<ProjectExtension><Project ProjectId="'+guid()+'"><Name>ClashControl</Name></Project></ProjectExtension>');
    items.forEach(function(it) {
      var g = guid(), f = zip.folder(g);
      var type = it.type==='hard'?'Issue':it.type==='soft'?'Warning':'Request';
      var st   = it.status==='resolved'?'Closed':'Open';
      f.file('markup.bcf',
        '<?xml version="1.0" encoding="UTF-8"?>\n<Markup><Topic Guid="'+g+'" TopicType="'+type+'" TopicStatus="'+st+'">' +
        '<Title>'+esc(it.title)+'</Title><CreationDate>'+(it.createdAt||new Date().toISOString())+'</CreationDate>' +
        '<Description>'+esc(it.description||'')+'</Description>' +
        '<Priority>'+(it.type==='hard'?'Critical':'Normal')+'</Priority></Topic></Markup>');
    });
    zip.generateAsync({type:'blob'}).then(function(blob) {
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'clashcontrol-'+new Date().toISOString().slice(0,10)+'.bcf';
      a.click();
    });
  }

  // ── Orbit Controls (inline) ────────────────────────────────────

  function makeOrbit(camera, el) {
    var target = new THREE.Vector3();
    var sph = { r:60, phi:Math.PI/4, theta:Math.PI/4 };
    var dragging=false, panning=false, lx=0, ly=0;

    function sync() {
      var o = camera.position.clone().sub(target);
      sph.r = o.length()||60;
      sph.phi = Math.acos(Math.max(-1,Math.min(1,o.y/sph.r)));
      sph.theta = Math.atan2(o.x,o.z);
    }
    function apply() {
      sph.phi = Math.max(0.05, Math.min(Math.PI-0.05, sph.phi));
      sph.r   = Math.max(0.5, Math.min(5000, sph.r));
      camera.position.set(
        target.x + sph.r*Math.sin(sph.phi)*Math.sin(sph.theta),
        target.y + sph.r*Math.cos(sph.phi),
        target.z + sph.r*Math.sin(sph.phi)*Math.cos(sph.theta));
      camera.lookAt(target);
    }
    sync();

    el.addEventListener('mousedown', function(e) {
      if (e.button===0) dragging=true;
      if (e.button===2) panning=true;
      lx=e.clientX; ly=e.clientY; e.preventDefault();
    });
    el.addEventListener('contextmenu', function(e){e.preventDefault()});
    window.addEventListener('mousemove', function(e) {
      if(!dragging&&!panning) return;
      var dx=e.clientX-lx, dy=e.clientY-ly; lx=e.clientX; ly=e.clientY;
      if(dragging){ sph.theta-=dx*0.007; sph.phi-=dy*0.007; apply(); }
      if(panning){
        var sp=sph.r*0.0008;
        var right=new THREE.Vector3().crossVectors(camera.getWorldDirection(new THREE.Vector3()),new THREE.Vector3(0,1,0)).normalize();
        target.addScaledVector(right,-dx*sp); target.y+=dy*sp; apply();
      }
    });
    window.addEventListener('mouseup', function(){dragging=false;panning=false});
    el.addEventListener('wheel', function(e){sph.r*=1+e.deltaY*0.0008;apply();e.preventDefault()},{passive:false});
    return {target:target, sync:sync, apply:apply};
  }

  // ── Three.js Viewer Component ──────────────────────────────────

  var _flyTo = null;
  function Viewer(props) {
    var s = props.s, d = props.d;
    var ref = useRef(null);
    var state3d = useRef({scene:null,camera:null,renderer:null,orbit:null,mg:null,map:{},raf:null});
    var se = useState(null), selectedEl=se[0], setSelectedEl=se[1];
    var hlRef = useRef(null); // highlighted mesh outline
    var modelsRef = useRef(s.models);
    modelsRef.current = s.models;

    // Init scene
    useEffect(function() {
      var el = ref.current; if(!el) return;
      var S = state3d.current;

      var scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0f172a);
      S.scene = scene;

      var camera = new THREE.PerspectiveCamera(55, el.clientWidth/el.clientHeight, 0.01, 10000);
      camera.position.set(30,25,30);
      S.camera = camera;

      var renderer = new THREE.WebGLRenderer({antialias:true});
      renderer.setPixelRatio(Math.min(devicePixelRatio,2));
      renderer.setSize(el.clientWidth, el.clientHeight);
      renderer.localClippingEnabled = true;
      el.appendChild(renderer.domElement);
      S.renderer = renderer;

      S.orbit = makeOrbit(camera, renderer.domElement);
      _flyTo = function(pt) {
        if(!pt||pt.length<3) return;
        var t=S.orbit.target, d=S.orbit;
        t.set(pt[0],pt[1],pt[2]);
        S.camera.position.set(pt[0]+15,pt[1]+10,pt[2]+15);
        d.sync(); d.apply();
      };

      // Raycaster for element picking
      var raycaster = new THREE.Raycaster();
      var mouse = new THREE.Vector2();
      var downPos = {x:0,y:0};
      renderer.domElement.addEventListener('mousedown', function(e){downPos.x=e.clientX;downPos.y=e.clientY;});
      renderer.domElement.addEventListener('mouseup', function(e){
        // Only pick if the mouse didn't move (not a drag)
        if(Math.abs(e.clientX-downPos.x)>3 || Math.abs(e.clientY-downPos.y)>3) return;
        var rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((e.clientX-rect.left)/rect.width)*2-1;
        mouse.y = -((e.clientY-rect.top)/rect.height)*2+1;
        raycaster.setFromCamera(mouse, camera);
        var hits = raycaster.intersectObjects(S.mg.children, true);
        if(hits.length>0) {
          var hit = hits[0].object;
          var eid = hit.userData.expressID;
          if(eid!=null) {
            // Find element props from models
            var found = null;
            var curModels = modelsRef.current;
            for(var mi=0;mi<curModels.length&&!found;mi++){
              var els = curModels[mi].elements||[];
              for(var ei=0;ei<els.length;ei++){
                if(els[ei].expressId===eid){ found={el:els[ei],model:curModels[mi]}; break; }
              }
            }
            // Highlight
            if(hlRef.current){scene.remove(hlRef.current);hlRef.current=null;}
            var box = new THREE.BoxHelper(hit, 0x3b82f6);
            box.material.linewidth = 2;
            scene.add(box);
            hlRef.current = box;
            setSelectedEl(found ? {props:found.el.props||{}, modelName:found.model.name, expressId:eid} : {props:{expressId:eid}, modelName:'Unknown', expressId:eid});
          }
        } else {
          // Click on empty space — deselect
          if(hlRef.current){scene.remove(hlRef.current);hlRef.current=null;}
          setSelectedEl(null);
        }
      });

      scene.add(new THREE.AmbientLight(0xffffff,0.5));
      var sun = new THREE.DirectionalLight(0xfff8f0,1.0);
      sun.position.set(80,120,60); scene.add(sun);
      var fill = new THREE.DirectionalLight(0xd0e8ff,0.3);
      fill.position.set(-50,-20,-50); scene.add(fill);
      scene.add(new THREE.GridHelper(200,80,0x1e3a5f,0x172554));
      scene.add(new THREE.AxesHelper(3));

      var mg = new THREE.Group(); scene.add(mg); S.mg = mg;

      function tick(){S.raf=requestAnimationFrame(tick);renderer.render(scene,camera);}
      tick();

      var obs = new ResizeObserver(function(){
        camera.aspect = el.clientWidth/el.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(el.clientWidth, el.clientHeight);
      });
      obs.observe(el);

      return function(){cancelAnimationFrame(S.raf);obs.disconnect();renderer.dispose();if(el.contains(renderer.domElement))el.removeChild(renderer.domElement);};
    }, []);

    // Sync models
    useEffect(function() {
      var S = state3d.current; if(!S.mg) return;
      var ids = s.models.map(function(m){return m.id});
      // Remove stale
      Object.keys(S.map).forEach(function(id){
        if(ids.indexOf(id)===-1){
          S.map[id].traverse(function(obj){if(obj.isMesh){obj.geometry&&obj.geometry.dispose();obj.material&&obj.material.dispose();}});
          S.mg.remove(S.map[id]);delete S.map[id];
        }
      });
      // Add new
      s.models.forEach(function(model){
        if(!S.map[model.id] && model.meshes && model.meshes.length) {
          var grp = new THREE.Group();
          model.meshes.forEach(function(m){grp.add(m)});
          S.mg.add(grp); S.map[model.id] = grp;
          if(Object.keys(S.map).length===1){
            var box=new THREE.Box3().setFromObject(grp);
            var sz=box.getSize(new THREE.Vector3()), ctr=box.getCenter(new THREE.Vector3());
            var d=Math.max(sz.x,sz.y,sz.z)*1.5;
            S.orbit.target.copy(ctr);
            S.camera.position.set(ctr.x+d,ctr.y+d*0.6,ctr.z+d);
            S.orbit.sync();
          }
        }
        if(S.map[model.id]) S.map[model.id].visible = model.visible!==false;
      });
    }, [s.models]);

    // Section
    useEffect(function(){
      var S = state3d.current; if(!S.renderer||!S.mg) return;
      var planes = [];
      if(s.sectionAxis && S.mg.children.length>0){
        var box=new THREE.Box3().setFromObject(S.mg);
        var cut=box.min[s.sectionAxis]+(box.max[s.sectionAxis]-box.min[s.sectionAxis])*s.sectionPos;
        var nm={x:new THREE.Vector3(1,0,0),y:new THREE.Vector3(0,1,0),z:new THREE.Vector3(0,0,1)};
        planes.push(new THREE.Plane(nm[s.sectionAxis].clone().negate(),cut));
      }
      S.renderer.clippingPlanes=planes;
      S.mg.traverse(function(obj){if(obj.isMesh&&obj.material){obj.material.clippingPlanes=planes;obj.material.needsUpdate=true;}});
    }, [s.sectionAxis, s.sectionPos]);

    var P = {position:'absolute',pointerEvents:'none',fontSize:'.7rem',padding:'.2rem .6rem',borderRadius:'5px'};
    var ep = selectedEl ? selectedEl.props : null;
    var epQ = ep && ep.quantities ? Object.keys(ep.quantities) : [];
    var epP = ep && ep.psets ? Object.keys(ep.psets) : [];
    var ROW={display:'flex',justifyContent:'space-between',padding:'.1rem 0'};
    var LS={fontSize:'.6rem',color:'#64748b'}; var VS={fontSize:'.6rem',color:'#cbd5e1'};
    return html`<div style=${{flex:1,position:'relative',overflow:'hidden'}}>
      <div ref=${ref} style=${{width:'100%',height:'100%'}}></div>
      <div style=${{...P,top:'.75rem',left:'.75rem',background:'rgba(15,23,42,.85)',color:'#64748b'}}>
        ${s.models.length===0?'Load an IFC file to begin':s.models.length+' model'+(s.models.length>1?'s':'')+' loaded'}
      </div>
      ${s.sectionAxis && html`<div style=${{...P,top:'.75rem',right:'.75rem',background:'rgba(30,58,138,.9)',color:'#93c5fd'}}>
        Section ${s.sectionAxis.toUpperCase()} · ${Math.round(s.sectionPos*100)}%
      </div>`}
      ${selectedEl && html`<div style=${{position:'absolute',bottom:'.75rem',left:'.75rem',width:280,maxHeight:'50%',overflowY:'auto',background:'rgba(15,23,42,.95)',border:'1px solid #334155',borderRadius:8,padding:'.6rem',pointerEvents:'auto',boxShadow:'0 4px 20px rgba(0,0,0,.5)'}}>
        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.4rem'}}>
          <span style=${{fontSize:'.7rem',fontWeight:600,color:'#93c5fd'}}>Element Properties</span>
          <div style=${{display:'flex',gap:'.3rem'}}>
            <button onClick=${function(){d({t:'MODAL',v:true,el:selectedEl});d({t:'TAB',v:'issues'});}}
              style=${{...S_BTN,padding:'.1rem .4rem',background:'#2563eb',color:'#fff',fontSize:'.65rem',fontWeight:600,borderRadius:4}}>Create Issue</button>
            <button onClick=${function(){setSelectedEl(null);if(hlRef.current&&state3d.current.scene){state3d.current.scene.remove(hlRef.current);hlRef.current=null;}}}
              style=${{...S_BTN,padding:'0 4px',background:'none',color:'#475569',fontSize:'.7rem'}}>✕</button>
          </div>
        </div>
        <div style=${{fontSize:'.65rem',color:'#f59e0b',marginBottom:'.3rem'}}>${selectedEl.modelName}</div>
        ${ep && ep.ifcType && html`<div style=${ROW}><span style=${LS}>Type</span><span style=${VS}>${ep.ifcType}</span></div>`}
        ${ep && ep.name && html`<div style=${ROW}><span style=${LS}>Name</span><span style=${VS}>${ep.name}</span></div>`}
        ${ep && ep.objectType && html`<div style=${ROW}><span style=${LS}>Object Type</span><span style=${VS}>${ep.objectType}</span></div>`}
        ${ep && ep.description && html`<div style=${ROW}><span style=${LS}>Description</span><span style=${VS}>${ep.description}</span></div>`}
        ${ep && ep.storey && html`<div style=${ROW}><span style=${LS}>Storey</span><span style=${VS}>${ep.storey}</span></div>`}
        ${ep && ep.material && html`<div style=${ROW}><span style=${LS}>Material</span><span style=${VS}>${ep.material}</span></div>`}
        <div style=${ROW}><span style=${LS}>Express ID</span><span style=${VS}>#${selectedEl.expressId}</span></div>
        ${epQ.length>0 && html`<div style=${{marginTop:'.3rem',borderTop:'1px solid #1e293b',paddingTop:'.3rem'}}>
          <div style=${{fontSize:'.6rem',fontWeight:600,color:'#64748b',marginBottom:'.15rem'}}>Quantities</div>
          ${epQ.map(function(k){return html`<div key=${k} style=${ROW}><span style=${LS}>${k}</span><span style=${VS}>${typeof ep.quantities[k]==='number'?ep.quantities[k].toFixed(3):ep.quantities[k]}</span></div>`})}
        </div>`}
        ${epP.map(function(setName){
          var ps=ep.psets[setName]; var keys=Object.keys(ps);
          return html`<div key=${setName} style=${{marginTop:'.3rem',borderTop:'1px solid #1e293b',paddingTop:'.3rem'}}>
            <div style=${{fontSize:'.6rem',fontWeight:600,color:'#64748b',marginBottom:'.15rem'}}>${setName}</div>
            ${keys.map(function(k){return html`<div key=${k} style=${ROW}><span style=${LS}>${k}</span><span style=${VS}>${String(ps[k])}</span></div>`})}
          </div>`;
        })}
      </div>`}
    </div>`;
  }

  var S_PANELR  = {background:'#0f172a',borderLeft:'1px solid #1e293b',display:'flex',flexDirection:'column',flexShrink:0};

  // ── Model Sidebar ──────────────────────────────────────────────

  function ModelSidebar(props) {
    var s=props.s, d=props.d;
    var fileRef = useRef(null);
    var ld = useState(false), loading=ld[0], setLoading=ld[1];
    var er = useState(''), err=er[0], setErr=er[1];

    function onFiles(e) {
      var files = Array.prototype.slice.call(e.target.files||[]);
      setErr('');
      var chain = Promise.resolve();
      files.forEach(function(f) {
        if (!f.name.toLowerCase().match(/\.ifc$/)) return;
        chain = chain.then(function() {
          setLoading(true);
          return f.arrayBuffer().then(function(buf) {
            var disc='structural', col=DISC[0].c;
            return loadIFC(buf, col).then(function(result) {
              d({t:'ADD_MODEL', v:{id:uid(), name:f.name.replace(/\.ifc$/i,''), discipline:disc, color:col, visible:true, meshes:result.meshes, elements:result.elements, storeys:result.storeys||[]}});
            });
          }).catch(function(er) {
            console.error(er);
            setErr(er.message||'Load failed');
          }).then(function(){ setLoading(false); });
        });
      });
      e.target.value='';
    }

    return html`<aside style=${{...S_PANEL,width:240}}>
      <div style=${{padding:'.75rem',borderBottom:'1px solid #1e293b',flexShrink:0}}>
        <div style=${{display:'flex',justifyContent:'space-between',marginBottom:'.4rem'}}>
          <span style=${{fontSize:'.7rem',fontWeight:600,color:'#64748b',textTransform:'uppercase',letterSpacing:'.05em'}}>Models</span>
          <span style=${{fontSize:'.7rem',color:'#334155'}}>${s.models.length} loaded</span>
        </div>
        <input ref=${fileRef} type="file" accept=".ifc" multiple style=${{display:'none'}} onChange=${onFiles} />
        <button onClick=${function(){setErr('');fileRef.current&&fileRef.current.click()}} disabled=${loading}
          style=${{...S_BTN,width:'100%',background:'#1e293b',color:'#94a3b8',border:'1px dashed #334155',display:'flex',alignItems:'center',justifyContent:'center',gap:'.3rem'}}>
          ${loading?html`<span class="spin">⟳</span> Loading…`:'+ Add IFC'}
        </button>
        ${err && html`<div style=${{marginTop:'.4rem',padding:'.4rem',background:'#450a0a',border:'1px solid #7f1d1d',borderRadius:6,fontSize:'.7rem',color:'#fca5a5',whiteSpace:'pre-line'}}>${err}</div>`}
      </div>
      <div style=${{flex:1,overflowY:'auto',padding:'.4rem',display:'flex',flexDirection:'column',gap:'.25rem'}}>
        ${s.models.length===0 && html`<div style=${{textAlign:'center',color:'#334155',fontSize:'.75rem',padding:'2rem 0'}}><div style=${{fontSize:'2rem',marginBottom:'.3rem'}}>📁</div>No models loaded</div>`}
        ${s.models.map(function(m){return html`<${ModelCard} key=${m.id} m=${m} d=${d} />`})}
      </div>
      <div style=${{padding:'.75rem',borderTop:'1px solid #1e293b',flexShrink:0}}>
        <span style=${{fontSize:'.7rem',fontWeight:600,color:'#64748b',textTransform:'uppercase',letterSpacing:'.05em',display:'block',marginBottom:'.4rem'}}>Section Plane</span>
        <div style=${{display:'flex',gap:'.2rem'}}>
          ${['x','y','z'].map(function(ax){return html`<button key=${ax} onClick=${function(){d({t:'SECTION',axis:s.sectionAxis===ax?null:ax})}}
            style=${{...S_BTN,flex:1,padding:'.25rem',background:s.sectionAxis===ax?'#2563eb':'#1e293b',color:s.sectionAxis===ax?'#fff':'#64748b'}}>${ax.toUpperCase()}</button>`})}
          <button onClick=${function(){d({t:'SECTION',axis:null})}}
            style=${{...S_BTN,flex:1,padding:'.25rem',background:!s.sectionAxis?'#2563eb':'#1e293b',color:!s.sectionAxis?'#fff':'#64748b'}}>Off</button>
        </div>
        ${s.sectionAxis && html`<div style=${{marginTop:'.4rem'}}>
          <input type="range" min="0" max="1" step="0.005" value=${s.sectionPos}
            onInput=${function(e){d({t:'SECTION',axis:s.sectionAxis,pos:parseFloat(e.target.value)})}}
            style=${{width:'100%'}} />
          <span style=${{fontSize:'.7rem',color:'#475569'}}>${Math.round(s.sectionPos*100)}%</span>
        </div>`}
      </div>
    </aside>`;
  }

  // ── Issue Panel ────────────────────────────────────────────────

  function IssuePanel(props) {
    var s=props.s, d=props.d, f=s.filters;
    var fo=useState(false), filtersOpen=fo[0], setFiltersOpen=fo[1];
    var isClashTab = s.tab==='clashes';
    var rawItems = isClashTab ? s.clashes : s.issues;

    // Collect unique values for dynamic filter dropdowns
    var uniqueTypes = {}, uniqueStoreys = {}, uniqueMaterials = {};
    if (isClashTab) {
      s.clashes.forEach(function(c) {
        if(c.elemAType) uniqueTypes[c.elemAType]=true;
        if(c.elemBType) uniqueTypes[c.elemBType]=true;
        if(c.elemAStorey) uniqueStoreys[c.elemAStorey]=true;
        if(c.elemBStorey) uniqueStoreys[c.elemBStorey]=true;
        if(c.elemAMaterial) uniqueMaterials[c.elemAMaterial]=true;
        if(c.elemBMaterial) uniqueMaterials[c.elemBMaterial]=true;
      });
    }
    var typeList = Object.keys(uniqueTypes).sort();
    var storeyList = Object.keys(uniqueStoreys).sort();
    var materialList = Object.keys(uniqueMaterials).sort();

    // Count active filters
    var activeCount = 0;
    if(f.status!=='all') activeCount++;
    if(f.type!=='all') activeCount++;
    if(f.discipline!=='all') activeCount++;
    if(f.floor!=='all') activeCount++;
    if(f.selfClash!=='all') activeCount++;
    if(f.elementId) activeCount++;
    if(f.distMin>0||f.distMax<9999) activeCount++;
    if(f.ifcType!=='all') activeCount++;
    if(f.storey!=='all') activeCount++;
    if(f.material!=='all') activeCount++;

    // Apply all filters
    var items = rawItems.filter(function(it){
      if(f.status!=='all' && it.status!==f.status) return false;
      if(f.search){var q=f.search.toLowerCase();if((it.title||'').toLowerCase().indexOf(q)===-1&&(it.description||'').toLowerCase().indexOf(q)===-1)return false;}
      if(isClashTab) {
        if(f.type!=='all' && it.type!==f.type) return false;
        if(f.discipline!=='all' && it.disciplines && it.disciplines.indexOf(f.discipline)===-1) return false;
        if(f.floor!=='all') {
          var fl = s.floors.find(function(x){return x.id===f.floor});
          if(fl && (it.elevation<fl.yMin||it.elevation>fl.yMax)) return false;
        }
        if(f.distMin>0 && (it.distance||0)<f.distMin) return false;
        if(f.distMax<9999 && (it.distance||0)>f.distMax) return false;
        if(f.elementId) {
          var eid=f.elementId;
          if(String(it.elemA).indexOf(eid)===-1 && String(it.elemB).indexOf(eid)===-1) return false;
        }
        if(f.selfClash==='self' && !it.selfClash) return false;
        if(f.selfClash==='cross' && it.selfClash) return false;
        if(f.ifcType!=='all' && it.elemAType!==f.ifcType && it.elemBType!==f.ifcType) return false;
        if(f.storey!=='all' && it.elemAStorey!==f.storey && it.elemBStorey!==f.storey) return false;
        if(f.material!=='all' && it.elemAMaterial!==f.material && it.elemBMaterial!==f.material) return false;
      }
      return true;
    });

    var oC=s.clashes.filter(function(c){return c.status==='open'}).length;
    var oI=s.issues.filter(function(i){return i.status==='open'}).length;
    var FL={fontSize:'.6rem',color:'#64748b',marginBottom:'.15rem',display:'block'};
    var PILL=function(active){return Object.assign({},S_BTN,{fontSize:'.6rem',padding:'.15rem .35rem',background:active?'#2563eb':'#1e293b',color:active?'#fff':'#475569'});};
    var SELSTYLE={fontSize:'.65rem',padding:'.2rem .3rem',borderRadius:4,background:'#1e293b',color:'#94a3b8',border:'1px solid #334155',width:'100%'};

    return html`<aside style=${{...S_PANELR,width:280}}>
      <div style=${{display:'flex',borderBottom:'1px solid #1e293b',flexShrink:0}}>
        ${[{id:'clashes',label:'Clashes',n:oC,bg:'#ef4444'},{id:'issues',label:'Issues',n:oI,bg:'#f59e0b'}].map(function(t){return html`
          <button key=${t.id} onClick=${function(){d({t:'TAB',v:t.id})}}
            style=${{...S_BTN,flex:1,background:'none',borderRadius:0,padding:'.6rem',color:s.tab===t.id?'#e2e8f0':'#475569',borderBottom:s.tab===t.id?'2px solid #3b82f6':'2px solid transparent'}}>
            ${t.label}${t.n>0?html`<span style=${{marginLeft:'.3rem',background:t.bg,color:'#fff',fontSize:'.6rem',padding:'.05rem .35rem',borderRadius:99}}>${t.n}</span>`:''}
          </button>`})}
      </div>
      <div style=${{padding:'.4rem',borderBottom:'1px solid #1e293b',flexShrink:0,display:'flex',gap:'.3rem'}}>
        <input type="text" placeholder="Search…" value=${f.search} onInput=${function(e){d({t:'UPD_FILTERS',u:{search:e.target.value}})}}
          style=${{...S_INPUT,fontSize:'.7rem',padding:'.25rem .4rem',flex:1}} />
        <button onClick=${function(){setFiltersOpen(!filtersOpen)}}
          style=${{...S_BTN,padding:'.25rem .4rem',background:filtersOpen||activeCount>0?'#1e3a5f':'#1e293b',color:filtersOpen||activeCount>0?'#93c5fd':'#475569',border:'1px solid #334155',fontSize:'.65rem',whiteSpace:'nowrap'}}>
          ⚙ ${activeCount>0?activeCount:''}
        </button>
      </div>
      ${filtersOpen && html`<div style=${{padding:'.5rem',borderBottom:'1px solid #1e293b',flexShrink:0,display:'flex',flexDirection:'column',gap:'.4rem',background:'#0c1222'}}>
        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style=${{fontSize:'.65rem',fontWeight:600,color:'#64748b',textTransform:'uppercase',letterSpacing:'.05em'}}>Filters</span>
          <button onClick=${function(){d({t:'RESET_FILTERS'})}} style=${{...S_BTN,fontSize:'.55rem',padding:'.1rem .3rem',background:'none',color:'#475569',textDecoration:'underline'}}>Clear all</button>
        </div>

        <div>
          <span style=${FL}>Status</span>
          <div style=${{display:'flex',gap:'.2rem',flexWrap:'wrap'}}>
            ${['all','open','in_progress','resolved'].map(function(v){return html`<button key=${v} onClick=${function(){d({t:'UPD_FILTERS',u:{status:v}})}}
              style=${PILL(f.status===v)}>${v==='all'?'All':v==='in_progress'?'In prog':v.charAt(0).toUpperCase()+v.slice(1)}</button>`})}
          </div>
        </div>

        ${isClashTab && html`<div>
          <span style=${FL}>Type</span>
          <div style=${{display:'flex',gap:'.2rem'}}>
            ${['all','hard','soft'].map(function(v){return html`<button key=${v} onClick=${function(){d({t:'UPD_FILTERS',u:{type:v}})}}
              style=${PILL(f.type===v)}>${v==='all'?'All':v.charAt(0).toUpperCase()+v.slice(1)}</button>`})}
          </div>
        </div>`}

        ${isClashTab && html`<div>
          <span style=${FL}>Self / Cross-model</span>
          <div style=${{display:'flex',gap:'.2rem'}}>
            ${['all','self','cross'].map(function(v){return html`<button key=${v} onClick=${function(){d({t:'UPD_FILTERS',u:{selfClash:v}})}}
              style=${PILL(f.selfClash===v)}>${v==='all'?'All':v==='self'?'Self':'Cross'}</button>`})}
          </div>
        </div>`}

        ${isClashTab && html`<div>
          <span style=${FL}>Discipline</span>
          <select value=${f.discipline} onChange=${function(e){d({t:'UPD_FILTERS',u:{discipline:e.target.value}})}} style=${SELSTYLE}>
            <option value="all">All disciplines</option>
            ${DISC.map(function(p){return html`<option key=${p.id} value=${p.id}>${p.label}</option>`})}
          </select>
        </div>`}

        ${isClashTab && s.floors.length>0 && html`<div>
          <span style=${FL}>Floor / Level</span>
          <select value=${f.floor} onChange=${function(e){d({t:'UPD_FILTERS',u:{floor:e.target.value}})}} style=${SELSTYLE}>
            <option value="all">All levels</option>
            ${s.floors.map(function(fl){return html`<option key=${fl.id} value=${fl.id}>${fl.label}</option>`})}
          </select>
        </div>`}

        ${isClashTab && html`<div>
          <span style=${FL}>Distance (mm)</span>
          <div style=${{display:'flex',gap:'.3rem',alignItems:'center'}}>
            <input type="number" min="0" value=${f.distMin} onInput=${function(e){d({t:'UPD_FILTERS',u:{distMin:+e.target.value||0}})}}
              placeholder="Min" style=${{...S_INPUT,fontSize:'.65rem',padding:'.2rem .3rem',width:'50%'}} />
            <span style=${{fontSize:'.6rem',color:'#475569'}}>–</span>
            <input type="number" min="0" value=${f.distMax} onInput=${function(e){d({t:'UPD_FILTERS',u:{distMax:+e.target.value||9999}})}}
              placeholder="Max" style=${{...S_INPUT,fontSize:'.65rem',padding:'.2rem .3rem',width:'50%'}} />
          </div>
        </div>`}

        ${isClashTab && typeList.length>0 && html`<div>
          <span style=${FL}>Element Type</span>
          <select value=${f.ifcType} onChange=${function(e){d({t:'UPD_FILTERS',u:{ifcType:e.target.value}})}} style=${SELSTYLE}>
            <option value="all">All types</option>
            ${typeList.map(function(t){return html`<option key=${t} value=${t}>${t}</option>`})}
          </select>
        </div>`}

        ${isClashTab && storeyList.length>0 && html`<div>
          <span style=${FL}>Storey</span>
          <select value=${f.storey} onChange=${function(e){d({t:'UPD_FILTERS',u:{storey:e.target.value}})}} style=${SELSTYLE}>
            <option value="all">All storeys</option>
            ${storeyList.map(function(t){return html`<option key=${t} value=${t}>${t}</option>`})}
          </select>
        </div>`}

        ${isClashTab && materialList.length>0 && html`<div>
          <span style=${FL}>Material</span>
          <select value=${f.material} onChange=${function(e){d({t:'UPD_FILTERS',u:{material:e.target.value}})}} style=${SELSTYLE}>
            <option value="all">All materials</option>
            ${materialList.map(function(t){return html`<option key=${t} value=${t}>${t}</option>`})}
          </select>
        </div>`}

        ${isClashTab && html`<div>
          <span style=${FL}>Element ID</span>
          <input type="text" placeholder="e.g. 12345" value=${f.elementId} onInput=${function(e){d({t:'UPD_FILTERS',u:{elementId:e.target.value}})}}
            style=${{...S_INPUT,fontSize:'.65rem',padding:'.2rem .3rem'}} />
        </div>`}

        <div style=${{fontSize:'.6rem',color:'#334155',textAlign:'right'}}>${items.length} / ${rawItems.length} shown</div>
      </div>`}
      ${s.tab==='issues' && html`<div style=${{padding:'.4rem',borderBottom:'1px solid #1e293b',flexShrink:0}}>
        <button onClick=${function(){d({t:'MODAL',v:true})}} style=${{...S_BTN,width:'100%',background:'#2563eb',color:'#fff'}}>+ New Issue</button>
      </div>`}
      <div style=${{flex:1,overflowY:'auto'}}>
        ${items.length===0 && html`<div style=${{textAlign:'center',color:'#334155',fontSize:'.75rem',padding:'2.5rem 1rem'}}>
          <div style=${{fontSize:'2rem',marginBottom:'.3rem'}}>${isClashTab?'✅':'📋'}</div>
          ${activeCount>0||f.search?'No matches':'No '+(isClashTab?'clashes found yet':'issues yet')}
        </div>`}
        ${items.map(function(it){return html`<${IssueRow} key=${it.id} item=${it} active=${s.activeId===it.id} d=${d} isClash=${isClashTab} />`})}
      </div>
    </aside>`;
  }

  function PropBlock(props) {
    var p=props.p, label=props.label;
    if (!p) return null;
    var qKeys = p.quantities ? Object.keys(p.quantities) : [];
    var psetKeys = p.psets ? Object.keys(p.psets) : [];
    var LS={fontSize:'.55rem',color:'#64748b'};
    var VS={fontSize:'.55rem',color:'#cbd5e1'};
    var ROW={display:'flex',justifyContent:'space-between',padding:'.1rem 0'};
    return html`<div style=${{background:'#0f172a',borderRadius:4,padding:'.35rem',marginBottom:'.2rem'}}>
      <div style=${{fontSize:'.6rem',fontWeight:600,color:'#93c5fd',marginBottom:'.2rem'}}>${label}</div>
      ${p.ifcType && html`<div style=${ROW}><span style=${LS}>Type</span><span style=${VS}>${p.ifcType}</span></div>`}
      ${p.name && html`<div style=${ROW}><span style=${LS}>Name</span><span style=${VS}>${p.name}</span></div>`}
      ${p.objectType && html`<div style=${ROW}><span style=${LS}>Object Type</span><span style=${VS}>${p.objectType}</span></div>`}
      ${p.storey && html`<div style=${ROW}><span style=${LS}>Storey</span><span style=${VS}>${p.storey}</span></div>`}
      ${p.material && html`<div style=${ROW}><span style=${LS}>Material</span><span style=${VS}>${p.material}</span></div>`}
      <div style=${ROW}><span style=${LS}>Express ID</span><span style=${VS}>#${p.expressId}</span></div>
      ${qKeys.length>0 && html`<div style=${{marginTop:'.2rem',borderTop:'1px solid #1e293b',paddingTop:'.2rem'}}>
        <div style=${{fontSize:'.55rem',fontWeight:600,color:'#64748b',marginBottom:'.1rem'}}>Quantities</div>
        ${qKeys.map(function(k){return html`<div key=${k} style=${ROW}><span style=${LS}>${k}</span><span style=${VS}>${typeof p.quantities[k]==='number'?p.quantities[k].toFixed(3):p.quantities[k]}</span></div>`})}
      </div>`}
      ${psetKeys.map(function(setName){
        var ps=p.psets[setName]; var keys=Object.keys(ps);
        return html`<div key=${setName} style=${{marginTop:'.2rem',borderTop:'1px solid #1e293b',paddingTop:'.2rem'}}>
          <div style=${{fontSize:'.55rem',fontWeight:600,color:'#64748b',marginBottom:'.1rem'}}>${setName}</div>

        </div>`;
      })}
    </div>`;
  }

        <${PropBlock} p=${it.propsB} label=${'Element B: '+(it.elemBName||'#'+it.elemB)} />
      </div>`}
    </div>`;

  function IssueRow(props) {
    var it=props.item, active=props.active, d=props.d, isClash=props.isClash;
    var icon = it.type==='hard'?'🔴':it.type==='soft'?'🟡':it.source==='element'?'🏗':'📌';
    var stBg = (STAT[it.status]||STAT.open).bg;
    return html`<div onClick=${function(){d({t:'ACTIVE',id:active?null:it.id});if(!active&&it.point&&_flyTo)_flyTo(it.point);}}
      style=${{padding:'.6rem .7rem',borderBottom:'1px solid #1e293b',cursor:'pointer',background:active?'#1e293b':'transparent',borderLeft:active?'2px solid #3b82f6':'2px solid transparent'}}>
      <div style=${{display:'flex',gap:'.35rem',alignItems:'flex-start'}}>
        <span style=${{fontSize:'.85rem',flexShrink:0}}>${icon}</span>
        <div style=${{flex:1,minWidth:0}}>
          <div style=${{display:'flex',alignItems:'center',gap:'.3rem'}}>
            <span style=${{color:'#e2e8f0',fontSize:'.7rem',fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>${it.title}</span>
            <span style=${{width:7,height:7,borderRadius:'50%',background:stBg,flexShrink:0}}></span>
          </div>
          <p style=${{color:'#475569',fontSize:'.65rem',marginTop:'.1rem'}} class="lc2">${it.description}</p>
          ${it.distance!=null && html`<span style=${{fontSize:'.55rem',color:'#64748b',marginTop:'.1rem',display:'inline-block'}}>${it.distance} mm${it.selfClash?' · self':''}</span>`}
          ${!isClash && it.elementType && html`<div style=${{display:'flex',gap:'.2rem',marginTop:'.15rem',flexWrap:'wrap'}}>
            <span style=${{fontSize:'.5rem',background:'#1e3a5f',color:'#93c5fd',padding:'.05rem .25rem',borderRadius:3}}>${it.elementType}</span>
            ${it.storey && html`<span style=${{fontSize:'.5rem',background:'#1e293b',color:'#94a3b8',padding:'.05rem .25rem',borderRadius:3}}>${it.storey}</span>`}
          </div>`}
        </div>
      </div>
      ${active && html`<div style=${{marginTop:'.4rem',paddingTop:'.4rem',borderTop:'1px solid #334155'}}>
        <div style=${{display:'flex',gap:'.25rem',marginBottom:'.4rem',flexWrap:'wrap'}}>
          ${Object.keys(STAT).map(function(k){return html`<button key=${k}
            onClick=${function(e){e.stopPropagation();d({t:isClash?'UPD_CLASH':'UPD_ISSUE',id:it.id,u:{status:k}})}}
            style=${{...S_BTN,fontSize:'.6rem',padding:'.15rem .35rem',background:it.status===k?STAT[k].bg:'#1e293b',color:it.status===k?'#fff':'#475569'}}>${STAT[k].label}</button>`})}
        </div>
        ${(it.propsA||it.propsB) && html`<${ClashProps} item=${it} />`}
        ${!isClash && it.elementProps && html`<${PropBlock} p=${it.elementProps} label=${'Linked: '+(it.elementType||'')+' '+(it.elementName||'#'+it.elementId)} />`}
        ${!isClash && it.assignee && html`<div style=${{fontSize:'.55rem',color:'#94a3b8',marginTop:'.2rem'}}>Assigned: ${it.assignee}</div>`}
        ${!isClash && it.dueDate && html`<div style=${{fontSize:'.55rem',color:'#94a3b8'}}>Due: ${it.dueDate}</div>`}
        ${!isClash && it.category && html`<div style=${{fontSize:'.55rem',color:'#64748b'}}>Category: ${it.category}</div>`}
      </div>`}
    </div>`;
  }

  // ── Clash Bar ──────────────────────────────────────────────────

  function ClashBar(props) {
    var s=props.s, d=props.d, r=s.rules;
    function run() {
      if(s.models.length<2){alert('Load at least 2 IFC models first.');return;}
      d({t:'DETECTING'});
      setTimeout(function(){ d({t:'SET_CLASHES',v:detectClashes(s.models,s.rules)}); d({t:'TAB',v:'clashes'}); },20);
    }
    var canRun = !s.detecting && s.models.length>=2;
    return html`<div style=${{background:'#0f172a',borderTop:'1px solid #1e293b',padding:'.45rem 1rem',display:'flex',alignItems:'center',gap:'.6rem',flexShrink:0,flexWrap:'wrap'}}>
      <span style=${{fontSize:'.7rem',fontWeight:600,color:'#475569',textTransform:'uppercase',letterSpacing:'.05em',flexShrink:0}}>Clash Detection</span>
      <span style=${{fontSize:'.7rem',color:'#334155'}}>A:</span>
      <select value=${r.modelA} onChange=${function(e){d({t:'UPD_RULES',u:{modelA:e.target.value}})}}
        style=${{fontSize:'.7rem',padding:'.15rem .3rem',borderRadius:4,maxWidth:100}}>
        <option value="all">All</option>
        ${s.models.map(function(m){return html`<option key=${m.id} value=${m.id}>${m.name}</option>`})}
      </select>
      <span style=${{color:'#334155'}}>↔</span>
      <span style=${{fontSize:'.7rem',color:'#334155'}}>B:</span>
      <select value=${r.modelB} onChange=${function(e){d({t:'UPD_RULES',u:{modelB:e.target.value}})}}
        style=${{fontSize:'.7rem',padding:'.15rem .3rem',borderRadius:4,maxWidth:100}}>
        <option value="all">All</option>
        ${s.models.map(function(m){return html`<option key=${m.id} value=${m.id}>${m.name}</option>`})}
      </select>
      <label style=${{display:'flex',alignItems:'center',gap:'.2rem',cursor:'pointer'}}>
        <input type="checkbox" checked=${r.hard} onChange=${function(e){d({t:'UPD_RULES',u:{hard:e.target.checked}})}} />
        <span style=${{fontSize:'.7rem',color:'#94a3b8'}}>Hard</span>
      </label>
      <label style=${{display:'flex',alignItems:'center',gap:'.2rem',cursor:'pointer'}}>
        <input type="checkbox" checked=${r.soft} onChange=${function(e){d({t:'UPD_RULES',u:{soft:e.target.checked}})}} />
        <span style=${{fontSize:'.7rem',color:'#94a3b8'}}>Clearance</span>
      </label>
      ${r.soft && html`<div style=${{display:'flex',alignItems:'center',gap:'.3rem'}}>
        <input type="range" min="0" max="500" step="5" value=${r.clearance}
          onInput=${function(e){d({t:'UPD_RULES',u:{clearance:+e.target.value}})}} style=${{width:70}} />
        <span style=${{fontSize:'.7rem',color:'#475569',width:42}}>${r.clearance} mm</span>
      </div>`}
      <button onClick=${run} disabled=${!canRun}
        style=${{...S_BTN,marginLeft:'auto',background:canRun?'#2563eb':'#1e293b',color:canRun?'#fff':'#475569',cursor:canRun?'pointer':'not-allowed',fontWeight:600}}>
        ${s.detecting?html`<span class="spin">⟳</span> …`:'▶ Run'}
      </button>
    </div>`;
  }

  // ── New Issue Modal ────────────────────────────────────────────

  function NewIssueModal(props) {
    var d=props.d, el=props.el;
    var ep = el ? el.props||{} : null;
    var hasEl = !!el;
    var defaultTitle = hasEl ? ('Issue: '+(ep.ifcType||'Element')+' '+(ep.name||'#'+el.expressId)) : '';
    var defaultDesc = hasEl ? ('Model: '+el.modelName+'\nType: '+(ep.ifcType||'Unknown')+'\nName: '+(ep.name||'N/A')+'\nStorey: '+(ep.storey||'N/A')+'\nMaterial: '+(ep.material||'N/A')+'\nExpress ID: #'+el.expressId) : '';

    var f=useState({title:defaultTitle,desc:'',priority:'normal',category:'design',assignee:'',dueDate:''}), form=f[0], setForm=f[1];
    useEffect(function(){
      function onKey(e){if(e.key==='Escape')d({t:'MODAL',v:false});}
      window.addEventListener('keydown',onKey);
      return function(){window.removeEventListener('keydown',onKey);};
    },[]);
    function upd(k){return function(e){setForm(function(prev){var n=Object.assign({},prev);n[k]=e.target.value;return n;})}}
    function submit(e){
      e.preventDefault();
      var issue = {
        id:uid(), source:hasEl?'element':'manual', type:'manual', status:'open',
        title:form.title, description:form.desc, priority:form.priority,
        category:form.category, assignee:form.assignee||'',
        dueDate:form.dueDate||'', createdAt:new Date().toISOString()
      };
      if (hasEl) {
        issue.elementId = el.expressId;
        issue.modelName = el.modelName;
        issue.elementType = ep.ifcType||'';
        issue.elementName = ep.name||'';
        issue.storey = ep.storey||'';
        issue.material = ep.material||'';
        issue.elementProps = ep;
      }
      d({t:'ADD_ISSUE',v:issue});
      d({t:'MODAL',v:false}); d({t:'TAB',v:'issues'});
    }
    var MS={position:'fixed',inset:0,background:'rgba(0,0,0,.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:50};
    var MX={background:'#1e293b',border:'1px solid #334155',borderRadius:12,width:420,maxWidth:'95vw',maxHeight:'90vh',overflowY:'auto',boxShadow:'0 25px 50px rgba(0,0,0,.5)'};
    var LBL={fontSize:'.7rem',color:'#64748b',display:'block',marginBottom:'.2rem'};
    var ROW={display:'flex',justifyContent:'space-between',padding:'.1rem 0'};
    var LS={fontSize:'.6rem',color:'#64748b'}; var VS={fontSize:'.6rem',color:'#cbd5e1'};
    return html`<div style=${MS}><div style=${MX}>
      <div style=${{display:'flex',justifyContent:'space-between',padding:'.8rem 1rem',borderBottom:'1px solid #334155'}}>
        <span style=${{fontWeight:600,fontSize:'.875rem'}}>${hasEl?'New Element Issue':'New Issue'}</span>
        <button onClick=${function(){d({t:'MODAL',v:false})}} style=${{...S_BTN,background:'none',color:'#64748b',fontSize:'1.1rem',padding:0}}>✕</button>
      </div>
      ${hasEl && html`<div style=${{padding:'.6rem 1rem',borderBottom:'1px solid #334155',background:'#0f172a'}}>
        <div style=${{fontSize:'.65rem',fontWeight:600,color:'#93c5fd',marginBottom:'.3rem'}}>Linked Element</div>
        <div style=${{display:'flex',flexWrap:'wrap',gap:'.3rem'}}>
          ${ep.ifcType && html`<span style=${{fontSize:'.6rem',background:'#1e3a5f',color:'#93c5fd',padding:'.1rem .4rem',borderRadius:4}}>${ep.ifcType}</span>`}
          ${ep.name && html`<span style=${{fontSize:'.6rem',background:'#1e293b',color:'#e2e8f0',padding:'.1rem .4rem',borderRadius:4}}>${ep.name}</span>`}
          ${ep.storey && html`<span style=${{fontSize:'.6rem',background:'#1e293b',color:'#94a3b8',padding:'.1rem .4rem',borderRadius:4}}>${ep.storey}</span>`}
          ${ep.material && html`<span style=${{fontSize:'.6rem',background:'#1e293b',color:'#94a3b8',padding:'.1rem .4rem',borderRadius:4}}>${ep.material}</span>`}
        </div>
        <div style=${{fontSize:'.55rem',color:'#475569',marginTop:'.2rem'}}>${el.modelName} · #${el.expressId}</div>
      </div>`}
      <form onSubmit=${submit} style=${{padding:'1rem',display:'flex',flexDirection:'column',gap:'.5rem'}}>
        <div><label style=${LBL}>Title *</label>
          <input required value=${form.title} onInput=${upd('title')} placeholder="Short description of the issue" style=${S_INPUT} /></div>
        <div><label style=${LBL}>What is the issue? *</label>
          <textarea required value=${form.desc} onInput=${upd('desc')} rows="3" placeholder="Describe what the problem is and what needs to be resolved…" style=${{...S_INPUT,resize:'vertical'}} /></div>
        <div style=${{display:'flex',gap:'.5rem'}}>
          <div style=${{flex:1}}><label style=${LBL}>Priority</label>
            <select value=${form.priority} onChange=${upd('priority')} style=${S_INPUT}>
              <option value="critical">Critical</option><option value="high">High</option><option value="normal">Normal</option><option value="low">Low</option>
            </select></div>
          <div style=${{flex:1}}><label style=${LBL}>Category</label>
            <select value=${form.category} onChange=${upd('category')} style=${S_INPUT}>
              <option value="design">Design</option><option value="coordination">Coordination</option><option value="constructability">Constructability</option><option value="safety">Safety</option><option value="code_compliance">Code Compliance</option><option value="other">Other</option>
            </select></div>
        </div>
        <div style=${{display:'flex',gap:'.5rem'}}>
          <div style=${{flex:1}}><label style=${LBL}>Assigned to</label>
            <input value=${form.assignee} onInput=${upd('assignee')} placeholder="Name or team" style=${S_INPUT} /></div>
          <div style=${{flex:1}}><label style=${LBL}>Due date</label>
            <input type="date" value=${form.dueDate} onInput=${upd('dueDate')} style=${S_INPUT} /></div>
        </div>
        <div style=${{display:'flex',gap:'.4rem',paddingTop:'.3rem'}}>
          <button type="button" onClick=${function(){d({t:'MODAL',v:false})}} style=${{...S_BTN,flex:1,background:'#334155',color:'#e2e8f0'}}>Cancel</button>
          <button type="submit" style=${{...S_BTN,flex:1,background:'#2563eb',color:'#fff',fontWeight:600}}>Create Issue</button>
        </div>
      </form>
    </div></div>`;
  }

  // ── App ────────────────────────────────────────────────────────

  function App() {
    var st = useReducer(reducer, INIT), s=st[0], d=st[1];
    return html`<div style=${{height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <${Header} s=${s} d=${d} />
      <div style=${{display:'flex',flex:1,overflow:'hidden'}}>
        <${ModelSidebar} s=${s} d=${d} />
        <${Viewer} s=${s} d=${d} />
        <${IssuePanel} s=${s} d=${d} />
      </div>
      <${ClashBar} s=${s} d=${d} />
      ${s.showModal && html`<${NewIssueModal} d=${d} el=${s.modalElement} />`}
    </div>`;
  }

  // ── Mount ──────────────────────────────────────────────────────

  document.getElementById('boot').style.display = 'none';
  var rootEl = document.getElementById('root');
  var root = ReactDOM.createRoot ? ReactDOM.createRoot(rootEl) : null;
  if (root) { root.render(html`<${App} />`); }
  else { ReactDOM.render(html`<${App} />`, rootEl); }

} // end startApp
</script>
</body>
</html>
