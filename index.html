        props.description = safeStr(line.Description);
        props.objectType = safeStr(line.ObjectType);

  function extractStoreys(api, modelID) {
    // Build map: elementExpressID -> storeyName, plus storeyData with elevations
    var storeyMap = {};
    var storeyData = []; // [{name, elevation}]
    try {
      var storeyIds = api.GetLineIDsWithType(modelID, IFC.IFCBUILDINGSTOREY);
      var storeys = {};
      for (var i = 0; i < storeyIds.size(); i++) {
        var sid = storeyIds.get(i);
        try {
          var sl = api.GetLine(modelID, sid);
          var name = safeStr(sl.Name) || ('Storey #'+sid);
          storeys[sid] = name;
          // Extract elevation from IfcBuildingStorey

          if (sl.Elevation != null) {

          storeyData.push({name:name, elevation:Number(elev)||0, id:sid});

      var relIds = api.GetLineIDsWithType(modelID, IFC.IFCRELCONTAINEDINSPATIALSTRUCTURE);

          var constituent = api.GetLine(modelID, cid);
          if (constituent && constituent.Material) {
            var cmid = constituent.Material.value != null ? constituent.Material.value : constituent.Material;
            var cm = api.GetLine(modelID, cmid);
            if (cm && cm.Name) cNames.push(safeStr(cm.Name));
          }
        } catch(e) {}
      }
      if (cNames.length) return cNames.join(', ');
    }
    // IfcMaterialProfileSetUsage → ForProfileSet → MaterialProfiles
    if (mat.ForProfileSet || mat.MaterialProfiles) {
      var profSet = mat.ForProfileSet ? api.GetLine(modelID, mat.ForProfileSet.value != null ? mat.ForProfileSet.value : mat.ForProfileSet) : mat;
      if (profSet) {
        if (profSet.Name) return safeStr(profSet.Name);
        if (profSet.MaterialProfiles) {
          var pNames = [];
          for (var p = 0; p < profSet.MaterialProfiles.length; p++) {
            try {
              var pid = profSet.MaterialProfiles[p].value != null ? profSet.MaterialProfiles[p].value : profSet.MaterialProfiles[p];
              var profile = api.GetLine(modelID, pid);
              if (profile && profile.Material) {
                var pmid = profile.Material.value != null ? profile.Material.value : profile.Material;
                var pm = api.GetLine(modelID, pmid);
                if (pm && pm.Name) pNames.push(safeStr(pm.Name));
              }
            } catch(e) {}
          }
          if (pNames.length) return pNames.join(', ');
        }
      }
    }
    // IfcMaterialList → Materials
    if (mat.Materials) {
      var lNames = [];
      for (var l = 0; l < mat.Materials.length; l++) {
        try {
          var mlid = mat.Materials[l].value != null ? mat.Materials[l].value : mat.Materials[l];
          var ml = api.GetLine(modelID, mlid);
          if (ml && ml.Name) lNames.push(safeStr(ml.Name));
        } catch(e) {}
      }
      if (lNames.length) return lNames.join(', ');
    }
    return '';
  }

  function buildMaterialMap(api, modelID) {
    var matMap = {};
    try {
      var relIds = api.GetLineIDsWithType(modelID, IFC.IFCRELASSOCIATESMATERIAL);
      for (var i = 0; i < relIds.size(); i++) {
        try {
          var rel = api.GetLine(modelID, relIds.get(i));
          var matRef = rel.RelatingMaterial ? (rel.RelatingMaterial.value||rel.RelatingMaterial) : null;
          if (!matRef) continue;
          var mat = api.GetLine(modelID, matRef);
          var matName = resolveMaterialName(api, modelID, mat);
          if (!matName) continue;
          var objs = rel.RelatedObjects || [];
          for (var j = 0; j < objs.length; j++) {
            var oid = objs[j].value != null ? objs[j].value : objs[j];
            matMap[oid] = matName;
          }
        } catch(e) {}
      }
    } catch(e) {}
    return matMap;
  }

  // Pre-build property/quantity map: expressID -> {quantities, psets} (scans relations once)
  function buildPropertyMap(api, modelID) {
    var propMap = {}; // expressID -> {quantities:{}, psets:{}}
    try {
      var relIds = api.GetLineIDsWithType(modelID, IFC.IFCRELDEFINESBYPROPERTIES);
      for (var i = 0; i < relIds.size(); i++) {
        try {
          var rel = api.GetLine(modelID, relIds.get(i));
          var defId = rel.RelatingPropertyDefinition ? (rel.RelatingPropertyDefinition.value||rel.RelatingPropertyDefinition) : null;
          if (!defId) continue;
          var def = api.GetLine(modelID, defId);
          if (!def) continue;
          var setName = safeStr(def.Name) || 'Unknown';
          // Parse definition once
          var quantities = null, pset = null;
          if (def.Quantities) {
            quantities = {};
            for (var q = 0; q < def.Quantities.length; q++) {
              try {
                var qid = def.Quantities[q].value != null ? def.Quantities[q].value : def.Quantities[q];
                var ql = api.GetLine(modelID, qid);
                var qn = safeStr(ql.Name);
                var qv = ql.LengthValue||ql.AreaValue||ql.VolumeValue||ql.WeightValue||ql.CountValue;
                if (qn && qv != null) quantities[qn] = typeof qv === 'object' ? qv.value : qv;
              } catch(e) {}
            }
          }
          if (def.HasProperties) {
            pset = {};
            for (var p = 0; p < def.HasProperties.length; p++) {
              try {
                var pid = def.HasProperties[p].value != null ? def.HasProperties[p].value : def.HasProperties[p];
                var pl = api.GetLine(modelID, pid);
                var pn = safeStr(pl.Name);
                var pv = pl.NominalValue;
                if (pn && pv != null) pset[pn] = typeof pv === 'object' ? (pv.value != null ? pv.value : String(pv)) : pv;
              } catch(e) {}
            }
            if (!Object.keys(pset).length) pset = null;
          }
          // Assign to all related objects
          var objs = rel.RelatedObjects || [];
          for (var j = 0; j < objs.length; j++) {
            var oid = objs[j].value != null ? objs[j].value : objs[j];
            if (!propMap[oid]) propMap[oid] = {quantities:{}, psets:{}};
            if (quantities) Object.assign(propMap[oid].quantities, quantities);
            if (pset) propMap[oid].psets[setName] = pset;
          }
        } catch(e) {}
      }
    } catch(e) { console.warn('Property map build failed:', e.message||e); }
    return propMap;
  }

  // IFC type ID to human-readable name map
  var IFC_TYPE_NAMES = {};
  IFC_TYPE_NAMES[839292159] = 'IfcWall'; IFC_TYPE_NAMES[3512223829] = 'IfcWall';
  IFC_TYPE_NAMES[1529196076] = 'IfcSlab'; IFC_TYPE_NAMES[753842376] = 'IfcBeam';
  IFC_TYPE_NAMES[843113511] = 'IfcColumn'; IFC_TYPE_NAMES[395920057] = 'IfcDoor';
  IFC_TYPE_NAMES[3304561284] = 'IfcWindow'; IFC_TYPE_NAMES[2016517767] = 'IfcRoof';
  IFC_TYPE_NAMES[331165859] = 'IfcStair'; IFC_TYPE_NAMES[2262370178] = 'IfcRailing';
  IFC_TYPE_NAMES[263784265] = 'IfcFurnishingElement';
  IFC_TYPE_NAMES[987401354] = 'IfcFlowSegment'; IFC_TYPE_NAMES[2058353004] = 'IfcFlowTerminal';
  IFC_TYPE_NAMES[4278956645] = 'IfcFlowFitting'; IFC_TYPE_NAMES[3040386961] = 'IfcDistributionFlowElement';
  IFC_TYPE_NAMES[3612865200] = 'IfcPipeSegment'; IFC_TYPE_NAMES[3518393246] = 'IfcDuctSegment';
  IFC_TYPE_NAMES[1073191201] = 'IfcMember'; IFC_TYPE_NAMES[3171933400] = 'IfcPlate';
  IFC_TYPE_NAMES[900683007] = 'IfcFooting'; IFC_TYPE_NAMES[1687234759] = 'IfcPile';
  IFC_TYPE_NAMES[1973544240] = 'IfcCovering'; IFC_TYPE_NAMES[3856911033] = 'IfcSpace';

  function loadIFC(buffer, fallbackColor, onProgress) {
    var loadStart = performance.now();
    return getIfcAPI().then(function(api) {
      var modelID = api.OpenModel(new Uint8Array(buffer));

      if(onProgress) onProgress('Building property maps…');

      // Pre-build all lookup maps ONCE (O(relations) instead of O(elements*relations))
      var storeyResult = extractStoreys(api, modelID);
      var storeyMap = storeyResult.map;
      var storeyData = storeyResult.data;
      var matMap = buildMaterialMap(api, modelID);
      var propMap = buildPropertyMap(api, modelID);
      var allStoreys = {};
      Object.keys(storeyMap).forEach(function(k){ allStoreys[storeyMap[k]] = true; });

      if(onProgress) onProgress('Streaming geometry…');

      // Collect raw mesh data first (StreamAllMeshes is synchronous, can't chunk it)
      var rawElements = [];
      var meshes = [];
      api.StreamAllMeshes(modelID, function(ifcMesh) {
        var expressID = ifcMesh.expressID;
        var elMeshes = [], elBox = new THREE.Box3();
        for (var i = 0; i < ifcMesh.geometries.size(); i++) {
          var placed = ifcMesh.geometries.get(i);
          try {
            var gd = api.GetGeometry(modelID, placed.geometryExpressID);
            var verts = api.GetVertexArray(gd.GetVertexData(), gd.GetVertexDataSize());
            var indices = api.GetIndexArray(gd.GetIndexData(), gd.GetIndexDataSize());
            var pos = new Float32Array(verts.length/2), nrm = new Float32Array(verts.length/2);
            for (var j = 0; j < verts.length; j += 6) {
              var k = j/2;
              pos[k]=verts[j]; pos[k+1]=verts[j+1]; pos[k+2]=verts[j+2];
              nrm[k]=verts[j+3]; nrm[k+1]=verts[j+4]; nrm[k+2]=verts[j+5];
            }
            var geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('normal',   new THREE.BufferAttribute(nrm, 3));
            geo.setIndex(new THREE.BufferAttribute(indices, 1));
            var c = placed.color;
            var col = c ? new THREE.Color(c.x, c.y, c.z) : new THREE.Color(fallbackColor);
            var mat = new THREE.MeshPhongMaterial({ color:col, opacity:c?c.w:1, transparent:c?c.w<0.99:false, side:THREE.DoubleSide });
            var mesh = new THREE.Mesh(geo, mat);
            mesh.applyMatrix4(new THREE.Matrix4().fromArray(placed.flatTransformation));
            mesh.userData.expressID = expressID;
            elBox.expandByObject(mesh);
            elMeshes.push(mesh); meshes.push(mesh);
            gd.delete();
          } catch(e) { console.warn('Skipped element geometry #'+expressID+': '+(e.message||e)); }
        }
        if (elMeshes.length > 0) {
          rawElements.push({expressId:expressID, meshes:elMeshes, box:elBox.clone()});
        }
      });

      // Now enrich with properties using pre-built maps (fast lookups, no re-scanning)
      if(onProgress) onProgress('Enriching ' + rawElements.length + ' elements…');

      // Process properties in chunks to keep the UI responsive
      var elements = [];
      var CHUNK = 200;
      return new Promise(function(resolve) {
        function processChunk(startIdx) {
          var end = Math.min(startIdx + CHUNK, rawElements.length);
          for (var idx = startIdx; idx < end; idx++) {
            var raw = rawElements[idx];
            var props = extractProperties(api, modelID, raw.expressId);
            props.storey = storeyMap[raw.expressId] || '';
            props.material = matMap[raw.expressId] || '';
            if (props.typeId && IFC_TYPE_NAMES[props.typeId]) props.ifcType = IFC_TYPE_NAMES[props.typeId];
            // Use pre-built property map instead of scanning all relations
            var pm = propMap[raw.expressId];
            if (pm) {
              props.quantities = pm.quantities;
              props.psets = pm.psets;
            }
            elements.push({expressId:raw.expressId, meshes:raw.meshes, box:raw.box, props:props});
          }
          if (end < rawElements.length) {
            if(onProgress) onProgress('Processing elements ' + end + '/' + rawElements.length + '…');
            setTimeout(function(){ processChunk(end); }, 0);
          } else {
            api.CloseModel(modelID);
            var loadTime = Math.round(performance.now() - loadStart);
            resolve({ meshes:meshes, elements:elements, storeys:Object.keys(allStoreys).sort(), storeyData:storeyData, stats:{loadTime:loadTime, fileSize:buffer.byteLength, elementCount:elements.length, meshCount:meshes.length} });
          }
        }
        processChunk(0);
      });
    });
  }

  // ── Clash Detection ────────────────────────────────────────────

  function detectClashes(models, rules) {
    var pick = function(id) { return id === 'all' ? models : models.filter(function(m){return m.id===id}); };
    var grpA = pick(rules.modelA), grpB = pick(rules.modelB);
    var clashes = [], seen = {};
    grpA.forEach(function(mA) { grpB.forEach(function(mB) {
      var sameModel = mA.id === mB.id;
      var key = [mA.id, mB.id].sort().join('|');
      if (seen[key]) return; seen[key] = true;
      (mA.elements||[]).forEach(function(eA, iA) { (mB.elements||[]).forEach(function(eB, iB) {
        if (sameModel && iB <= iA) return;
        var bA = eA.box.clone(), bB = eB.box.clone();
        var isHard = bA.intersectsBox(bB);
        var isSoft = !isHard && rules.soft && bA.clone().expandByScalar(rules.clearance/1000).intersectsBox(bB);
        if ((isHard && rules.hard) || isSoft) {
          var ctr = new THREE.Vector3(); bA.getCenter(ctr);
          // Compute distance between bounding boxes (mm)
          var gx=Math.max(0,bB.min.x-bA.max.x,bA.min.x-bB.max.x);
          var gy=Math.max(0,bB.min.y-bA.max.y,bA.min.y-bB.max.y);
          var gz=Math.max(0,bB.min.z-bA.max.z,bA.min.z-bB.max.z);
          var dist=Math.round(Math.sqrt(gx*gx+gy*gy+gz*gz)*1000);
          var pA = eA.props||{}, pB = eB.props||{};
          var tA = pA.ifcType||'Element', tB = pB.ifcType||'Element';
          var nA = pA.name||('#'+eA.expressId), nB = pB.name||('#'+eB.expressId);
          clashes.push({
            id:uid(), source:'auto', type:isHard?'hard':'soft', status:'open',
            title:sameModel?mA.name+' (self)':mA.discipline.toUpperCase()+' \u2194 '+mB.discipline.toUpperCase(),
            description:tA+': '+nA+' ('+mA.name+') vs '+tB+': '+nB+' ('+mB.name+')',
            modelAId:mA.id, modelBId:mB.id, elemA:eA.expressId, elemB:eB.expressId,
            point:[ctr.x,ctr.y,ctr.z], createdAt:new Date().toISOString(),
            distance:dist, elevation:Math.round(ctr.y*1000)/1000,
            disciplines:[mA.discipline,mB.discipline], selfClash:sameModel,
            elemAType:tA, elemBType:tB, elemAName:nA, elemBName:nB,
            elemAStorey:pA.storey||'', elemBStorey:pB.storey||'',
            elemAMaterial:pA.material||'', elemBMaterial:pB.material||'',
            propsA:pA, propsB:pB
          });
        }
      }); });
    }); });
    return clashes;
  }

  function deriveFloors(clashes) {
    if (!clashes.length) return [];
    var ys = clashes.map(function(c){return c.elevation||0}).sort(function(a,b){return a-b});
    var tol = 0.5; // 500mm tolerance
    var floors = [], cur = {yMin:ys[0],yMax:ys[0],sum:ys[0],count:1};
    for (var i=1;i<ys.length;i++) {
      if (ys[i]-cur.yMax > tol) {
        cur.yMax = cur.sum/cur.count + tol/2;
        cur.yMin = cur.sum/cur.count - tol/2;
        floors.push(cur);
        cur = {yMin:ys[i],yMax:ys[i],sum:ys[i],count:1};
      } else {
        cur.yMax = ys[i]; cur.sum += ys[i]; cur.count++;
      }
    }
    floors.push(cur);
    return floors.map(function(f,idx){
      var avg = f.sum/f.count;
      return {id:'L'+idx, label:'Level '+(idx+1)+' ('+avg.toFixed(1)+'m)', yMin:f.yMin-0.25, yMax:f.yMax+0.25};
    });
  }

  // ── Save / Load Project ────────────────────────────────────────

  function saveProject(s) {
    // Serialise everything except Three.js mesh objects (not JSON-safe)
    var data = {
      _cc: 'ClashControl', _v: CC_VERSION.v,
      savedAt: new Date().toISOString(),
      rules: s.rules,
      models: s.models.map(function(m) {
        return { id:m.id, name:m.name, discipline:m.discipline, color:m.color, visible:m.visible };
      }),
      clashes: s.clashes,
      issues:  s.issues,
      floors:  s.floors,
      viewpoints: (s.viewpoints||[]).map(function(v){return Object.assign({},v,{snapshot:undefined})}),
      measurements: s.measurements||[],
    };
    var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'project-'+new Date().toISOString().slice(0,10)+'.ccproj';
    a.click();
  }

  function loadProject(d) {
    var inp = document.createElement('input');
    inp.type = 'file'; inp.accept = '.ccproj,application/json';
    inp.onchange = function(e) {
      var f = e.target.files[0]; if (!f) return;
      var r = new FileReader();
      r.onload = function(ev) {
        try {
          var data = JSON.parse(ev.target.result);
          if (!data._cc || data._cc !== 'ClashControl') throw new Error('Not a ClashControl project file.');
          // Restore models as stubs (geometry must be re-uploaded)
          data.models.forEach(function(m) {
            d({ t:'ADD_MODEL', v: Object.assign({}, m, { meshes:[], elements:[], _stub:true }) });
          });
          // Restore rules
          d({ t:'UPD_RULES', u: data.rules });
          // Restore clashes & issues
          if (data.clashes) d({ t:'SET_CLASHES', v: data.clashes });
          (data.issues||[]).forEach(function(i) { d({ t:'ADD_ISSUE', v:i }); });
          (data.viewpoints||[]).forEach(function(v) { d({ t:'ADD_VIEWPOINT', v:v }); });
          if (data.measurements) data.measurements.forEach(function(m) { d({ t:'ADD_MEASUREMENT', v:m }); });
        } catch(err) {
          alert('Load failed: ' + err.message);
        }
      };
      r.readAsText(f);
    };
    inp.click();
  }

  // (BCF export moved above with v2.1/3.0 support)

  // ── Auto-Classification ───────────────────────────────────────

  function classifyModels(models) {
    var byType = {}, byStorey = {}, byDiscipline = {}, byMaterial = {};
    models.forEach(function(model) {
      // By discipline
      var disc = model.discipline || 'other';
      if (!byDiscipline[disc]) byDiscipline[disc] = {label:disc, items:[], count:0};
      byDiscipline[disc].count += (model.elements||[]).length;
      (model.elements||[]).forEach(function(el) {
        var p = el.props || {};
        byDiscipline[disc].items.push({expressId:el.expressId, modelId:model.id});
        // By IFC type
        var t = p.ifcType || 'Unknown';
        if (!byType[t]) byType[t] = {label:t, items:[], count:0};
        byType[t].items.push({expressId:el.expressId, modelId:model.id});
        byType[t].count++;
        // By storey
        var st = p.storey || '(No storey)';
        if (!byStorey[st]) byStorey[st] = {label:st, items:[], count:0};
        byStorey[st].items.push({expressId:el.expressId, modelId:model.id});
        byStorey[st].count++;
        // By material
        var mt = p.material || '(No material)';
        if (!byMaterial[mt]) byMaterial[mt] = {label:mt, items:[], count:0};
        byMaterial[mt].items.push({expressId:el.expressId, modelId:model.id});
        byMaterial[mt].count++;
      });
    });
    return {byType:byType, byStorey:byStorey, byDiscipline:byDiscipline, byMaterial:byMaterial};
  }

  // ── Viewpoint helpers ────────────────────────────────────────

  var _captureViewpoint = null; // set in Viewer
  var _restoreViewpoint = null;

  // ── BCF Import ──────────────────────────────────────────────

  function importBCF(d) {
    var inp = document.createElement('input');
    inp.type = 'file'; inp.accept = '.bcf,.bcfzip';
    inp.onchange = function(e) {
      var f = e.target.files[0]; if (!f) return;
      f.arrayBuffer().then(function(buf) {
        return JSZip.loadAsync(buf);
      }).then(function(zip) {
        var promises = [];
        zip.forEach(function(path, entry) {
          if (path.match(/markup\.bcf$/i)) {
            promises.push(entry.async('text').then(function(xml) {
              return {folder: path.split('/')[0], xml: xml};
            }));
          }
        });
        return Promise.all(promises);
      }).then(function(markups) {
        var imported = 0;
        markups.forEach(function(m) {
          try {
            var parser = new DOMParser();
            var doc = parser.parseFromString(m.xml, 'text/xml');
            var topic = doc.querySelector('Topic');
            if (!topic) return;
            var title = (topic.querySelector('Title')||{}).textContent || 'Imported topic';
            var desc = (topic.querySelector('Description')||{}).textContent || '';
            var priority = (topic.querySelector('Priority')||{}).textContent || 'normal';
            var status = (topic.getAttribute('TopicStatus')||'').toLowerCase();
            var topicType = (topic.getAttribute('TopicType')||'').toLowerCase();
            var creationDate = (topic.querySelector('CreationDate')||{}).textContent || new Date().toISOString();
            // Map BCF status to our status
            var mappedStatus = 'open';
            if (status === 'closed' || status === 'resolved') mappedStatus = 'resolved';
            else if (status === 'in progress' || status === 'in_progress') mappedStatus = 'in_progress';
            // Map type
            var mappedType = 'manual';
            if (topicType === 'issue' || topicType === 'error') mappedType = 'hard';
            else if (topicType === 'warning') mappedType = 'soft';
            d({t:'ADD_ISSUE', v:{
              id:uid(), source:'bcf_import', type:mappedType, status:mappedStatus,
              title:title, description:desc, priority:priority.toLowerCase(),
              category:'coordination', assignee:'', dueDate:'',
              createdAt:creationDate, bcfGuid:topic.getAttribute('Guid')||''
            }});
            imported++;
          } catch(e) { console.warn('BCF parse error:', e); }
        });
        if (imported > 0) {
          d({t:'TAB', v:'issues'});
          alert('Imported ' + imported + ' topic' + (imported>1?'s':'') + ' from BCF.');
        } else {
          alert('No valid topics found in BCF file.');
        }
      }).catch(function(err) {
        alert('BCF import failed: ' + err.message);
      });
    };
    inp.click();
  }

  // ── BCF Export (supports v2.1 and v3.0) ──────────────────────

  function exportBCF(items, version, viewpoints) {
    if (!items.length) return;
    var v3 = version === '3.0';
    var zip = new JSZip();
    var versionId = v3 ? '3.0' : '2.1';
    // bcf.version with proper xmlns for Solibri/BIMcollab compatibility
    var versionXmlns = v3 ? 'http://www.buildingsmart-tech.org/bcf/version/3.0' : 'http://www.buildingsmart-tech.org/bcf/version/2.1';
    zip.file('bcf.version','<?xml version="1.0" encoding="UTF-8"?>\n<Version VersionId="'+versionId+'" xmlns="'+versionXmlns+'"><DetailedVersion>'+versionId+'</DetailedVersion></Version>');

    if (v3) {
      zip.file('extensions.xml', '<?xml version="1.0" encoding="UTF-8"?>\n<Extensions xmlns="http://www.buildingsmart-tech.org/bcf/extensions/3.0"><TopicTypes><TopicType>Issue</TopicType><TopicType>Warning</TopicType><TopicType>Request</TopicType></TopicTypes><TopicStatuses><TopicStatus>Open</TopicStatus><TopicStatus>In Progress</TopicStatus><TopicStatus>Closed</TopicStatus></TopicStatuses><Priorities><Priority>Critical</Priority><Priority>High</Priority><Priority>Normal</Priority><Priority>Low</Priority></Priorities></Extensions>');
      zip.file('project.bcfp','<?xml version="1.0" encoding="UTF-8"?>\n<ProjectInfo xmlns="http://www.buildingsmart-tech.org/bcf/project/3.0"><Project ProjectId="'+guid()+'"><Name>ClashControl</Name></Project></ProjectInfo>');
    } else {
      zip.file('project.bcfp','<?xml version="1.0" encoding="UTF-8"?>\n<ProjectExtension xmlns="http://www.buildingsmart-tech.org/bcf/project/2.1"><Project ProjectId="'+guid()+'"><Name>ClashControl</Name></Project><ExtensionSchema/></ProjectExtension>');
    }

    items.forEach(function(it) {
      var g = it.bcfGuid || guid(), f = zip.folder(g);
      var type = it.type==='hard'?'Issue':it.type==='soft'?'Warning':'Request';
      var st = it.status==='resolved'||it.status==='closed'?'Closed':it.status==='in_progress'?'In Progress':'Open';
      var priority = it.priority || (it.type==='hard'?'Critical':'Normal');
      priority = priority.charAt(0).toUpperCase() + priority.slice(1);

      // Find matching viewpoint for this item
      var vp = null;
      if (viewpoints) {
        vp = viewpoints.find(function(v){ return v.linkedId === it.id; });
      }
      var vpGuid = vp ? guid() : null;

  // ── Orbit Controls (inline) ────────────────────────────────────

  // Global flag: set true when dragging section box handles to suppress orbit
  var _sboxDragging = false;
  // Render-on-demand: only render when something changes
  var _needsRender = 2; // start with a couple frames to initialize
  function invalidate(frames) { _needsRender = Math.max(_needsRender, frames||2); }

  function makeOrbit(camera, el) {
    var target = new THREE.Vector3();
    var sph = { r:60, phi:Math.PI/4, theta:Math.PI/4 };
    var dragging=false, panning=false, lx=0, ly=0;

    function sync() {
      var o = camera.position.clone().sub(target);
      sph.r = o.length()||60;
      sph.phi = Math.acos(Math.max(-1,Math.min(1,o.y/sph.r)));
      sph.theta = Math.atan2(o.x,o.z);
    }
    function apply() {
      sph.phi = Math.max(0.05, Math.min(Math.PI-0.05, sph.phi));
      sph.r   = Math.max(0.5, Math.min(5000, sph.r));
      camera.position.set(
        target.x + sph.r*Math.sin(sph.phi)*Math.sin(sph.theta),
        target.y + sph.r*Math.cos(sph.phi),
        target.z + sph.r*Math.sin(sph.phi)*Math.cos(sph.theta));
      camera.lookAt(target);
    }
    sync();

    el.addEventListener('mousedown', function(e) {
      if(_sboxDragging) return; // don't orbit while dragging section box handles
      if (e.button===0) dragging=true;
      if (e.button===2) panning=true;
      lx=e.clientX; ly=e.clientY; e.preventDefault();
    });
    el.addEventListener('contextmenu', function(e){e.preventDefault()});
    window.addEventListener('mousemove', function(e) {
      if(!dragging&&!panning) return;
      var dx=e.clientX-lx, dy=e.clientY-ly; lx=e.clientX; ly=e.clientY;
      if(dragging){ sph.theta-=dx*0.007; sph.phi-=dy*0.007; apply(); invalidate(); }
      if(panning){
        var sp=sph.r*0.0008;
        var right=new THREE.Vector3().crossVectors(camera.getWorldDirection(new THREE.Vector3()),new THREE.Vector3(0,1,0)).normalize();
        target.addScaledVector(right,-dx*sp); target.y+=dy*sp; apply(); invalidate();
      }
    });
    window.addEventListener('mouseup', function(){dragging=false;panning=false});
    el.addEventListener('wheel', function(e){
      // Ctrl+scroll adjusts floor plan cut height
      if(e.ctrlKey && window._ccFloorPlanActive && window._ccDispatch){
        e.preventDefault();
        var fp = window._ccCurrentFloorPlan;
        if(fp){
          var delta = e.deltaY > 0 ? -0.15 : 0.15;
          var newElev = fp.elevation + delta;
          window._ccDispatch({t:'FLOOR_PLAN',v:Object.assign({},fp,{elevation:newElev})});
        }
        return;
      }
      // Ctrl+scroll adjusts section plane position
      if(e.ctrlKey && window._ccDispatch){
        var cs = window._ccCurrentSection;
        if(cs && cs.axis){
          e.preventDefault();
          var delta2 = e.deltaY > 0 ? -0.02 : 0.02;
          var newPos = Math.max(0, Math.min(1, cs.pos + delta2));
          window._ccDispatch({t:'SECTION',axis:cs.axis,pos:newPos});
          return;
        }
        if(cs && cs.custom){
          e.preventDefault();
          var delta3 = e.deltaY > 0 ? -0.02 : 0.02;
          var newPos2 = Math.max(0, Math.min(1, cs.pos + delta3));
          window._ccDispatch({t:'SECTION_CUSTOM',v:cs.custom,pos:newPos2});
          return;
        }
      }
      sph.r*=1+e.deltaY*0.0008;apply();invalidate();e.preventDefault();
    },{passive:false});
    return {target:target, sync:sync, apply:apply, sph:sph};
  }

  // ── Three.js Viewer Component ──────────────────────────────────

  var _flyTo = null;
  var _resetView = null;
  var _highlightById = null;

  var _flyToElements = null;
  var _showClashMarkers = null;
  var _clearClashMarkers = null;
  var _findAndHighlightElements = null;
  var _clearFoundElements = null;
  var _ghostOthers = null;
  var _unghostAll = null;

  function Viewer(props) {
    var s = props.s, d = props.d;

    var se = useState(null), selectedEl=se[0], setSelectedEl=se[1];
    var cm = useState(null), ctxMenu=cm[0], setCtxMenu=cm[1];
    var hlRef = useRef(null); // highlighted mesh outline
    var outlineRef = useRef(null); // outliner mesh
    var hoverRef = useRef(null); // hover highlight mesh
    var clashMarkersRef = useRef(null); // group of clash markers
    var foundMarkersRef = useRef([]); // items finder highlights
    var measureObjsRef = useRef([]); // measurement 3D objects
    var measurePtsRef = useRef([]); // current measurement click points
    var modelsRef = useRef(s.models);
    modelsRef.current = s.models;
    var prefsRef = useRef(s.prefs);
    prefsRef.current = s.prefs;
    var measureModeRef = useRef(s.measureMode);
    measureModeRef.current = s.measureMode;

    // Init scene
    useEffect(function() {
      var el = ref.current; if(!el) return;
      var S = state3d.current;

      var scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0f172a);
      S.scene = scene;

      var camera = new THREE.PerspectiveCamera(55, el.clientWidth/el.clientHeight, 0.01, 10000);
      camera.position.set(30,25,30);
      camera.lookAt(0,0,0);
      S.camera = camera;

      var renderer = new THREE.WebGLRenderer({antialias:true});
      renderer.setPixelRatio(Math.min(devicePixelRatio,2));

      S.orbit = makeOrbit(camera, renderer.domElement);

      // ── Animated fly-to system ─────────────────────────────────────
      var _flyAnim = null;
      function easeInOut(t){return t<0.5?4*t*t*t:(1-Math.pow(-2*t+2,3)/2);}
      // Compute animation duration based on travel distance: short moves are snappy, long moves get time to breathe
      function flyDuration(startTarget, endTarget, startPos, endPos) {
        var targetDist = startTarget.distanceTo(endTarget);
        var camDist = startPos.distanceTo(endPos);

        var startPos = S.camera.position.clone();

          S.camera.position.lerpVectors(startPos,endPos,e);

      _flyTo = function(pt, dist, hint) {

        // Camera offset from current orbit target
        var offset = S.camera.position.clone().sub(curTarget);
        if(offset.length() < 0.01) offset.set(0.6, 0.4, 0.6);
        var curDist = offset.length();

        // Smart transition: preserve camera angle when moving to nearby targets.
        // Works for vertical (level switching), horizontal (adjacent elements),
        // and zoom-only (same area, different scale) transitions.

      // Fly to a specific view (used by view cube)
      window._ccFlyToView = function(target, pos) {

      // Reset view: fit camera to all loaded geometry
      _resetView = function() {
        if(!S.mg||S.mg.children.length===0){

      S._ghostMat = _ghostMat;

      // ── Clash Markers ──
      _showClashMarkers = function(clashes) {

        var grp = new THREE.Group();
        grp.name = 'clashMarkers';
        var hardMat = new THREE.MeshBasicMaterial({color:0xef4444, transparent:true, opacity:0.85});
        var softMat = new THREE.MeshBasicMaterial({color:0xf59e0b, transparent:true, opacity:0.85});
        var pinGeo = new THREE.SphereGeometry(0.15, 12, 12);
        var ringGeo = new THREE.RingGeometry(0.25, 0.4, 24);
        var ringMat = new THREE.MeshBasicMaterial({color:0xffffff, transparent:true, opacity:0.4, side:THREE.DoubleSide});
        clashes.forEach(function(c){
          if(!c.point||c.point.length<3) return;

      _clearClashMarkers = function() {

      // ── BoundingBoxer: Fit camera to all clashes or a specific element ──
      _fitToClashes = function(clashes) {

      _fitToElement = function(expressId, hint) {
        if(!expressId||!S.mg||!S.orbit) return;

        if(wasHidden && found.userData._frustumCulled) found.visible = false;

      };

      // Fly to element(s) — auto-detects vertical shift vs full reframe
      _flyToElements = function(expressIds, fallbackPt) {
        if(!S.mg||!S.orbit) return;

          if(fallbackPt) _flyTo(fallbackPt);

        }
        var box = new THREE.Box3();
        var foundAny = false;
        var hiddenMeshes = [];
        expressIds.forEach(function(eid){
          S.mg.traverse(function(obj){
            if(obj.isMesh && obj.userData.expressID===eid){
              if(!obj.visible && obj.userData._frustumCulled){obj.visible=true;hiddenMeshes.push(obj);}

            }

        hiddenMeshes.forEach(function(m){m.visible=false;});
        if(!foundAny){
          if(fallbackPt) _flyTo(fallbackPt);
          return;
        }
        var ctr = box.getCenter(new THREE.Vector3());

  // ── View Cube ────────────────────────────────────────────────
  function ViewCube(props) {
    var state3d = props.state3d;
    var canvasRef = useRef(null);
    var cubeSceneRef = useRef(null);
    useEffect(function(){
      var canvas = canvasRef.current; if(!canvas) return;
      var cubeScene = new THREE.Scene();
      var cubeCamera = new THREE.OrthographicCamera(-1.8,1.8,-1.8,1.8,0.1,10);
      cubeCamera.position.set(0,0,5);
      cubeCamera.lookAt(0,0,0);
      var cubeRenderer = new THREE.WebGLRenderer({canvas:canvas,alpha:true,antialias:true});
      cubeRenderer.setSize(120,120);
      cubeRenderer.setPixelRatio(Math.min(devicePixelRatio,2));
      cubeRenderer.setClearColor(0x000000,0);
      // Build cube with face labels
      var faces=[
        {label:'Front',color:0x334155,pos:[0,0,0.5],rot:[0,0,0],dir:[0,0,1]},
        {label:'Back',color:0x334155,pos:[0,0,-0.5],rot:[0,Math.PI,0],dir:[0,0,-1]},
        {label:'Right',color:0x374151,pos:[0.5,0,0],rot:[0,Math.PI/2,0],dir:[1,0,0]},
        {label:'Left',color:0x374151,pos:[-0.5,0,0],rot:[0,-Math.PI/2,0],dir:[-1,0,0]},
        {label:'Top',color:0x1e3a5f,pos:[0,0.5,0],rot:[-Math.PI/2,0,0],dir:[0,1,0]},
        {label:'Bottom',color:0x1e293b,pos:[0,-0.5,0],rot:[Math.PI/2,0,0],dir:[0,-1,0]}
      ];
      var cubeGroup = new THREE.Group();
      faces.forEach(function(f){
        // Create face plane with text
        var c2d = document.createElement('canvas');
        c2d.width=128;c2d.height=128;
        var ctx=c2d.getContext('2d');
        ctx.fillStyle='#'+f.color.toString(16).padStart(6,'0');
        ctx.fillRect(0,0,128,128);
        ctx.strokeStyle='#475569';ctx.lineWidth=2;ctx.strokeRect(1,1,126,126);
        ctx.fillStyle='#94a3b8';ctx.font='bold 22px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(f.label,64,64);
        var tex=new THREE.CanvasTexture(c2d);
        var mat=new THREE.MeshBasicMaterial({map:tex,transparent:true,opacity:0.9});
        var geo=new THREE.PlaneGeometry(0.98,0.98);
        var mesh=new THREE.Mesh(geo,mat);
        mesh.position.set(f.pos[0],f.pos[1],f.pos[2]);
        mesh.rotation.set(f.rot[0],f.rot[1],f.rot[2]);
        mesh.userData._cubeDir=f.dir;
        mesh.userData._cubeLabel=f.label;
        cubeGroup.add(mesh);
      });
      cubeScene.add(cubeGroup);
      cubeScene.add(new THREE.AmbientLight(0xffffff,1));
      cubeSceneRef.current = {scene:cubeScene,camera:cubeCamera,renderer:cubeRenderer,group:cubeGroup};
      // Click handler for cube faces
      var cubeRay = new THREE.Raycaster();
      var cubeMouse = new THREE.Vector2();
      canvas.addEventListener('click', function(e){
        var S=state3d.current; if(!S||!S.orbit||!S.mg) return;
        var rect=canvas.getBoundingClientRect();
        cubeMouse.x=((e.clientX-rect.left)/rect.width)*2-1;
        cubeMouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
        cubeRay.setFromCamera(cubeMouse,cubeCamera);
        var hits=cubeRay.intersectObjects(cubeGroup.children,false);
        if(hits.length>0){
          var dir=hits[0].object.userData._cubeDir;
          if(dir){
            // Fly to that view direction
            var modelBox=S.mg.children.length>0?new THREE.Box3().setFromObject(S.mg):new THREE.Box3(new THREE.Vector3(-5,-5,-5),new THREE.Vector3(5,5,5));
            var ctr=modelBox.getCenter(new THREE.Vector3());
            var sz=modelBox.getSize(new THREE.Vector3());
            var dist=Math.max(sz.x,sz.y,sz.z)*1.5;
            // For top/bottom add slight angle
            var viewDir=new THREE.Vector3(dir[0],dir[1],dir[2]);
            if(Math.abs(viewDir.y)>0.9) viewDir.set(0.3,viewDir.y>0?0.85:-0.85,0.3).normalize();
            var endPos=ctr.clone().addScaledVector(viewDir,dist);
            // Animated fly
            if(window._ccFlyToView) window._ccFlyToView(ctr,endPos);
          }
        }
      });
      // Render loop sync
      var cubeRAF;
      function renderCube(){
        cubeRAF=requestAnimationFrame(renderCube);
        if(_needsRender <= 0) return; // only render when main scene renders
        var S=state3d.current;
        if(!S||!S.camera||!S.orbit) return;
        cubeGroup.quaternion.copy(S.camera.quaternion).invert();
        cubeRenderer.render(cubeScene,cubeCamera);
      }
      renderCube();
      return function(){cancelAnimationFrame(cubeRAF);cubeRenderer.dispose();};
    },[]);
    return html`<div style=${{position:'absolute',top:'.5rem',right:'.5rem',pointerEvents:'auto',cursor:'pointer',borderRadius:8,overflow:'hidden'}}>
      <canvas ref=${canvasRef} width="120" height="120" style=${{display:'block',borderRadius:8}} />
    </div>`;
  }

  // Auto-detect discipline from IFC types
  function detectDiscipline(elements) {
    var mepTypes = {'IfcFlowSegment':1,'IfcFlowTerminal':1,'IfcFlowFitting':1,'IfcDistributionFlowElement':1,'IfcPipeSegment':1,'IfcDuctSegment':1};
    var structTypes = {'IfcBeam':1,'IfcColumn':1,'IfcFooting':1,'IfcPile':1,'IfcMember':1,'IfcPlate':1};
    var mepCount=0, structCount=0, archCount=0;
    (elements||[]).forEach(function(el){
      var t=(el.props&&el.props.ifcType)||'';
      if(mepTypes[t]) mepCount++; else if(structTypes[t]) structCount++; else archCount++;
    });
    if(mepCount>structCount&&mepCount>archCount) return 'mep';
    if(structCount>archCount) return 'structural';
    return 'architectural';
  }

  function ModelSidebar(props) {
    var s=props.s, d=props.d;
    var fileRef = useRef(null);
    var ld = useState(false), loading=ld[0], setLoading=ld[1];
    var lm = useState(''), loadMsg=lm[0], setLoadMsg=lm[1];
    var er = useState(''), err=er[0], setErr=er[1];
    var dg = useState(false), dragging=dg[0], setDragging=dg[1];

    function processFiles(files) {
      setErr('');
      var chain = Promise.resolve();
      files.forEach(function(f) {
        if (!f.name.toLowerCase().match(/\.ifc$/)) return;
        chain = chain.then(function() {
          setLoading(true);
          setLoadMsg('Reading ' + f.name + '…');
          return f.arrayBuffer().then(function(buf) {
            var disc='structural', col=DISC[0].c;
            return loadIFC(buf, col, function(msg){ setLoadMsg(f.name + ': ' + msg); }).then(function(result) {
              // Auto-detect discipline
              disc = detectDiscipline(result.elements);
              var dObj = DISC.find(function(x){return x.id===disc;});
              col = dObj ? dObj.c : col;
              var fSize = result.stats ? result.stats.fileSize : buf.byteLength;
              d({t:'ADD_MODEL', v:{id:uid(), name:f.name.replace(/\.ifc$/i,''), discipline:disc, color:col, visible:true, meshes:result.meshes, elements:result.elements, storeys:result.storeys||[], storeyData:result.storeyData||[], stats:result.stats||{fileSize:fSize}}});
            });
          }).catch(function(er) {
            console.error(er);
            setErr(er.message||'Load failed');
          }).then(function(){ setLoading(false); setLoadMsg(''); });
        });
      });
    }
    function onFiles(e) {
      processFiles(Array.prototype.slice.call(e.target.files||[]));
      e.target.value='';
    }
    function onDrop(e) {
      e.preventDefault(); e.stopPropagation(); setDragging(false);
      var files = Array.prototype.slice.call(e.dataTransfer.files||[]);
      if(files.length) processFiles(files);
    }
    function onDragOver(e){e.preventDefault();e.stopPropagation();setDragging(true);}
    function onDragLeave(e){e.preventDefault();e.stopPropagation();setDragging(false);}

    var splitSt = useState(50), splitPct=splitSt[0], setSplitPct=splitSt[1];
    var splitDrag = useRef(null);
    function onSplitDown(e){
      e.preventDefault();
      splitDrag.current={startY:e.clientY,startPct:splitPct};

        if(!splitDrag.current) return;
        var dy=ev.clientY-splitDrag.current.startY;
        var aside=ev.target.closest?ev.target.closest('aside'):null;
        var h=aside?aside.offsetHeight:500;
        var newPct=splitDrag.current.startPct+(dy/h)*100;
        setSplitPct(Math.max(15,Math.min(85,newPct)));
      }
      function onUp(){splitDrag.current=null;window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);}
      window.addEventListener('mousemove',onMove);
      window.addEventListener('mouseup',onUp);
    }
    return html`<aside style=${{...S_PANEL,width:240}} onDrop=${onDrop} onDragOver=${onDragOver} onDragLeave=${onDragLeave}>
      <div style=${{padding:'.75rem',borderBottom:'1px solid #1e293b',flexShrink:0}}>

          <span style=${{fontSize:'.7rem',fontWeight:600,color:'#64748b',textTransform:'uppercase',letterSpacing:'.05em'}}>Models</span>
          <span style=${{fontSize:'.7rem',color:'#334155'}}>${s.models.length} loaded</span>
        </div>

        <button onClick=${function(){setErr('');fileRef.current&&fileRef.current.click()}} disabled=${loading}
          style=${{...S_BTN,width:'100%',background:dragging?'#1e3a5f':'#1e293b',color:dragging?'#93c5fd':'#94a3b8',border:dragging?'2px dashed #3b82f6':'1px dashed #334155',display:'flex',alignItems:'center',justifyContent:'center',gap:'.3rem',transition:'all .15s'}}>

        </button>
        ${err && html`<div style=${{marginTop:'.4rem',padding:'.4rem',background:'#450a0a',border:'1px solid #7f1d1d',borderRadius:6,fontSize:'.7rem',color:'#fca5a5',whiteSpace:'pre-line'}}>${err}</div>`}
      </div>
      <div style=${{flex:splitPct,overflowY:'auto',padding:'.4rem',display:'flex',flexDirection:'column',gap:'.25rem',minHeight:0}}>
        ${s.models.length===0 && html`<div style=${{textAlign:'center',color:'#334155',fontSize:'.75rem',padding:'2rem 0'}}><div style=${{fontSize:'2rem',marginBottom:'.3rem'}}>📁</div>No models loaded</div>`}
        ${s.models.map(function(m){return html`<${ModelCard} key=${m.id} m=${m} d=${d} />`})}
      </div>
      <div onMouseDown=${onSplitDown}
        style=${{height:6,flexShrink:0,cursor:'row-resize',background:'#1e293b',borderTop:'1px solid #334155',borderBottom:'1px solid #334155',display:'flex',alignItems:'center',justifyContent:'center'}}>

  function ExplorerPanel(props) {
    var s=props.s, d=props.d;
    var vm = useState('tree'), viewMode=vm[0], setViewMode=vm[1];
    var sq = useState(''), treeSearch=sq[0], setTreeSearch=sq[1];
    var ex = useState({}), expanded=ex[0], setExpanded=ex[1];
    function toggle(key){setExpanded(function(prev){var n=Object.assign({},prev);if(n[key])delete n[key];else n[key]=true;return n;});}
    function expandAll(){
      var all={};
      s.models.forEach(function(m){
        all['m_'+m.id]=true;
        (m.storeys||[]).forEach(function(st){all['s_'+m.id+'_'+st]=true;});
      });
      setExpanded(all);
    }
    // Auto-classify
    var cls = s.classifications;
    var lastClassifyRef = useRef('');
    useEffect(function(){
      if(s.models.length===0) return;
      var sig = s.models.map(function(m){return m.id+':'+(m.elements?m.elements.length:0)}).join(',');
      if(sig===lastClassifyRef.current) return;
      lastClassifyRef.current = sig;
      d({t:'SET_CLASSIFICATIONS',v:classifyModels(s.models)});
    }, [s.models]);
    var hasCls = cls && Object.keys(cls).length>0;
    var classView = viewMode!=='tree' ? viewMode : null;
    var groups = classView && hasCls ? cls[classView] || {} : {};
    var keys = classView ? Object.keys(groups).sort(function(a,b){return (groups[b].count||0)-(groups[a].count||0)}) : [];
    var total = keys.reduce(function(sum,k){return sum+(groups[k].count||0)},0);
    var hiddenCount = classView ? keys.filter(function(k){return s.hiddenClasses[classView+':'+k]}).length : 0;
    var CLASS_COLORS = ['#60a5fa','#f87171','#34d399','#fbbf24','#c084fc','#fb923c','#22d3ee','#e879f9','#a3e635','#f472b6','#38bdf8','#facc15','#4ade80','#f97316','#818cf8'];

    return html`<div style=${{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style=${{padding:'.4rem',borderBottom:'1px solid #1e293b',flexShrink:0}}>

          ${VIEWS.map(function(v){return html`<button key=${v.id} onClick=${function(){setViewMode(v.id)}}
            style=${{...S_BTN,fontSize:'.65rem',padding:'.2rem .4rem',background:viewMode===v.id?'#2563eb':'#1e293b',color:viewMode===v.id?'#fff':'#94a3b8'}}>${v.label}</button>`})}
        </div>
        ${viewMode==='tree' && html`<div>
          <input type="text" placeholder="Search elements…" value=${treeSearch}
            onInput=${function(e){setTreeSearch(e.target.value);}}
            style=${{...S_INPUT,fontSize:'.65rem',padding:'.2rem .4rem',marginBottom:'.3rem'}} />
          <div style=${{display:'flex',gap:'.2rem'}}>
            <button onClick=${expandAll} style=${{...S_BTN,fontSize:'.65rem',padding:'.15rem .4rem',background:'#0f172a',color:'#94a3b8'}}>Expand all</button>
            <button onClick=${function(){setExpanded({});}} style=${{...S_BTN,fontSize:'.65rem',padding:'.15rem .4rem',background:'#0f172a',color:'#94a3b8'}}>Collapse all</button>
          </div>
        </div>`}
        ${classView && total>0 && html`<div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:'.15rem'}}>
          <div style=${{display:'flex',alignItems:'center',gap:'.3rem'}}>
            <span onClick=${function(){if(hiddenCount>0){d({t:'SHOW_ALL_CLASSES'})}else{d({t:'HIDE_ALL_CLASSES',view:classView})}}}
              style=${{width:12,height:12,borderRadius:2,border:'2px solid '+(hiddenCount===0?'#3b82f6':hiddenCount<keys.length?'#64748b':'#475569'),background:hiddenCount===0?'#3b82f6':hiddenCount<keys.length?'#334155':'transparent',cursor:'pointer',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}

            <span style=${{fontSize:'.55rem',color:'#475569'}}>${keys.length} groups · ${total} elements</span>
          </div>
          <div style=${{display:'flex',gap:'.2rem'}}>
            <button onClick=${function(){d({t:'COLOR_BY_CLASS',v:classView})}}
              style=${{...S_BTN,fontSize:'.5rem',padding:'.1rem .3rem',background:s.colorByClass===classView?'#7c3aed':'#1e293b',color:s.colorByClass===classView?'#fff':'#475569'}}

        ${classView && hiddenCount>0 && html`<div style=${{fontSize:'.5rem',color:'#f59e0b',marginTop:'.15rem'}}>${hiddenCount} group${hiddenCount>1?'s':''} hidden</div>`}

      ${!isExplorerTab && html`<${VirtualList} items=${items} activeId=${s.activeId} d=${d} isClash=${isClashTab} prefs=${s.prefs} />`}

  function PropBlock(props) {
    var p=props.p, label=props.label;
    if (!p) return null;
    var qKeys = p.quantities ? Object.keys(p.quantities) : [];
    var psetKeys = p.psets ? Object.keys(p.psets) : [];
    var LS={fontSize:'.55rem',color:'#64748b'};
    var VS={fontSize:'.55rem',color:'#cbd5e1'};
    var ROW={display:'flex',justifyContent:'space-between',padding:'.1rem 0'};
    return html`<div style=${{background:'#0f172a',borderRadius:4,padding:'.35rem',marginBottom:'.2rem'}}>
      <div style=${{fontSize:'.6rem',fontWeight:600,color:'#93c5fd',marginBottom:'.2rem'}}>${label}</div>
      ${p.ifcType && html`<div style=${ROW}><span style=${LS}>Type</span><span style=${VS}>${p.ifcType}</span></div>`}
      ${p.name && html`<div style=${ROW}><span style=${LS}>Name</span><span style=${VS}>${p.name}</span></div>`}
      ${p.objectType && html`<div style=${ROW}><span style=${LS}>Object Type</span><span style=${VS}>${p.objectType}</span></div>`}
      ${p.storey && html`<div style=${ROW}><span style=${LS}>Storey</span><span style=${VS}>${p.storey}</span></div>`}

      <div style=${ROW}><span style=${LS}>Express ID</span><span style=${VS}>#${p.expressId}</span></div>
      ${qKeys.length>0 && html`<div style=${{marginTop:'.2rem',borderTop:'1px solid #1e293b',paddingTop:'.2rem'}}>
        <div style=${{fontSize:'.55rem',fontWeight:600,color:'#64748b',marginBottom:'.1rem'}}>Quantities</div>
        ${qKeys.map(function(k){return html`<div key=${k} style=${ROW}><span style=${LS}>${k}</span><span style=${VS}>${typeof p.quantities[k]==='number'?p.quantities[k].toFixed(3):p.quantities[k]}</span></div>`})}

      ${psetKeys.map(function(setName){

  // Virtualized list: only render visible rows for large lists
  var ROW_HEIGHT = 65; // approx height of IssueRow in px
  function VirtualList(props) {
    var items=props.items, activeId=props.activeId, d=props.d, isClash=props.isClash, prefs=props.prefs;
    var scrollRef = useRef(null);
    var _st = useState(0), scrollTop=_st[0], setScrollTop=_st[1];
    if(items.length===0) return html`<div style=${{flex:1,overflowY:'auto'}}>
      <div style=${{textAlign:'center',color:'#334155',fontSize:'.75rem',padding:'2.5rem 1rem'}}>
        <div style=${{fontSize:'2rem',marginBottom:'.3rem'}}>${isClash?'✅':'📋'}</div>
        ${'No '+(isClash?'clashes found yet':'issues yet')}
      </div>
    </div>`;
    // For small lists, render all (no virtualization overhead)
    if(items.length <= 50) return html`<div style=${{flex:1,overflowY:'auto'}}>
      ${items.map(function(it){return html`<${IssueRow} key=${it.id} item=${it} active=${activeId===it.id} d=${d} isClash=${isClash} prefs=${prefs} />`})}
    </div>`;
    // Virtualized rendering for large lists
    var totalHeight = items.length * ROW_HEIGHT;
    var containerH = scrollRef.current ? scrollRef.current.clientHeight : 600;
    var overscan = 5;
    var startIdx = Math.max(0, Math.floor(scrollTop / ROW_HEIGHT) - overscan);
    var endIdx = Math.min(items.length, Math.ceil((scrollTop + containerH) / ROW_HEIGHT) + overscan);
    var visible = items.slice(startIdx, endIdx);
    return html`<div ref=${scrollRef} onScroll=${function(e){setScrollTop(e.target.scrollTop);}} style=${{flex:1,overflowY:'auto'}}>
      <div style=${{height:totalHeight,position:'relative'}}>
        <div style=${{position:'absolute',top:startIdx*ROW_HEIGHT,left:0,right:0}}>
          ${visible.map(function(it){return html`<${IssueRow} key=${it.id} item=${it} active=${activeId===it.id} d=${d} isClash=${isClash} prefs=${prefs} />`})}
        </div>
      </div>
    </div>`;
  }

  function IssueRow(props) {
    var it=props.item, active=props.active, d=props.d, isClash=props.isClash, pr=props.prefs||{};
    var icon = it.type==='hard'?'🔴':it.type==='soft'?'🟡':it.source==='element'?'🏗':'📌';

  // ── Clash Bar ──────────────────────────────────────────────────

        style=${{fontSize:'.7rem',padding:'.15rem .3rem',borderRadius:4,maxWidth:100}}>
        <option value="all">All</option>
        ${s.models.map(function(m){return html`<option key=${m.id} value=${m.id}>${m.name}</option>`})}

      <select value=${r.modelB} onChange=${function(e){d({t:'UPD_RULES',u:{modelB:e.target.value}})}}
        style=${{fontSize:'.7rem',padding:'.15rem .3rem',borderRadius:4,maxWidth:100}}>

        ${s.detecting?html`<span class="spin">⟳</span> …`:'▶ Run'}

  // ── Mount ──────────────────────────────────────────────────────

  document.getElementById('boot').style.display = 'none';
  var rootEl = document.getElementById('root');
  var root = ReactDOM.createRoot ? ReactDOM.createRoot(rootEl) : null;
  if (root) { root.render(html`<${App} />`); }
  else { ReactDOM.render(html`<${App} />`, rootEl); }

} // end startApp
</script>
</body>
</html>
